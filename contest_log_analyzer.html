let _paneCounter = 0;   // 単調増加ID

// 時間幅フォーマット (ms → "30m" / "1h" / "1h30m")
function _fmtWinMs(ms) {
  const totalMins = Math.round(ms / 60000);
  if (totalMins < 60) return totalMins + 'm';
  const h = Math.floor(totalMins / 60), rem = totalMins % 60;
  return rem === 0 ? h + 'h' : h + 'h' + String(rem).padStart(2,'0') + 'm';
}

// 時間幅パース ("30m","1h","1h30m","90","1:30" → ms, 不正はnull)
function _parseWinMs(str) {
  str = str.trim().toLowerCase();
  let m;
  m = str.match(/^(\d+)h(?:(\d+)m?)?$/);
  if (m) { const ms = (parseInt(m[1])*60 + (m[2]?parseInt(m[2]):0)) * 60000; return (ms>=300000&&ms<=21600000)?ms:null; }
  m = str.match(/^(\d+)m$/);
  if (m) { const ms = parseInt(m[1]) * 60000; return (ms>=300000&&ms<=21600000)?ms:null; }
  m = str.match(/^(\d+):(\d{1,2})$/);
  if (m) { const ms = (parseInt(m[1])*60 + parseInt(m[2])) * 60000; return (ms>=300000&&ms<=21600000)?ms:null; }
  m = str.match(/^(\d+)$/);
  if (m) { const ms = parseInt(m[1]) * 60000; return (ms>=300000&&ms<=21600000)?ms:null; }
  return null;
}

// ---- 背景キャッシュ ----
function _saveAxesBg(chart) {
  const src = chart.canvas;
  if (!chart._axesCanvas) {
    chart._axesCanvas = document.createElement('canvas');
    chart._axesCtx    = chart._axesCanvas.getContext('2d');
  }
  if (chart._axesCanvas.width !== src.width || chart._axesCanvas.height !== src.height) {
    chart._axesCanvas.width  = src.width;
    chart._axesCanvas.height = src.height;
  }
  chart._axesCtx.globalCompositeOperation = 'copy';
  chart._axesCtx.drawImage(src, 0, 0);
  chart._axesCtx.globalCompositeOperation = 'source-over';
}

function _saveLabeledBg(chart, dMin, dMax) {
  const src = chart._axesCanvas;
  if (!src) return;
  if (!chart._bgCanvas) {
    chart._bgCanvas = document.createElement('canvas');
    chart._bgCtx    = chart._bgCanvas.getContext('2d');
  }
  if (chart._bgCanvas.width !== src.width || chart._bgCanvas.height !== src.height) {
    chart._bgCanvas.width  = src.width;
    chart._bgCanvas.height = src.height;
  }
  chart._bgCtx.globalCompositeOperation = 'copy';
  chart._bgCtx.drawImage(src, 0, 0);
  chart._bgCtx.globalCompositeOperation = 'source-over';
  chart._bgReady = true;
}

// ---- プラグイン ----
const liveCombinedPlugin = {
  id: 'liveCombined',
  afterDatasetsDraw(chart) { _saveAxesBg(chart); },
  afterDraw(chart) {
    try {
      const { ctx, chartArea, scales } = chart;
      if (!chartArea || !scales.x) return;
      const dMin = chart._drawXMin !== undefined ? chart._drawXMin : scales.x.min;
      const dMax = chart._drawXMax !== undefined ? chart._drawXMax : scales.x.max;
      _renderCombinedOverlay(chart, ctx, chartArea, dMin, dMax);
    } catch(e) {}
  }
};

const liveBandPlugin = {
  id: 'liveBand',
  afterDatasetsDraw(chart) { _saveAxesBg(chart); },
  afterDraw(chart) {
    try {
      const { ctx, chartArea, scales } = chart;
      if (!chartArea || !scales.x) return;
      const dMin = chart._drawXMin !== undefined ? chart._drawXMin : scales.x.min;
      const dMax = chart._drawXMax !== undefined ? chart._drawXMax : scales.x.max;
      _renderBandOverlay(chart, ctx, chartArea, dMin, dMax);
    } catch(e) {}
  }
};

// ---- オーバーレイ描画 ----
function _renderCombinedOverlay(chart, ctx, ca, dMin, dMax) {
  if (dMax <= dMin) return;
  _drawDaylightOverlay(ctx, ca, dMin, dMax);
  const W = ca.right - ca.left;
  const getX = v => ca.left + (v - dMin) / (dMax - dMin) * W;
  // ストリップ数を先に計算して時刻ラベルY位置を決定
  const _stripH = 5, _stripGap = 1;
  const _ldPre  = chart._liveData;
  let _nStrips = 0;
  if (_ldPre) {
    const _preSegs = _ldPre.primaryIsLive ? (_ldPre.opSegs || []) : opSegments;
    if (_preSegs && _preSegs.length) {
      _nStrips = 1;
      const _preExtra = chart._extraLiveData;
      if (_preExtra) {
        for (const _ex of _preExtra) { if (!_ex.isGroup && _ex.opSegs && _ex.opSegs.length) _nStrips++; }
      }
    }
  }
  const _tickLabelY = ca.bottom + (_nStrips > 0 ? _nStrips * (_stripH + _stripGap) + 4 : 10);
  const stepMs = chart._stepMs;
  if (stepMs) {
    const firstTick = Math.ceil(dMin / stepMs) * stepMs;
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 1;
    ctx.setLineDash([]);
    ctx.font = '9px "SF Mono", "Fira Code", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    for (let t = firstTick; t <= dMax + 1; t += stepMs) {
      const px = getX(t);
      if (px < ca.left - 1 || px > ca.right + 1) continue;
      ctx.beginPath(); ctx.moveTo(px, ca.top); ctx.lineTo(px, ca.bottom); ctx.stroke();
      const d = new Date(t);
      const label = String(d.getUTCHours()).padStart(2,'0') + ':' + String(d.getUTCMinutes()).padStart(2,'0');
      ctx.fillText(label, px, _tickLabelY);
    }
    ctx.restore();
  }
  const ld = chart._liveData;
  if (!ld) return;
  const H     = ca.bottom - ca.top;
  const yMin  = chart.options.scales.y.min  || 0;
  const yMax  = chart.options.scales.y.max  || 10;
  const yrMax = chart.options.scales.yRate ? (chart.options.scales.yRate.max || 10) : 10;
  const getY  = v => ca.bottom - ((v - yMin) / (yMax - yMin || 1)) * H;
  const getYR = v => ca.bottom - (v / yrMax) * H;
  const _extraLDForAccel = chart._extraLiveData;
  let accelAbsMax = (showACCEL && ld.accelPts && ld.accelPts.length >= 2)
    ? Math.max(...ld.accelPts.map(p => Math.abs(p.y)), 1) : null;
  if (showACCEL && _extraLDForAccel) {
    for (const ex of _extraLDForAccel) {
      if (ex.accelPts && ex.accelPts.length >= 2) {
        const exMax = Math.max(...ex.accelPts.map(p => Math.abs(p.y)), 1);
        accelAbsMax = accelAbsMax !== null ? Math.max(accelAbsMax, exMax) : exMax;
      }
    }
  }
  const getYA = accelAbsMax ? v => ca.bottom - H/2 - (v / accelAbsMax) * (H/2) : null;
  ctx.save();
  ctx.beginPath(); ctx.rect(ca.left, ca.top, W, H); ctx.clip();
  const _drawLine = (pts, color, lw) => {
    if (!pts || pts.length < 2) return;
    ctx.strokeStyle = color; ctx.lineWidth = lw; ctx.setLineDash([]);
    ctx.beginPath();
    let started = false;
    for (const pt of pts) {
      const px = getX(pt.x), py = getYR(pt.y);
      if (!started) { ctx.moveTo(px, py); started = true; } else ctx.lineTo(px, py);
    }
    ctx.stroke();
  };
  // primaryがライブログの場合はライブログのvisibleを確認、参照ログが primaryの場合は参照ログのvisibleを確認
  const _refLogVisible = ld.primaryIsLive
    ? ((_logStore.find(l => l.isLive && !l.isGroup) || {}).visible !== false)
    : ((!_refLog() || _refLog().visible) && ld.showRef !== false);
  if (_refLogVisible) {
    const _pRateC  = _muted(ld.rateColor  || 'rgba(79,195,247,0.55)');
    const _pEmaC   = _muted(ld.emaColor   || '#00e5ff');
    const _pLoessC = _muted(ld.loessColor || '#69f0ae');
    const _pAccelC = ld.accelColor || '#ffd600';
    if (showRate) _drawLine(ld.ratePts,  _pRateC, 1.5);
    if (showEMA)   _drawLine(ld.emaPts,   _pEmaC, 2);
    if (showLOESS) _drawLine(ld.loessPts, _pLoessC, 2.5);
    if (accelAbsMax !== null && getYA) {
      const zeroY = getYA(0);
      ctx.save();
      ctx.strokeStyle = _muted(_pAccelC); ctx.lineWidth = 1.5; ctx.setLineDash([]);
      ctx.beginPath();
      let aStarted = false;
      for (const pt of ld.accelPts) {
        const px = getX(pt.x), py = getYA(pt.y);
        if (!aStarted) { ctx.moveTo(px, py); aStarted = true; } else ctx.lineTo(px, py);
      }
      ctx.stroke();
      if (ld.accelPts.length >= 2) {
        ctx.fillStyle = _pAccelC + '0a';
        ctx.beginPath();
        ctx.moveTo(getX(ld.accelPts[0].x), zeroY);
        for (const pt of ld.accelPts) ctx.lineTo(getX(pt.x), getYA(pt.y));
        ctx.lineTo(getX(ld.accelPts[ld.accelPts.length-1].x), zeroY);
        ctx.closePath(); ctx.fill();
      }
      ctx.restore();
    }
    // 参照ログのcumul点
    if (ld.pts) {
      const _refColor = ld.color || (_refLog() && _refLog().color) || '#E24B4A';
      ctx.fillStyle = _refColor;
      for (const pt of ld.pts) {
        const px = getX(pt.x);
        if (px < ca.left - 3 || px > ca.right + 3) continue;
        ctx.beginPath(); ctx.arc(px, getY(pt.y), 2, 0, Math.PI * 2); ctx.fill();
      }
    }
  }
  // 追加ログのrate/EMA/LOESS/cumul点
  const extraLD = chart._extraLiveData;
  if (extraLD) {
    for (const ex of extraLD) {
      const _exIsRef   = !!ex.isRef;
      const _exIsGroup = !!ex.isGroup;
      const rc = _muted(_exIsRef ? 'rgba(79,195,247,0.55)' : (ex.rateColor || ex.color));
      const _exDash = _exIsGroup ? [6, 3] : [];
      // rate
      if (showRate && ex.ratePts && ex.ratePts.length >= 2) {
        ctx.strokeStyle = _exIsGroup ? rc + 'aa' : rc; ctx.lineWidth = 1.5; ctx.setLineDash(_exDash);
        ctx.beginPath();
        let _es = false;
        for (const pt of ex.ratePts) {
          const px = getX(pt.x), py = getYR(pt.y);
          if (!_es) { ctx.moveTo(px, py); _es = true; } else ctx.lineTo(px, py);
        }
        ctx.stroke();
        ctx.setLineDash([]);
      }
      // グループはEMA/LOESS/ACCELを描画しない
      if (!_exIsGroup) {
      const _exEmaC   = _muted(ex.emaColor   || (_exIsRef ? '#00e5ff' : _ADD_EMA_COLOR));
      const _exLoessC = _muted(ex.loessColor || (_exIsRef ? '#69f0ae' : _ADD_LOESS_COLOR));
      const _exAccelC = ex.accelColor || (_exIsRef ? '#ffd600' : _ADD_ACCEL_COLOR);
      // EMA
      if (showEMA && ex.emaPts && ex.emaPts.length >= 2) {
        ctx.strokeStyle = _exEmaC; ctx.lineWidth = 2; ctx.setLineDash(_exDash);
        ctx.beginPath();
        let _es = false;
        for (const pt of ex.emaPts) {
          const px = getX(pt.x), py = getYR(pt.y);
          if (!_es) { ctx.moveTo(px, py); _es = true; } else ctx.lineTo(px, py);
        }
        ctx.stroke();
        ctx.setLineDash([]);
      }
      // LOESS
      if (showLOESS && ex.loessPts && ex.loessPts.length >= 2) {
        ctx.strokeStyle = _exLoessC; ctx.lineWidth = 2.5; ctx.setLineDash(_exDash); // already muted
        ctx.beginPath();
        let _es = false;
        for (const pt of ex.loessPts) {
          const px = getX(pt.x), py = getYR(pt.y);
          if (!_es) { ctx.moveTo(px, py); _es = true; } else ctx.lineTo(px, py);
        }
        ctx.stroke();
        ctx.setLineDash([]);
      }
      // ACCEL
      if (showACCEL && getYA && ex.accelPts && ex.accelPts.length >= 2) {
        const zeroY = getYA(0);
        ctx.save();
        ctx.strokeStyle = _exAccelC + 'aa'; ctx.lineWidth = 1; ctx.setLineDash(_exDash);
        ctx.beginPath();
        let _aS = false;
        for (const pt of ex.accelPts) {
          const px = getX(pt.x), py = getYA(pt.y);
          if (!_aS) { ctx.moveTo(px, py); _aS = true; } else ctx.lineTo(px, py);
        }
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = _exAccelC + '18';
        ctx.beginPath();
        ctx.moveTo(getX(ex.accelPts[0].x), zeroY);
        for (const pt of ex.accelPts) ctx.lineTo(getX(pt.x), getYA(pt.y));
        ctx.lineTo(getX(ex.accelPts[ex.accelPts.length-1].x), zeroY);
        ctx.closePath(); ctx.fill();
        ctx.restore();
      }
      } // end !_exIsGroup
      // cumul dots（グループは破線ラインで描画）
      if (!ex.pts || !ex.pts.length) continue;
      if (_exIsGroup) {
        // グループ合算: 破線で繋ぐ
        ctx.strokeStyle = ex.color + 'cc'; ctx.lineWidth = 1.5; ctx.setLineDash([6, 3]);
        ctx.beginPath();
        let _gs = false;
        for (const pt of ex.pts) {
          const px = getX(pt.x), py = getY(pt.y);
          if (px < ca.left - 3 || px > ca.right + 3) { _gs = false; continue; }
          if (!_gs) { ctx.moveTo(px, py); _gs = true; } else ctx.lineTo(px, py);
        }
        ctx.stroke(); ctx.setLineDash([]);
        continue;
      }
      ctx.fillStyle = ex.color;
      for (const pt of ex.pts) {
        const px = getX(pt.x);
        if (px < ca.left - 3 || px > ca.right + 3) continue;
        ctx.beginPath(); ctx.arc(px, getY(pt.y), 2, 0, Math.PI * 2); ctx.fill();
      }
    }
  }
  ctx.restore();
  // ACCEL軸ラベル（yRate軸の左に描画）
  if (accelAbsMax !== null && getYA && chart.scales && chart.scales.yRate) {
    const yRateScale = chart.scales.yRate;
    ctx.save();
    ctx.font = '8px "SF Mono", "Fira Code", monospace';
    ctx.fillStyle = 'rgba(255,214,0,0.85)';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    const nTicks = 4;
    for (let i = 0; i <= nTicks; i++) {
      const val = -accelAbsMax + (2 * accelAbsMax) * i / nTicks;
      const y = getYA(val);
      if (y < ca.top - 1 || y > ca.bottom + 1) continue;
      ctx.fillText(val.toFixed(1), yRateScale.left - 4, y);
    }
    ctx.restore();
    ctx.save();
    ctx.font = '9px "SF Mono", "Fira Code", monospace';
    ctx.fillStyle = 'rgba(255,214,0,0.75)';
    ctx.textAlign = 'center';
    ctx.translate(yRateScale.right - 8, ca.top + (ca.bottom - ca.top) / 4);
    ctx.rotate(Math.PI / 2);
    ctx.fillText('(QSO/h)/min', 0, 0);
    ctx.restore();
  }
  const nowMs = ld.nowMs;
  if (nowMs && nowMs >= dMin && nowMs <= dMax) {
    const px = getX(nowMs);
    ctx.save();
    ctx.strokeStyle = 'rgba(255,80,80,0.85)'; ctx.lineWidth = 1.5; ctx.setLineDash([5, 3]);
    ctx.beginPath(); ctx.moveTo(px, ca.top); ctx.lineTo(px, ca.bottom); ctx.stroke();
    ctx.restore();
  }
  const cursorFrac = chart._liveKey ? _liveState[chart._liveKey].cursorFrac : null;
  if (cursorFrac !== null) {
    const px = ca.left + cursorFrac * (ca.right - ca.left);
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(px, ca.top); ctx.lineTo(px, ca.bottom); ctx.stroke();
    ctx.restore();
  }
  // 横帯の順序: ファイルログ(ロード順) → SkookumNet(live/primary)
  // primaryIsLiveの場合はliveのopSegs、そうでなければグローバルopSegmentsを使う
  const _primarySegs = ld.primaryIsLive ? (ld.opSegs || []) : opSegments;
  const _allStripsHaveData = (_primarySegs && _primarySegs.length) || (() => {
    const ed = chart._extraLiveData;
    return ed && ed.some(ex => !ex.isGroup && ex.opSegs && ex.opSegs.length);
  })();
  if (_allStripsHaveData) {
    const stripH = 5, stripGap = 1;
    const refShown = ld.showRef !== false;
    const _liveStrips = [];
    // 追加ログ（非グループ）の帯を先に積む（isRefを最初に = ロード順の最初のログ）
    const extraLD2 = chart._extraLiveData;
    if (extraLD2) {
      // isRef（最初のログ）を先頭に
      const _refExtras = extraLD2.filter(ex => ex.isRef && !ex.isGroup && ex.opSegs && ex.opSegs.length);
      const _nonRefExtras = extraLD2.filter(ex => !ex.isRef && !ex.isGroup && ex.opSegs && ex.opSegs.length);
      for (const ex of _refExtras)    _liveStrips.push(ex.opSegs);
      for (const ex of _nonRefExtras) _liveStrips.push(ex.opSegs);
    }
    // primaryはlive(SkookumNet)なら最後に積む、非liveなら先頭
    if (!ld.primaryIsLive && refShown && _primarySegs && _primarySegs.length) {
      _liveStrips.unshift(_primarySegs);
    } else if (ld.primaryIsLive && refShown && _primarySegs && _primarySegs.length) {
      _liveStrips.push(_primarySegs);
    }
    if (_liveStrips.length > 0) {
      ctx.save();
      _liveStrips.forEach((segs, si) => {
        const y0 = ca.bottom + 2 + si * (stripH + stripGap);
        segs.forEach(seg => {
          if (seg.endMs < dMin || seg.startMs > dMax) return;
          const x1 = getX(Math.max(seg.startMs, dMin));
          const x2 = getX(Math.min(seg.endMs,   dMax));
          if (x2 <= x1) return;
          ctx.fillStyle = OP_COLORS[seg.state] || '#888';
          ctx.fillRect(x1, y0, x2 - x1, stripH);
        });
      });
      ctx.restore();
    }
  }
  ctx.save();
  ctx.font = '10px "SF Mono","Fira Code",monospace';
  ctx.fillStyle = '#E24B4A'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(i18n('cumulLabel'), ca.left + 6, ca.top + 10);
  ctx.restore();
}

function _renderBandOverlay(chart, ctx, ca, dMin, dMax) {
  const ld = chart._liveBandData;
  if (!ld || dMax <= dMin) return;
  _drawDaylightOverlay(ctx, ca, dMin, dMax);
  const W = ca.right - ca.left;
  const getX = v => ca.left + (v - dMin) / (dMax - dMin) * W;
  const stepMs = chart._stepMs;
  if (stepMs) {
    const firstTick = Math.ceil(dMin / stepMs) * stepMs;
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1; ctx.setLineDash([]);
    ctx.font = '9px "SF Mono", "Fira Code", monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    for (let t = firstTick; t <= dMax + 1; t += stepMs) {
      const px = getX(t);
      if (px < ca.left - 1 || px > ca.right + 1) continue;
      ctx.beginPath(); ctx.moveTo(px, ca.top); ctx.lineTo(px, ca.bottom); ctx.stroke();
      const d = new Date(t);
      ctx.fillText(String(d.getUTCHours()).padStart(2,'0') + ':' + String(d.getUTCMinutes()).padStart(2,'0'), px, ca.bottom + 4);
    }
    ctx.restore();
  }
  const { slots, bandRates, bucketMs } = ld;
  const extraBD = chart._extraBandData;
  const refShown = ld.showRef !== false;
  const nLogs = (refShown ? 1 : 0) + (extraBD ? extraBD.length : 0);
  if (nLogs === 0) return;
  const totalBarW = slots.length > 1 ? Math.max(1, getX(slots[0] + bucketMs) - getX(slots[0]) - 1) : 1;
  const subW = Math.max(1, Math.floor(totalBarW / nLogs));
  const yH = ca.bottom - ca.top;
  const yMax = (chart.scales.yRight ? chart.scales.yRight.max : chart.scales.y.max) || 1;
  // 参照ログ（表示対象の場合のみ）
  if (refShown) {
    for (let i = 0; i < slots.length; i++) {
      const px = getX(slots[i]);
      let bottom = ca.bottom;
      for (const [band, rates] of Object.entries(bandRates)) {
        const r = rates[i] || 0; if (r <= 0) continue;
        const h = (r / yMax) * yH;
        ctx.fillStyle = (BAND_COLORS[band] || BAND_COLORS.other) + 'bf';
        ctx.fillRect(px, bottom - h, subW, h); bottom -= h;
      }
    }
  }
  // 追加ログ（バンド色を暗くして横に並べる）
  if (extraBD) {
    for (let li = 0; li < extraBD.length; li++) {
      const ex = extraBD[li];
      const xOff = subW * (li + (refShown ? 1 : 0));
      for (let i = 0; i < slots.length; i++) {
        const px = getX(slots[i]) + xOff;
        let bottom = ca.bottom;
        for (const [band, rates] of Object.entries(ex.bandRates)) {
          const r = rates[i] || 0; if (r <= 0) continue;
          const h = (r / yMax) * yH;
          ctx.fillStyle = _darkenHexColor(BAND_COLORS[band] || BAND_COLORS.other) + 'bf';
          ctx.fillRect(px, bottom - h, subW, h); bottom -= h;
        }
      }
    }
  }
  const nowMs = chart._nowMs;
  if (nowMs && nowMs >= dMin && nowMs <= dMax) {
    const px = getX(nowMs);
    ctx.save();
    ctx.strokeStyle = 'rgba(255,80,80,0.85)'; ctx.lineWidth = 1.5; ctx.setLineDash([5, 3]);
    ctx.beginPath(); ctx.moveTo(px, ca.top); ctx.lineTo(px, ca.bottom); ctx.stroke();
    ctx.restore();
  }
  const cursorFrac = chart._liveKey ? _liveState[chart._liveKey].cursorFrac : null;
  if (cursorFrac !== null) {
    const px = ca.left + cursorFrac * (ca.right - ca.left);
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(px, ca.top); ctx.lineTo(px, ca.bottom); ctx.stroke();
    ctx.restore();
  }
  ctx.save();
  ctx.font = '10px "SF Mono","Fira Code",monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(i18n('rateLabel'), ca.left + 6, ca.top + 10);
  ctx.restore();
}

// ---- データ構築 ----
function _niceYRange(minVal, maxVal) {
  if (maxVal <= minVal) {
    const v = Math.max(minVal, 0);
    const mag = v >= 5 ? Math.pow(10, Math.floor(Math.log10(v))) : 5;
    return { min: Math.max(0, Math.floor(v / mag) * mag - mag), max: Math.floor(v / mag) * mag + mag };
  }
  const pad = Math.max((maxVal - minVal) * 0.05, 0.5);
  const lo = Math.max(0, minVal - pad);
  const hi = maxVal + pad;
  const rawStep = (hi - lo) / 4;
  const mag = Math.pow(10, Math.floor(Math.log10(Math.max(rawStep, 1))));
  const step = rawStep >= 5 * mag ? 5 * mag : rawStep >= 2 * mag ? 2 * mag : mag;
  return { min: Math.floor(lo / step) * step, max: Math.ceil(hi / step) * step };
}

function _buildLiveCumulPoints(qsos, startMs, endMs) {
  const pts = []; let count = 0;
  for (const q of qsos) {
    const t = q._liveTime !== undefined ? q._liveTime : q.time.getTime();
    if (t > endMs) break;
    count++;
    if (t >= startMs) pts.push({x: t, y: count});
  }
  return { pts, maxY: count };
}

function _buildLiveBandData(qsos, startMs, endMs, bucketMs) {
  const alignedStart = Math.floor(startMs / bucketMs) * bucketMs;
  const slots = [];
  for (let t = alignedStart; t < endMs; t += bucketMs) slots.push(t);
  const count = slots.length;
  const bandCounts = {};
  for (const q of qsos) {
    const t = q.time.getTime();
    if (t < alignedStart || t >= endMs) continue;
    const idx = Math.floor((t - alignedStart) / bucketMs);
    if (idx < 0 || idx >= count) continue;
    const band = q.band || 'other';
    if (!bandCounts[band]) bandCounts[band] = new Array(count).fill(0);
    bandCounts[band][idx]++;
  }
  const bh = bucketMs / 3600000;
  const bandRates = {}; let maxRate = 0, maxCount = 0;
  for (const [band, arr] of Object.entries(bandCounts)) {
    bandRates[band] = arr.map(c => Math.round(c / bh));
    maxRate  = Math.max(maxRate,  ...bandRates[band]);
    maxCount = Math.max(maxCount, ...arr);
  }
  return { slots, bandRates, maxRate, maxCount };
}

// ---- ウィンドウ計算 ----
function _stepMsForWindow(winMs) {
  const m = winMs / 60000;
  if (m <=  3) return 30000;
  if (m <=  8) return 60000;
  if (m <= 15) return 90000;
  if (m <= 30) return 3*60000;
  if (m <= 75) return 7*60000;
  if (m <= 150) return 15*60000;
  return 30*60000;
}

function _effectiveLeftMs(key) {
  return _liveState[key].leftMs;
}

function _liveWin(key, nowMs) {
  const st = _liveState[key];
  if (st.customWin) {
    const cwWidth = st.customWin.max - st.customWin.min;
    if (st.mode === 'scroll') {
      const redLineFrac = (st.leftMs - st.panOffset) / st.winMs;
      const ws = nowMs - redLineFrac * cwWidth;
      return [ws, ws + cwWidth];
    }
    const { min, max } = st.customWin;
    const frac = (nowMs - min) / cwWidth;
    if (frac >= 0.98) { const shift = (frac - 2/3)*cwWidth; st.customWin = { min: min+shift, max: max+shift }; }
    return [st.customWin.min, st.customWin.max];
  }
  if (st.mode === 'fixed') {
    if (st.fixedRefNow === null) st.fixedRefNow = nowMs;
    const frac = (nowMs - st.fixedRefNow + st.leftMs) / st.winMs;
    if (frac >= 0.98) st.fixedRefNow = nowMs + st.leftMs - (2/3)*st.winMs;
    else if (frac < 0.05) st.fixedRefNow = nowMs + st.leftMs - (1/3)*st.winMs;
    return [st.fixedRefNow - st.leftMs, st.fixedRefNow - st.leftMs + st.winMs];
  }
  const base = nowMs - _effectiveLeftMs(key);
  return [base + st.panOffset, base + st.panOffset + st.winMs];
}

function _clampLiveWin(key, nowMs) {
  const st = _liveState[key];
  const [ws, we] = _liveWin(key, nowMs);
  const wMs = we - ws;
  const frac = (nowMs - ws) / wMs;
  if (frac >= 0.05 && frac <= 0.98) return;
  const tgt = Math.max(0.05, Math.min(0.98, frac));
  const newWs = nowMs - tgt * wMs;
  if (st.customWin) {
    if (st.mode === 'scroll') st.panOffset = st.leftMs - tgt * st.winMs;
    else st.customWin = { min: newWs, max: newWs + wMs };
  } else if (st.mode === 'fixed') {
    st.fixedRefNow = newWs + st.leftMs;
  } else {
    st.panOffset = newWs - (nowMs - _effectiveLeftMs(key));
  }
}

function _setLiveZoom(key, win) {
  const st = _liveState[key];
  if (!win && st.customWin) {
    if (st.mode === 'fixed') {
      const nowMs = getNowMs();
      const cw = st.customWin, cwWidth = cw.max - cw.min;
      const nowFrac = (nowMs - cw.min) / cwWidth;
      st.fixedRefNow = nowMs - nowFrac * st.winMs + st.leftMs;
      _clampLiveWin(key, nowMs);
    }
  }
  st.customWin = win;
  const stepMs = win ? _stepMsForWindow(win.max - win.min) : st.defaultStepMs;
  const _zp = _livePanes.find(p => p.id === key);
  if (_zp) {
    [_zp.chart, _zp.bandChart].filter(Boolean).forEach(c => { c._stepMs = stepMs; });
    const btn = _zp.el.querySelector('.pane-zoom-reset');
    if (btn) btn.style.display = win ? '' : 'none';
  }
}

// 3hペイン用: 参照ログを live time base にシフトする量を計算
// アンカーモードの組み合わせに応じてシフトを決定
function _computeRefShiftForPane(ref, liveLog, nowMs) {
  const ra = ref.anchorMode || 'contestStart';
  const la = liveLog.anchorMode || 'contestStart';

  if (ra === 'contestStart' && la === 'contestStart') {
    // 現在の曜日を参照コンテストの同曜日にマップ
    const refDay1Midnight  = Math.floor(ref.contestStartMs / 86400000) * 86400000;
    const refDay1Weekday   = new Date(ref.contestStartMs).getUTCDay();
    const refLastMs        = ref.qsos.length ? ref.qsos[ref.qsos.length - 1].time.getTime() : ref.contestStartMs;
    const refContestDays   = Math.max(1, Math.ceil((refLastMs - ref.contestStartMs) / 86400000) + 1);
    const nowDayMidnight   = Math.floor(nowMs / 86400000) * 86400000;
    const nowWeekday       = new Date(nowMs).getUTCDay();
    const rawOffset        = (nowWeekday - refDay1Weekday + 7) % 7;
    const dayOffset        = rawOffset < refContestDays ? rawOffset : 0;
    return nowDayMidnight - (refDay1Midnight + dayOffset * 86400000);
  }

  const refFirstQso  = ref.qsos.length  ? ref.qsos[0].time.getTime()     : ref.contestStartMs;
  const liveFirstQso = liveLog.qsos.length ? liveLog.qsos[0].time.getTime() : nowMs;

  if (ra === 'firstQso'      && la === 'firstQso')      return liveFirstQso - refFirstQso;
  if (ra === 'contestStart'  && la === 'firstQso')      return liveFirstQso - ref.contestStartMs;
  if (ra === 'firstQso'      && la === 'contestStart')  return liveLog.contestStartMs - refFirstQso;

  // fallback
  return liveFirstQso - refFirstQso;
}

// ---- チャートデータ更新 ----
function _updateLivePaneData(pane, qsos, winStart, winEnd, nowMs) {
  const chart = pane.chart;
  if (!chart) return;
  const windowMins = _liveState[pane.id].rateWindowSecs / 60;
  const cumul = _buildLiveCumulPoints(qsos, winStart, winEnd);
  const offSegs = skipOffTimeRate ? opSegments.filter(s => s.state === 'offtime') : [];
  const allRate = calcRateData(qsos, windowMins, offSegs);
  const ratePts = allRate.filter(pt => pt.x >= winStart && pt.x <= winEnd);
  const basic = calcRateBasic(qsos, windowMins);
  const trend = _computeTrendSeries(basic, windowMins);
  const emaPts   = trend.ema.filter(pt => pt.x >= winStart && pt.x <= winEnd);
  const loessPts = trend.loess.filter(pt => pt.x >= winStart && pt.x <= winEnd);
  const accelPts = trend.accel.filter(pt => pt.x >= winStart && pt.x <= winEnd);

  // ペインの logIds フィルタで参照ログが除外されているか確認
  const _paneLogIds = _liveState[pane.id].logIds; // null=全表示, Set=個別指定
  const _paneRef    = _refLog();
  const _refShown   = !_paneLogIds || (_paneRef && _paneLogIds.has(_paneRef.id));

  // wsLiveQsosが設定されている場合、primaryはライブログ → ライブログの色を使う
  const _liveLogForColor = _wsLiveQsos !== null ? _logStore.find(l => l.isLive && !l.isGroup) : null;
  const _primaryColor      = _liveLogForColor ? _liveLogForColor.color : null;
  const _primaryRateColor  = _liveLogForColor ? _logRateColor(_liveLogForColor) : null;
  const _primaryOC         = _liveLogForColor ? _logOverlayColors(_liveLogForColor) : null;
  const _primaryEmaColor   = _primaryOC ? _primaryOC.ema   : null;
  const _primaryLoessColor = _primaryOC ? _primaryOC.loess : null;
  const _primaryAccelColor = _primaryOC ? _primaryOC.accel : null;
  // ライブログのopSegsを計算（プライマリが live の場合）
  let _primaryOpSegs = null;
  if (_wsLiveQsos !== null && qsos.length) {
    const _pvRunSP = classifyRunSP(qsos);
    const _pvLiveEntry = _logStore.find(l => l.isLive && !l.isGroup);
    const _pvDurMs = _guessContestDurationMs(wsContestName || '');
    const _pvBounds = _pvLiveEntry?.contestStartMs
      ? { startMs: _pvLiveEntry.contestStartMs, endMs: _pvLiveEntry.contestStartMs + _pvDurMs }
      : null;
    _primaryOpSegs = _pvBounds
      ? buildOpSegments(qsos, _pvRunSP, false, _pvBounds)
      : buildOpSegments(qsos, _pvRunSP, true);
  }
  chart._liveData = { pts: cumul.pts, ratePts, emaPts, loessPts, accelPts, nowMs, showRef: _refShown,
    color: _primaryColor, rateColor: _primaryRateColor, emaColor: _primaryEmaColor,
    loessColor: _primaryLoessColor, accelColor: _primaryAccelColor,
    primaryIsLive: _wsLiveQsos !== null, opSegs: _primaryOpSegs };
  chart._nowMs    = nowMs;
  chart._drawXMin = winStart;
  chart._drawXMax = winEnd;
  chart.options.scales.x.min = winStart;
  chart.options.scales.x.max = winEnd;

  // ===== マルチログ: 追加ログのcumulデータを計算 =====
  if (_multiLogMode) {
    const ref = _refLog();
    const refAnchor = ref ? _logAnchorMs(ref) : 0;
    const paneLogIds = _liveState[pane.id].logIds; // null=全ログ, Setで個別
    const extra = [];
    for (const log of _logStore) {
      if (!log.visible || (ref && log.id === ref.id)) continue;
      if (paneLogIds !== null && !paneLogIds.has(log.id)) continue;
      // _wsLiveQsosが設定されている場合、ライブログはプライマリデータと同一なのでスキップ
      if (_wsLiveQsos !== null && log.isLive) continue;
      const logQsos = _getLogQsos(log);
      if (!logQsos.length) continue;
      const logAnchor = _logAnchorMs(log);
      let shift = refAnchor - logAnchor + log.offsetMs;
      // ライブモード時: 追加ファイルログもライブ時間軸に合わせてシフト
      if (_wsLiveQsos !== null) {
        const _xLiveLog = _logStore.find(l => l.isLive && !l.isGroup);
        if (_xLiveLog) shift += _computeRefShiftForPane(ref, _xLiveLog, nowMs) + _xLiveLog.offsetMs - ref.offsetMs;
      }
      // winStart/winEnd範囲内の累積点を計算（追加ログはnowMs以降を表示しない）
      const _exClipEnd = Math.min(winEnd, nowMs);
      let baseCount = 0;
      const cumulPts = [];
      let runCount = 0;
      for (const q of logQsos) {
        const t = (q._liveTime !== undefined ? q._liveTime : q.time.getTime()) + shift;
        runCount++;
        if (t < winStart) { baseCount = runCount; continue; }
        if (t > _exClipEnd) continue;
        cumulPts.push({ x: t, y: runCount });
      }
      // rate / EMA / LOESS / ACCEL（全QSOから計算し、シフト適用、nowMsでクリップ）
      const _exRate = calcRateData(logQsos, windowMins, [])
        .map(pt => ({ x: pt.x + shift, y: pt.y }))
        .filter(pt => pt.x >= winStart && pt.x <= _exClipEnd);
      let _exEmaPts = [], _exLoessPts = [], _exAccelPts = [];
      if (showEMA || showLOESS || showACCEL) {
        const _exBasic = calcRateBasic(logQsos, windowMins);
        const _exTrend = _computeTrendSeries(_exBasic, windowMins);
        if (showEMA)   _exEmaPts   = _exTrend.ema.map(pt => ({ x: pt.x + shift, y: pt.y })).filter(pt => pt.x >= winStart && pt.x <= _exClipEnd);
        if (showLOESS) _exLoessPts = _exTrend.loess.map(pt => ({ x: pt.x + shift, y: pt.y })).filter(pt => pt.x >= winStart && pt.x <= _exClipEnd);
        if (showACCEL) _exAccelPts = _exTrend.accel.map(pt => ({ x: pt.x + shift, y: pt.y })).filter(pt => pt.x >= winStart && pt.x <= _exClipEnd);
      }
      const _exRateColor = _logRateColor(log);
      // opSegments（グループは不要）
      let _exOpSegs = [];
      if (!log.isGroup) {
        const _exRunSP = classifyRunSP(logQsos);
        const _exDurMs = _guessContestDurationMs(log._meta?.contestName || '');
        const _exRawSegs = log.contestStartMs
          ? buildOpSegments(logQsos, _exRunSP, false, { startMs: log.contestStartMs, endMs: log.contestStartMs + _exDurMs })
          : buildOpSegments(logQsos, _exRunSP, true);
        _exOpSegs = _exRawSegs.map(s => ({ ...s, startMs: s.startMs + shift, endMs: s.endMs + shift }));
      }
      const _exOC = _logOverlayColors(log);
      extra.push({
        logId: log.id, label: log.label, color: log.color, isGroup: !!log.isGroup,
        rateColor: _exRateColor,
        emaColor: _exOC.ema, loessColor: _exOC.loess, accelColor: _exOC.accel,
        pts: cumulPts, ratePts: _exRate,
        emaPts: log.isGroup ? [] : _exEmaPts,
        loessPts: log.isGroup ? [] : _exLoessPts,
        accelPts: log.isGroup ? [] : _exAccelPts,
        opSegs: _exOpSegs,
      });
    }
    // 静的参照ログ + ライブモード: 参照ログを live time base にシフトして 3h ペインに重ねる
    if (_wsLiveQsos !== null && ref && ref.visible) {
      const liveLog = _logStore.find(l => l.isLive && !l.isGroup);
      if (liveLog) {
        const shift = _computeRefShiftForPane(ref, liveLog, nowMs) + liveLog.offsetMs - ref.offsetMs;
        const refQsos = _getLogQsos(ref);
        if (refQsos.length) {
          const _exClipEnd = winEnd; // 参照ログは現在時刻以降も表示（比較用）
          const cumulPts = [];
          let runCount = 0;
          for (const q of refQsos) {
            const t = (q._liveTime !== undefined ? q._liveTime : q.time.getTime()) + shift;
            runCount++;
            if (t < winStart) continue;
            if (t > _exClipEnd) continue;
            cumulPts.push({ x: t, y: runCount });
          }
          const _exRate = calcRateData(refQsos, windowMins, [])
            .map(pt => ({ x: pt.x + shift, y: pt.y }))
            .filter(pt => pt.x >= winStart && pt.x <= _exClipEnd);
          let _exEmaPts = [], _exLoessPts = [], _exAccelPts = [];
          if (showEMA || showLOESS || showACCEL) {
            const _exBasic = calcRateBasic(refQsos, windowMins);
            const _exTrend = _computeTrendSeries(_exBasic, windowMins);
            if (showEMA)   _exEmaPts   = _exTrend.ema.map(pt => ({ x: pt.x + shift, y: pt.y })).filter(pt => pt.x >= winStart && pt.x <= _exClipEnd);
            if (showLOESS) _exLoessPts = _exTrend.loess.map(pt => ({ x: pt.x + shift, y: pt.y })).filter(pt => pt.x >= winStart && pt.x <= _exClipEnd);
            if (showACCEL) _exAccelPts = _exTrend.accel.map(pt => ({ x: pt.x + shift, y: pt.y })).filter(pt => pt.x >= winStart && pt.x <= _exClipEnd);
          }
          const _exRunSP = classifyRunSP(refQsos);
          const _exDurMs = _guessContestDurationMs(ref._meta?.contestName || '');
          const _exRawSegs = ref.contestStartMs
            ? buildOpSegments(refQsos, _exRunSP, false, { startMs: ref.contestStartMs, endMs: ref.contestStartMs + _exDurMs })
            : buildOpSegments(refQsos, _exRunSP, true);
          const _exOpSegs = _exRawSegs.map(s => ({ ...s, startMs: s.startMs + shift, endMs: s.endMs + shift }));
          extra.push({
            logId: ref.id, label: ref.label, color: ref.color, isGroup: false, isRef: true,
            rateColor: _logRateColor(ref),
            emaColor: '#00e5ff', loessColor: '#69f0ae', accelColor: '#ffd600',
            pts: cumulPts, ratePts: _exRate,
            emaPts: _exEmaPts, loessPts: _exLoessPts, accelPts: _exAccelPts,
            opSegs: _exOpSegs,
          });
        }
      }
    }
    chart._extraLiveData = extra.length ? extra : null;
  } else {
    chart._extraLiveData = null;
  }
  // SkookumNet複数局: 個別局を extraLiveData に追加（_multiLogModeとは独立）
  if (pane._wsStationExtras) {
    const _stExtras = chart._extraLiveData ? chart._extraLiveData.slice() : [];
    for (const stEx of pane._wsStationExtras) {
      if (!stEx.qsos.length) continue;
      const stClipEnd = Math.min(winEnd, nowMs);
      const stCumul = [];
      let stCount = 0;
      for (const q of stEx.qsos) {
        const t = q.time.getTime();
        stCount++;
        if (t < winStart) continue;
        if (t > stClipEnd) continue;
        stCumul.push({ x: t, y: stCount });
      }
      const stRate = calcRateData(stEx.qsos, windowMins, []).filter(pt => pt.x >= winStart && pt.x <= stClipEnd);
      _stExtras.push({
        logId: 'ws_' + stEx.station, label: stEx.station, color: stEx.color, isGroup: false,
        rateColor: stEx.color, pts: stCumul, ratePts: stRate,
        emaPts: [], loessPts: [], accelPts: [], opSegs: [],
      });
    }
    chart._extraLiveData = _stExtras.length ? _stExtras : null;
  }

  // y軸範囲: 表示対象ログのみ考慮
  let maxCumul = _refShown ? cumul.maxY : 0;
  let minCumul = (_refShown && cumul.pts.length > 0) ? cumul.pts[0].y : Infinity;
  if (chart._extraLiveData) {
    for (const ex of chart._extraLiveData) {
      if (ex.pts.length) {
        maxCumul = Math.max(maxCumul, ex.pts[ex.pts.length - 1].y);
        minCumul = Math.min(minCumul === Infinity ? ex.pts[0].y : minCumul, ex.pts[0].y);
      }
    }
  }
  if (minCumul === Infinity) minCumul = 0;
  const { min: newYMin, max: newYMax } = _niceYRange(minCumul, Math.max(maxCumul, minCumul));
  let newYRateMax = _refShown ? Math.max(...ratePts.map(p => p.y), 10) : 10;
  // 追加ログのrate/EMA/LOESSも含めてyRate最大値を更新
  if (chart._extraLiveData) {
    for (const ex of chart._extraLiveData) {
      if (ex.ratePts)  ex.ratePts.forEach(p  => { newYRateMax = Math.max(newYRateMax, p.y); });
      if (ex.emaPts)   ex.emaPts.forEach(p   => { newYRateMax = Math.max(newYRateMax, p.y); });
      if (ex.loessPts) ex.loessPts.forEach(p => { newYRateMax = Math.max(newYRateMax, p.y); });
    }
  }
  chart.options.scales.y.min     = newYMin;
  chart.options.scales.y.max     = newYMax;
  chart.options.scales.yRate.max = newYRateMax;
  // ストリップ数に応じてbottom paddingを更新（時刻ラベルが隠れないようにcanvasを拡張）
  let _nStripsCalc = 0;
  if (chart._liveData) {
    const _psCalc = chart._liveData.primaryIsLive ? (chart._liveData.opSegs || []) : opSegments;
    if (_psCalc && _psCalc.length) {
      _nStripsCalc = 1;
      if (chart._extraLiveData) {
        for (const _ec of chart._extraLiveData) { if (!_ec.isGroup && _ec.opSegs && _ec.opSegs.length) _nStripsCalc++; }
      }
    }
  }
  const _reqBot = _nStripsCalc > 0 ? _nStripsCalc * 6 + 14 : 14;
  const _curBot = chart.options.layout.padding.bottom || 0;
  if (_curBot !== _reqBot) chart.options.layout.padding.bottom = _reqBot;
  if (chart._yMinCache !== newYMin || chart._yMaxCache !== newYMax || chart._yRateMaxCache !== newYRateMax || _curBot !== _reqBot) {
    chart._yMinCache     = newYMin;
    chart._yMaxCache     = newYMax;
    chart._yRateMaxCache = newYRateMax;
    chart.update('none');
  }
}

function _updateLivePaneBandData(pane, qsos, winStart, winEnd, nowMs) {
  const bandChart = pane.bandChart;
  if (!bandChart) return;
  const bucketMs = rateMins * 60000;
  // ペインの logIds フィルタで参照ログが除外されているか確認
  const _bpLogIds = _liveState[pane.id].logIds;
  const _bpRef    = _refLog();
  const _bpRefShown = !_bpLogIds || (_bpRef && _bpLogIds.has(_bpRef.id));
  // 参照ログが非表示の場合は空データを使用
  const _bpQsos = _bpRefShown ? qsos : [];
  const { slots, bandRates, maxRate, maxCount } = _buildLiveBandData(_bpQsos, winStart, winEnd, bucketMs);
  bandChart._liveBandData = { slots, bandRates, bucketMs, nowMs, showRef: _bpRefShown };

  // 追加ログのバンドデータを計算（参照ログと同じ時刻シフトを適用）
  let extraBandData = null;
  let allMaxRate = maxRate, allMaxCount = maxCount;
  if (_multiLogMode) {
    const refLog = _refLog();
    const refAnchor = refLog ? _logAnchorMs(refLog) : 0;
    const extras = [];
    for (const log of _logStore) {
      if (!log.visible || log.isGroup || (refLog && log.id === refLog.id)) continue;
      if (_wsLiveQsos !== null && log.isLive) continue;
      const logQsos = _getLogQsos(log);
      if (!logQsos.length) continue;
      const logAnchor = _logAnchorMs(log);
      const shift = refAnchor - logAnchor + log.offsetMs;
      // 時刻シフト済みQSOを作成してバンドデータを計算（nowMs以降はクリップ）
      const shiftedQsos = logQsos
        .map(q => ({
          time: new Date((q._liveTime !== undefined ? q._liveTime : q.time.getTime()) + shift),
          band: q.band,
        }))
        .filter(q => q.time.getTime() <= nowMs);
      const { bandRates: eBR, maxRate: eMR, maxCount: eMC } = _buildLiveBandData(shiftedQsos, winStart, winEnd, bucketMs);
      extras.push({ logId: log.id, label: log.label, bandRates: eBR });
      allMaxRate  = Math.max(allMaxRate,  eMR);
      allMaxCount = Math.max(allMaxCount, eMC);
    }
    // 静的参照ログ + ライブモード: 参照ログを live time base にシフトしてバンドペインに重ねる
    if (_wsLiveQsos !== null && refLog && refLog.visible) {
      const liveLog = _logStore.find(l => l.isLive && !l.isGroup);
      if (liveLog) {
        const shift = _computeRefShiftForPane(refLog, liveLog, nowMs) + liveLog.offsetMs - refLog.offsetMs;
        const refQsos = _getLogQsos(refLog);
        if (refQsos.length) {
          const shiftedQsos = refQsos
            .map(q => ({
              time: new Date((q._liveTime !== undefined ? q._liveTime : q.time.getTime()) + shift),
              band: q.band,
            }));
          const { bandRates: eBR, maxRate: eMR, maxCount: eMC } = _buildLiveBandData(shiftedQsos, winStart, winEnd, bucketMs);
          extras.push({ logId: refLog.id, label: refLog.label, bandRates: eBR });
          allMaxRate  = Math.max(allMaxRate,  eMR);
          allMaxCount = Math.max(allMaxCount, eMC);
        }
      }
    }
    if (extras.length) extraBandData = extras;
  }
  bandChart._extraBandData = extraBandData;

  // バンド凡例を更新
  const legEl = pane.el.querySelector('.pane-band-legend');
  if (legEl) {
    const allQsos = getLiveQsos();
    const allBands = [...new Set(allQsos.map(q => q.band || 'other'))];
    const sorted = [...allBands].sort((a, b) => bandToMeters(b) - bandToMeters(a));
    legEl.innerHTML = sorted.map(b => `<span><span class="band-dot" style="background:${BAND_COLORS[b] || BAND_COLORS.other}"></span>${bandLabel(b)}</span>`).join('');
  }
  bandChart._nowMs    = nowMs;
  bandChart._drawXMin = winStart;
  bandChart._drawXMax = winEnd;
  bandChart.options.scales.x.min = winStart;
  bandChart.options.scales.x.max = winEnd;
  const newYMax      = Math.max(allMaxCount, 1);
  const newYRateMax  = Math.max(allMaxRate,  10);
  if (bandChart._yMaxCache !== newYMax || bandChart._yRateMaxCache !== newYRateMax || !bandChart._bgReady) {
    bandChart._yMaxCache     = newYMax;
    bandChart._yRateMaxCache = newYRateMax;
    bandChart.options.scales.y.max      = newYMax;
    bandChart.options.scales.yRight.max = newYRateMax;
    bandChart.update('none');
  }
}

function updateLiveCharts() {
  const nowMs = getNowMs();
  const allLiveQsos = getLiveQsos();
  // ライブログが非表示の場合はプライマリを空にする
  const _liveEntry = _logStore.find(l => l.isLive && !l.isGroup);
  const _liveHidden = _liveEntry && !_liveEntry.visible;
  if (activeViews.has('live3h')) {
    for (const pane of _livePanes) {
      if (!pane.chart) continue;
      const [ws, we] = _liveWin(pane.id, nowMs);
      // ライブ非表示判定
      let paneQsos = allLiveQsos;
      if (_liveHidden) paneQsos = [];
      // SkookumNet station フィルタ
      const wsSel = _liveState[pane.id].wsStationSel;
      if (!_liveHidden && wsSel && wsSel.size > 0 && _wsStations.size > 1) {
        const _showCombined = wsSel.has('combined');
        const _stNames = [...wsSel].filter(s => s !== 'combined');
        if (!_showCombined && _stNames.length > 0) {
          // 個別局のみ: stationが一致するQSOのみ
          paneQsos = allLiveQsos.filter(q => _stNames.includes(q.station));
        }
        // _showCombined は paneQsos = allLiveQsos (合算) のまま
        // 個別局を extraLiveData で追加するため pane._wsStationExtras を設定
        if (_stNames.length > 0) {
          pane._wsStationExtras = _stNames.map(sn => ({
            station: sn,
            color: (_wsStations.get(sn) || {}).color || '#888',
            qsos: allLiveQsos.filter(q => q.station === sn),
          }));
        } else {
          pane._wsStationExtras = null;
        }
      } else {
        pane._wsStationExtras = null;
      }
      _updateLivePaneData(pane, paneQsos, ws, we, nowMs);
      if (pane.bandChart) _updateLivePaneBandData(pane, paneQsos, ws, we, nowMs);
      _saveLabeledBg(pane.chart, ws, we);
      if (pane.bandChart) _saveLabeledBg(pane.bandChart, ws, we);
    }
  }
  if (cumulChart && allLiveQsos.length) _updateCumulRateOnly(rateWindowSecs / 60);
  if (simNowMs !== null) {
    if (cumulChart) cumulChart.draw();
    if (rateChart)  rateChart.draw();
  }
}

// ---- RAFベース描画 ----
function _rafLiveDraw(key, combined, band, nowMs) {
  if (!combined) return;
  const [ws, we] = _liveWin(key, nowMs);
  [combined, band].forEach(c => {
    if (!c) return;
    c._drawXMin = ws; c._drawXMax = we; c._nowMs = nowMs;
    if (c._liveData)     c._liveData.nowMs = nowMs;
    if (c._liveBandData) c._liveBandData.nowMs = nowMs;
    if (c._bgReady) {
      const ctx = c.ctx, cw = c.canvas.width, ch = c.canvas.height;
      const _dpr = window.devicePixelRatio || 1;
      ctx.globalCompositeOperation = 'copy';
      ctx.drawImage(c._bgCanvas, 0, 0, cw / _dpr, ch / _dpr);
      ctx.globalCompositeOperation = 'source-over';
      const ca = c.chartArea;
      if (ca) {
        if (c._liveData)     _renderCombinedOverlay(c, ctx, ca, ws, we);
        if (c._liveBandData) _renderBandOverlay(c, ctx, ca, ws, we);
        if (c._dragX !== undefined && dragZoomState.active && dragZoomState.chart === c) {
          const x1 = dragZoomState.startX;
          const x2 = Math.min(Math.max(c._dragX, ca.left), ca.right);
          ctx.save();
          ctx.fillStyle = 'rgba(55,138,221,0.15)';
          ctx.fillRect(Math.min(x1, x2), ca.top, Math.abs(x2 - x1), ca.bottom - ca.top);
          ctx.strokeStyle = 'rgba(55,138,221,0.6)'; ctx.lineWidth = 1; ctx.setLineDash([]);
          ctx.beginPath();
          ctx.moveTo(x1, ca.top); ctx.lineTo(x1, ca.bottom);
          ctx.moveTo(x2, ca.top); ctx.lineTo(x2, ca.bottom);
          ctx.stroke(); ctx.restore();
        }
      }
    } else {
      c.draw();
    }
  });
}

// ---- チャート生成（ファクトリ） ----

// ペインの時間幅を更新する
function _applyPaneWinMs(pane, winMs) {
  const id = pane.id;
  const st = _liveState[id];
  st.winMs   = winMs;
  st.leftMs  = Math.round(0.98 * winMs);
  st.defaultStepMs = _stepMsForWindow(winMs);
  st.panOffset = 0; st.fixedRefNow = null; st.customWin = null;
  [pane.chart, pane.bandChart].filter(Boolean).forEach(c => {
    c._stepMs = st.defaultStepMs;
    c._bgReady = false;
    c.options.scales.x.ticks.stepSize = st.defaultStepMs;
  });
  const zoomBtn = pane.el.querySelector('.pane-zoom-reset');
  if (zoomBtn) zoomBtn.style.display = 'none';
  if (currentQsos.length) updateLiveCharts();
}

// 全表示セクションの高さを均等に再調整する
function _rebalanceLayout() {
  const panesContainer = document.getElementById('live-panes-container');
  if (!panesContainer) return;
  const nPanes = Math.max(1, _livePanes.length);
  // full viewと両方表示時: ペインN個 + 全体グラフ1個 = 均等になるようflex=nPanes
  // live3hのみ: どちらでもよいが一応nPanesにしておく
  panesContainer.style.flex = String(nPanes);
  requestAnimationFrame(() => {
    const allCharts = [cumulChart, rateChart, ..._livePanes.flatMap(p => [p.chart, p.bandChart])].filter(Boolean);
    allCharts.forEach(c => c.resize());
  });
}

// ペインを破棄する
function _updatePaneViewBtn() {
  const btn       = document.getElementById('pane-view-btn');
  const container = document.getElementById('live-panes-container');
  const empty = _livePanes.length === 0;
  if (btn) {
    btn.style.opacity = empty ? '0.35' : '';
    btn.style.cursor  = empty ? 'default' : '';
    btn.classList.toggle('active', !empty && activeViews.has('live3h'));
  }
  if (empty) {
    activeViews.delete('live3h');
    if (container) container.style.display = 'none';
  }
}

function _destroyLivePane(id) {
  const idx = _livePanes.findIndex(p => p.id === id);
  if (idx < 0) return;
  const pane = _livePanes[idx];
  if (pane.chart)     { pane.chart.destroy(); }
  if (pane.bandChart) { pane.bandChart.destroy(); }
  pane.el.remove();
  delete _liveState[id];
  _livePanes.splice(idx, 1);
  _rebalanceLayout();
  _updatePaneViewBtn();
}

// ペインを生成する（時間幅 winMs [ms]）
function _createLivePane(winMs) {
  const id = 'p' + _paneCounter++;
  const clampedWinMs = Math.max(300000, Math.min(21600000, winMs));
  const defStep = _stepMsForWindow(clampedWinMs);

  _liveState[id] = {
    mode: 'scroll', fixedRefNow: null, panOffset: 0, customWin: null,
    winMs: clampedWinMs, leftMs: Math.round(0.98 * clampedWinMs),
    defaultStepMs: defStep, cursorFrac: null, rateWindowSecs: 600, _panelW: 0,
    logIds: null,       // null=全ログ表示, Setで個別指定
    wsStationSel: null, // null=SkookumNet合算, Setで選択局名(特別値'combined'=合算)
  };

  const isDark = _isDark();
  const winSecs = Math.round(clampedWinMs / 1000);

  // DOM生成
  const el = document.createElement('div');
  el.className = 'live-pane';
  el.dataset.paneId = id;
  el.style.cssText = 'display:flex;flex-direction:column;flex:1;min-height:0;';
  el.innerHTML = `
    <div class="live-pane-main" style="display:flex;flex-direction:column;flex:2;min-height:0;">
      <div style="display:flex;justify-content:flex-end;align-items:center;padding:0 4px 2px;gap:6px;">
        <span style="font-size:10px;color:var(--text2);" data-i18n="winLabel">${i18n('winLabel')}</span>
        <input type="range" class="pane-win-slider" min="300" max="21600" step="60" value="${winSecs}"
          style="width:80px;accent-color:#5DCAA5;">
        <input type="text" class="pane-win-label" value="${_fmtWinMs(clampedWinMs)}"
          style="font-size:11px;color:var(--text2);width:40px;background:transparent;border:none;border-bottom:1px solid var(--text2);text-align:center;outline:none;padding:0;cursor:text;">
        <span style="font-size:10px;color:#5DCAA5;" data-i18n="rightRate">${i18n('rightRate')}</span>
        <input type="range" class="pane-rate-slider" min="1" max="7200" step="1" value="600"
          style="flex:1;min-width:40px;max-width:200px;accent-color:#5DCAA5;">
        <input type="text" class="pane-rate-label" value="10:00"
          style="font-size:11px;color:var(--text2);width:44px;background:transparent;border:none;border-bottom:1px solid var(--text2);text-align:center;outline:none;padding:0;cursor:text;">
        <button class="btn pane-mode-btn" style="font-size:10px;padding:1px 7px;" title="${i18n('live3hModeTitle')}">${i18n('live3hScroll')}</button>
        <button class="btn pane-zoom-reset" style="font-size:10px;padding:1px 7px;display:none;">${i18n('zoomReset')}</button>
        <button class="btn pane-log-sel-btn" style="font-size:10px;padding:1px 7px;display:none;" title="${i18n('paneLogSelTitle')}">All</button>
        <button class="btn pane-close-btn" style="font-size:10px;padding:1px 5px;color:#e05555;border-color:#e05555;" title="${i18n('paneCloseTitle')}">×</button>
      </div>
      <div class="chart-wrap"><canvas class="pane-main-canvas"></canvas></div>
    </div>
    <div class="live-pane-band" style="display:${(showBandActivity && rateBarsPlugin) ? 'flex' : 'none'};flex-direction:column;flex:0.5;min-height:0;">
      <div class="chart-wrap"><canvas class="pane-band-canvas"></canvas></div>
      <div class="band-legend pane-band-legend" style="justify-content:center;margin-top:4px;flex-shrink:0;"></div>
    </div>
  `;

  // pane-add-wrap の前に挿入
  const container = document.getElementById('live-panes-container');
  const addWrap   = document.getElementById('pane-add-wrap');
  container.insertBefore(el, addWrap);

  const mainCanvas = el.querySelector('.pane-main-canvas');
  const bandCanvas = el.querySelector('.pane-band-canvas');

  // メインチャート生成
  const chart = new Chart(mainCanvas, {
    type: 'scatter',
    data: { datasets: [] },
    options: {
      animation: false, responsive: true, maintainAspectRatio: false,
      parsing: false, events: [],
      layout: { padding: { bottom: 14 } },
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: {
        x: {
          type: 'linear', min: 0, max: 1,
          ticks: { stepSize: defStep, font: { size: 9 }, color: 'rgba(0,0,0,0)' },
          grid: { display: false }, border: { color: 'rgba(255,255,255,0.1)' },
        },
        y: {
          position: 'left', min: 0, max: 10,
          afterFit(scale) { scale.width = 52; },
          ticks: { maxTicksLimit: 4, font: { size: 9 }, color: '#E24B4A' },
          grid: { color: 'rgba(255,255,255,0.05)' }, border: { color: 'rgba(255,255,255,0.1)' },
        },
        yRate: {
          position: 'right', min: 0, max: 10,
          afterFit(scale) { scale.width = 52; },
          ticks: { maxTicksLimit: 4, font: { size: 9 }, color: 'rgba(79,195,247,0.9)' },
          grid: { display: false }, border: { color: 'rgba(79,195,247,0.3)' },
          title: { display: true, text: 'QSO/h', font: { size: 9 }, color: 'rgba(79,195,247,0.9)' },
        },
      },
    },
    plugins: [liveCombinedPlugin],
  });
  chart._stepMs = defStep; chart._isLiveChart = true; chart._liveKey = id;

  // バンドチャート生成
  const bandChart = new Chart(bandCanvas, {
    type: 'scatter',
    data: { datasets: [] },
    options: {
      animation: false, responsive: true, maintainAspectRatio: false,
      events: [],
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: {
        x: {
          type: 'linear', min: 0, max: 1,
          ticks: { stepSize: defStep, font: { size: 9 }, color: 'rgba(0,0,0,0)' },
          grid: { display: false }, border: { color: 'rgba(255,255,255,0.1)' },
        },
        y: {
          min: 0, max: 10,
          afterFit(scale) { scale.width = 52; },
          ticks: { maxTicksLimit: 4, font: { size: 9 }, color: 'rgba(255,255,255,0.65)' },
          grid: { color: 'rgba(255,255,255,0.05)' }, border: { color: 'rgba(255,255,255,0.1)' },
          title: { display: true, text: i18n('yAxisQso'), font: { size: 9 }, color: 'rgba(255,255,255,0.65)' },
        },
        yRight: {
          position: 'right', min: 0, max: 10,
          afterFit(scale) { scale.width = 52; },
          ticks: { maxTicksLimit: 4, font: { size: 9 }, color: '#888780', callback: v => v + '/h' },
          grid: { drawOnChartArea: false }, border: { color: 'rgba(79,195,247,0.3)' },
          title: { display: true, text: 'QSO/h', font: { size: 9 }, color: '#888780' }
        },
      },
    },
    plugins: [liveBandPlugin],
  });
  bandChart._stepMs = defStep; bandChart._isLiveChart = true; bandChart._liveKey = id;

  // バンド凡例初期表示
  const legEl = el.querySelector('.pane-band-legend');
  if (legEl) {
    const initQsos  = getLiveQsos();
    const initBands = [...new Set(initQsos.map(q => q.band || 'other'))].sort((a, b) => bandToMeters(b) - bandToMeters(a));
    legEl.innerHTML = initBands.map(b => `<span><span class="band-dot" style="background:${BAND_COLORS[b]||BAND_COLORS.other}"></span>${bandLabel(b)}</span>`).join('');
  }

  // ---- イベントリスナー: メインキャンバス ----
  mainCanvas.addEventListener('mousemove', e => {
    const rect = mainCanvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const ca = chart.chartArea;
    const tip = document.getElementById('bar-tooltip');
    if (!ca || x < ca.left || x > ca.right) {
      _liveState[id].cursorFrac = null;
      // チャートエリア外でもツールチップは消さない（mouseleaveで消す）
      return;
    }
    const frac = (x - ca.left) / (ca.right - ca.left);
    _liveState[id].cursorFrac = frac;
    const ld = chart._liveData;
    if (!tip || !ld) return;
    const dMin = chart._drawXMin || 0, dMax = chart._drawXMax || 1;
    const tMs = dMin + frac * (dMax - dMin);
    const nearest = pts => pts && pts.length ? pts.reduce((a, b) => Math.abs(b.x - tMs) < Math.abs(a.x - tMs) ? b : a) : null;
    const nr = nearest(ld.ratePts), ne = showEMA ? nearest(ld.emaPts) : null;
    const nl = showLOESS ? nearest(ld.loessPts) : null, na = showACCEL ? nearest(ld.accelPts) : null;
    const nc = nearest(ld.pts);
    const d  = new Date(tMs);
    const ts = String(d.getUTCHours()).padStart(2,'0') + ':' + String(d.getUTCMinutes()).padStart(2,'0') + ':' + String(d.getUTCSeconds()).padStart(2,'0');
    const extraLD = chart._extraLiveData;
    const isMulti = extraLD && extraLD.length > 0;
    const refLog  = _refLog();
    const refVisible = !refLog || refLog.visible;
    // primaryIsLive時: primaryデータはSkookumNet → "SKNet"ラベル
    const _pIsLive = ld.primaryIsLive;
    const refPfx = isMulti
      ? (_pIsLive ? '[SKNet] ' : `[${refLog ? _logDistinctLabel(refLog) : ''}] `)
      : '';
    // primary (ref/live) log colors
    const _ptipCumulC = _pIsLive
      ? (ld.color || '#E24B4A')
      : (refLog ? refLog.color : '#E24B4A') || '#E24B4A';
    const _ptipRateC  = (ld.rateColor  || 'rgba(79,195,247,0.9)');
    const _ptipEmaC   = (ld.emaColor   || '#00e5ff');
    const _ptipLoessC = (ld.loessColor || '#69f0ae');
    const _ptipAccelC = (ld.accelColor || '#ffd600');
    const _mkTipLine = (pfx, nc, nr, ne, nl, na, cC, rC, eC, lC, aC) => {
      const parts = [];
      if (nc) parts.push(`<span style="color:${cC}">${pfx}${i18n('cumulTooltip', Math.round(nc.y)).trim()}</span>`);
      if (nr) parts.push(`<span style="color:${_dimHex(rC)}">Rate: ${Math.round(nr.y)}</span>`);
      if (ne) parts.push(`<span style="color:${_dimHex(eC)}">EMA: ${Math.round(ne.y)}</span>`);
      if (nl) parts.push(`<span style="color:${_dimHex(lC)}">LOESS: ${Math.round(nl.y)}</span>`);
      if (na) parts.push(`<span style="color:${_dimHex(aC)}">ACCEL: ${na.y.toFixed(2)}</span>`);
      return parts.join(' · ');
    };
    const tipLines = [];
    if (refVisible) {
      const ln = _mkTipLine(refPfx, nc, nr, ne, nl, na, _ptipCumulC, _ptipRateC, _ptipEmaC, _ptipLoessC, _ptipAccelC);
      if (ln) tipLines.push(ln);
    }
    if (isMulti) {
      for (const ex of extraLD) {
        const log = _logStore.find(l => l.id === ex.logId);
        const lbl = log ? _logDistinctLabel(log) : (ex.label || ex.logId);
        if (log && !log.visible) continue;
        const rc = ex.rateColor || ex.color;
        const exEmaC   = ex.emaColor   || _ADD_EMA_COLOR;
        const exLoessC = ex.loessColor || _ADD_LOESS_COLOR;
        const exAccelC = ex.accelColor || _ADD_ACCEL_COLOR;
        const exnc = nearest(ex.pts);
        const exnr = nearest(ex.ratePts);
        const exne = showEMA   ? nearest(ex.emaPts)   : null;
        const exnl = showLOESS ? nearest(ex.loessPts) : null;
        const exna = showACCEL ? nearest(ex.accelPts) : null;
        const ln = _mkTipLine(`[${lbl}] `, exnc, exnr, exne, exnl, exna, ex.color, rc, exEmaC, exLoessC, exAccelC);
        if (ln) tipLines.push(ln);
      }
    }
    tip.innerHTML = `<div style="color:#8a8a88;margin-bottom:2px;">${ts} UTC</div>${tipLines.join('<br>')}`;
    tip.style.display = 'block';
    const _lTipW = tip.offsetWidth;
    tip.style.left = Math.max(4, e.clientX + 12 + _lTipW < window.innerWidth ? e.clientX + 12 : e.clientX - _lTipW - 12) + 'px';
    tip.style.top  = (e.clientY - 20) + 'px';
  });
  mainCanvas.addEventListener('mouseleave', () => {
    _liveState[id].cursorFrac = null;
    if (!_liveState[id]._inTouch) {
      const tip = document.getElementById('bar-tooltip');
      if (tip) tip.style.display = 'none';
    }
  });
  mainCanvas.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    const ca = chart.chartArea;
    if (ca && (e.clientY - mainCanvas.getBoundingClientRect().top) <= ca.bottom) return;
    e.stopImmediatePropagation();
    chart._dragStartX = e.clientX; chart._isDragging = true;
    e.preventDefault();
  }, { capture: true });

  // ---- イベントリスナー: バンドキャンバス ----
  bandCanvas.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    const ca = bandChart.chartArea;
    if (ca && (e.clientY - bandCanvas.getBoundingClientRect().top) <= ca.bottom) return;
    e.stopImmediatePropagation();
    bandChart._dragStartX = e.clientX; bandChart._isDragging = true;
    e.preventDefault();
  }, { capture: true });
  bandCanvas.addEventListener('mousemove', e => {
    const rect = bandCanvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const ca = bandChart.chartArea;
    const tip = document.getElementById('bar-tooltip');
    if (!ca || mouseX < ca.left || mouseX > ca.right) {
      _liveState[id].cursorFrac = null;
      // チャートエリア外でもツールチップは消さない（mouseleaveで消す）
      return;
    }
    const frac = (mouseX - ca.left) / (ca.right - ca.left);
    _liveState[id].cursorFrac = frac;
    const ld = bandChart._liveBandData;
    if (!tip || !ld) return;
    const dMin = bandChart._drawXMin || 0, dMax = bandChart._drawXMax || 1;
    const tMs  = dMin + frac * (dMax - dMin);
    const { slots, bandRates, bucketMs } = ld;
    const idx  = slots.findIndex(s => tMs >= s && tMs < s + bucketMs);
    if (idx < 0) { tip.style.display = 'none'; return; }
    const slotStart = slots[idx];

    // マウス位置のサブバーからログを特定
    const extraBD  = bandChart._extraBandData;
    const refShown = ld.showRef !== false;
    const isMulti  = (refShown ? 1 : 0) + (extraBD ? extraBD.length : 0) > 1;
    const nLogs    = (refShown ? 1 : 0) + (extraBD ? extraBD.length : 0);
    if (nLogs === 0) { tip.style.display = 'none'; return; }
    const W = ca.right - ca.left;
    const getX = v => ca.left + (v - dMin) / (dMax - dMin) * W;
    const slotPx    = getX(slotStart);
    const slotEndPx = getX(slotStart + bucketMs);
    const totalBarW = Math.max(1, slotEndPx - slotPx - 1);
    const subW      = Math.max(1, Math.floor(totalBarW / nLogs));
    const logIdx    = Math.min(nLogs - 1, Math.max(0, Math.floor((mouseX - slotPx) / subW)));

    // 対象ログのバンドレートを取得
    let bandRatesForLog, logForDisplay, isDark;
    if (refShown && logIdx === 0) {
      bandRatesForLog = bandRates;
      logForDisplay   = _refLog();
      isDark = false;
    } else {
      const ex = extraBD[logIdx - (refShown ? 1 : 0)];
      bandRatesForLog = ex ? ex.bandRates : null;
      logForDisplay   = ex ? _logStore.find(l => l.id === ex.logId) : null;
      isDark = true;
    }
    if (!bandRatesForLog) { tip.style.display = 'none'; return; }

    const d1 = new Date(slotStart), d2 = new Date(slotStart + bucketMs);
    const fmt2 = dt => String(dt.getUTCHours()).padStart(2,'0') + ':' + String(dt.getUTCMinutes()).padStart(2,'0');
    const timeStr = fmt2(d1) + i18n('toSep') + fmt2(d2);
    const lbl = (isMulti && logForDisplay) ? `[${_logDistinctLabel(logForDisplay)}] ` : '';

    let totalRate = 0;
    const bandParts = Object.entries(bandRatesForLog)
      .filter(([, rates]) => (rates[idx] || 0) > 0)
      .sort(([a], [b]) => bandToMeters(b) - bandToMeters(a))
      .map(([band, rates]) => {
        totalRate += rates[idx];
        const bc = isDark ? _darkenHexColor(BAND_COLORS[band]||BAND_COLORS.other) : (BAND_COLORS[band]||BAND_COLORS.other);
        return `<span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${bc};margin-right:3px;vertical-align:middle;"></span>${bandLabel(band)}: ${rates[idx]}`;
      });
    if (!bandParts.length) { tip.style.display = 'none'; return; }
    const bandRow = bandParts.join(' · ');
    tip.innerHTML = `<div style="color:#8a8a88;margin-bottom:2px;">${lbl}${timeStr} UTC</div>${bandRow}<span style="color:#8a8a88;"> (計 ${totalRate})</span>`;
    tip.style.display = 'block';
    const _bTipW = tip.offsetWidth;
    tip.style.left = Math.max(4, e.clientX + 12 + _bTipW < window.innerWidth ? e.clientX + 12 : e.clientX - _bTipW - 12) + 'px';
    tip.style.top  = (e.clientY - 20) + 'px';
  });
  bandCanvas.addEventListener('mouseleave', () => {
    _liveState[id].cursorFrac = null;
    if (!_liveState[id]._inTouch) {
      const tip = document.getElementById('bar-tooltip');
      if (tip) tip.style.display = 'none';
    }
  });
  // ---- ペイン全体タッチ: Y座標でmain/bandを判定してツールチップを表示 ----
  el.addEventListener('touchmove', e => {
    if (e.touches.length !== 1) return;
    e.preventDefault();
    const t = e.touches[0];
    const mainRect = mainCanvas.getBoundingClientRect();
    const bandRect  = bandCanvas.getBoundingClientRect();
    // Y位置でどのキャンバスか判定（バンドキャンバスが非表示なら mainCanvas にフォールバック）
    if (bandChart && bandRect.height > 0 && t.clientY >= bandRect.top && t.clientY <= bandRect.bottom) {
      bandCanvas.dispatchEvent(new MouseEvent('mousemove', { clientX: t.clientX, clientY: t.clientY - 60, bubbles: false }));
    } else if (t.clientY >= mainRect.top && t.clientY <= mainRect.bottom) {
      mainCanvas.dispatchEvent(new MouseEvent('mousemove', { clientX: t.clientX, clientY: t.clientY - 60, bubbles: false }));
    }
  }, { passive: false });
  el.addEventListener('touchstart', () => {
    _liveState[id]._inTouch = true;
  }, { passive: true });
  el.addEventListener('touchend', () => {
    _liveState[id].cursorFrac = null;
    _scheduleTooltipHide(3000);
    setTimeout(() => { _liveState[id]._inTouch = false; }, 400);
  });

  // ---- ツールバーボタン ----
  const modeBtn = el.querySelector('.pane-mode-btn');
  modeBtn.addEventListener('click', function() {
    const st = _liveState[id];
    const nowMs = getNowMs();
    if (st.mode === 'scroll') {
      if (st.customWin) {
        const cwWidth = st.customWin.max - st.customWin.min;
        const redLineFrac = (st.leftMs - st.panOffset) / st.winMs;
        const newMin = nowMs - redLineFrac * cwWidth;
        st.customWin = { min: newMin, max: newMin + cwWidth };
      } else {
        st.fixedRefNow = nowMs + st.leftMs - _effectiveLeftMs(id) + st.panOffset;
      }
      st.mode = 'fixed';
      this.textContent = i18n('live3hFollow');
      this.classList.add('active');
    } else {
      if (st.customWin) {
        const cwWidth = st.customWin.max - st.customWin.min;
        const nowFrac = (nowMs - st.customWin.min) / cwWidth;
        st.panOffset = st.leftMs - nowFrac * st.winMs;
      } else {
        st.panOffset = st.fixedRefNow !== null ? (_effectiveLeftMs(id) - st.leftMs + st.fixedRefNow - nowMs) : 0;
      }
      st.fixedRefNow = null;
      st.mode = 'scroll';
      this.textContent = i18n('live3hScroll');
      this.classList.remove('active');
    }
  });

  el.querySelector('.pane-zoom-reset').addEventListener('click', () => _setLiveZoom(id, null));
  el.querySelector('.pane-close-btn').addEventListener('click', () => _destroyLivePane(id));

  // ---- ログ選択ボタン ----
  el.querySelector('.pane-log-sel-btn').addEventListener('click', function(e) {
    e.stopPropagation();
    const existing = document.querySelector('.pane-log-menu[data-pane="' + id + '"]');
    if (existing) { existing.remove(); return; }
    _showPaneLogMenu(id, this);
  });

  // ---- 時間幅スライダー ----
  const winSlider = el.querySelector('.pane-win-slider');
  const winLabelEl = el.querySelector('.pane-win-label');
  const paneRef = { id, el, chart, bandChart };
  winSlider.addEventListener('input', () => {
    const newMs = parseInt(winSlider.value) * 1000;
    winLabelEl.value = _fmtWinMs(newMs);
    _applyPaneWinMs(paneRef, newMs);
  });
  winLabelEl.addEventListener('blur', () => {
    const parsed = _parseWinMs(winLabelEl.value);
    if (parsed) {
      winSlider.value = Math.round(parsed / 1000);
      winLabelEl.value = _fmtWinMs(parsed);
      _applyPaneWinMs(paneRef, parsed);
    } else {
      winLabelEl.value = _fmtWinMs(_liveState[id].winMs);
    }
  });
  winLabelEl.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); winLabelEl.blur(); } });

  // ---- レートウィンドウスライダー ----
  const rateSlider = el.querySelector('.pane-rate-slider');
  const rateLabelEl = el.querySelector('.pane-rate-label');
  rateSlider.addEventListener('input', () => {
    const secs = parseInt(rateSlider.value);
    _liveState[id].rateWindowSecs = secs;
    rateLabelEl.value = _fmtRateWin(secs);
    chart._yMaxCache = undefined; chart._yRateMaxCache = undefined;
    if (currentQsos.length) updateLiveCharts();
  });
  rateLabelEl.addEventListener('blur', () => {
    const parsed = _parseRateWin(rateLabelEl.value);
    if (parsed) {
      _liveState[id].rateWindowSecs = parsed;
      rateSlider.value = parsed;
      rateLabelEl.value = _fmtRateWin(parsed);
      chart._yMaxCache = undefined; chart._yRateMaxCache = undefined;
      if (currentQsos.length) updateLiveCharts();
    } else {
      rateLabelEl.value = _fmtRateWin(_liveState[id].rateWindowSecs);
    }
  });
  rateLabelEl.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); rateLabelEl.blur(); } });

  const pane = { id, el, chart, bandChart };
  _livePanes.push(pane);
  _rebalanceLayout();
  _updatePaneViewBtn();
  return pane;
}

// ---- パン（目盛りエリアドラッグ）----
window.addEventListener('mousemove', e => {
  let dragging = null, activePaneId = null;
  for (const p of _livePanes) {
    if (p.chart && p.chart._isDragging)     { dragging = p.chart;     activePaneId = p.id; break; }
    if (p.bandChart && p.bandChart._isDragging) { dragging = p.bandChart; activePaneId = p.id; break; }
  }
  if (!dragging || !activePaneId) return;
  const st = _liveState[activePaneId];
  const dx = e.clientX - dragging._dragStartX;
  dragging._dragStartX = e.clientX;
  const cw = dragging.chartArea ? dragging.chartArea.right - dragging.chartArea.left : 600;
  const nowMs = getNowMs();
  const curWinMs = st.customWin ? (st.customWin.max - st.customWin.min) : st.winMs;
  const dt = -dx * curWinMs / cw;
  if (st.customWin && st.mode === 'fixed') {
    st.customWin = { min: st.customWin.min + dt, max: st.customWin.max + dt };
  } else if (st.customWin && st.mode === 'scroll') {
    st.panOffset -= dx * st.winMs / cw;
  } else if (st.mode === 'fixed') {
    st.fixedRefNow = (st.fixedRefNow || nowMs) + dt;
  } else {
    st.panOffset += dt;
  }
  _clampLiveWin(activePaneId, nowMs);
});
window.addEventListener('mouseup', () => {
  for (const p of _livePanes) {
    if (p.chart)     p.chart._isDragging = false;
    if (p.bandChart) p.bandChart._isDragging = false;
  }
});

// ---- ペイン追加ボタン ----
document.getElementById('pane-add-btn').addEventListener('click', () => {
  _createLivePane(3 * 3600000);
  _updatePaneLogBtns();
});

// モバイル: 上部トグルボタン（ペインより上の領域を隠す/表示）
(function() {
  const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  if (!isTouch) return;

  const toggleBtn = document.createElement('button');
  toggleBtn.className = 'btn';
  toggleBtn.style.cssText = 'display:none;position:fixed;bottom:70px;left:10px;z-index:9999;font-size:12px;padding:4px 12px;';
  toggleBtn.textContent = '▲ 隠す';
  document.body.appendChild(toggleBtn);

  const panesContainer = document.getElementById('live-panes-container');
  function syncBtn() {
    const visible = panesContainer && panesContainer.style.display !== 'none';
    toggleBtn.style.display = visible ? '' : 'none';
  }
  syncBtn();
  if (panesContainer) {
    new MutationObserver(syncBtn).observe(panesContainer, { attributes: true, attributeFilter: ['style'] });
  }
  toggleBtn.addEventListener('click', () => {
    const hidden = document.body.classList.toggle('pane-top-hidden');
    toggleBtn.textContent = hidden ? '▼ 表示' : '▲ 隠す';
  });
})();

// ファイルロード時の処理：追加モードではライブ接続を維持、置換モードのみ切断する
const _wsOrigLoadText = loadText;
loadText = function(text) {
  // ライブエントリがある場合は追加モードの可能性があるため切断しない
  // 置換モードが選択された場合は loadText 内の置換ブランチで切断する
  if (!_logStore.find(l => l.isLive && !l.isGroup)) {
    if (wsSocket) wsDisconnect();
    wsLiveMode = false;
    wsQsos = [];
    if (_liveRafId) { cancelAnimationFrame(_liveRafId); _liveRafId = null; }
    for (const pane of [..._livePanes]) _destroyLivePane(pane.id);
  }
  _wsOrigLoadText(text);
};

// ---- ファイル再読み込みボタン ----
document.getElementById('reload-file-btn').addEventListener('click', () => {
  if (_lastLoadedText) loadText(_lastLoadedText);
});

// ---- SkookumNet接続通知コピーボタン ----

</script>
