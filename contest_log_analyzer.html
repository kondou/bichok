<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contest Log Analyzer</title>
<script src="chart.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f10;
  --bg2: #1a1a1c;
  --bg3: #232326;
  --border: rgba(255,255,255,0.1);
  --border2: rgba(255,255,255,0.18);
  --text: #e8e8e6;
  --text2: #8a8a88;
  --text3: #555553;
  --blue: #378ADD;
  --blue-dim: rgba(55,138,221,0.12);
  --accent: #5DCAA5;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 13px;
  height: 100vh;
  height: 100svh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  padding: 10px 20px;
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
  background: var(--bg);
}

.header-left {
  display: flex;
  align-items: baseline;
  gap: 10px;
}

.app-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.app-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.85);
}
@media (prefers-color-scheme: light) {
  .app-sub { color: rgba(0,0,0,0.7); }
  .stat-label { color: rgba(0,0,0,0.65); }
}

/* ペイン全画面モード：上部を非表示にしてペインに最大領域を与える */
body.pane-top-hidden header,
body.pane-top-hidden #stats-bar,
body.pane-top-hidden #sim-bar,
body.pane-top-hidden .controls,
body.pane-top-hidden #log-panel {
  display: none !important;
}


@media (max-width: 640px) {
  body { overflow-x: hidden; }
  header {
    flex-wrap: wrap;
    padding: 6px 10px;
    gap: 4px;
  }
  #header-title-wrap {
    position: static !important;
    transform: none !important;
    left: auto !important;
    flex: 1 1 100%;
    justify-content: center;
    order: -1;
  }
  .header-right {
    flex-wrap: wrap;
    gap: 4px;
    justify-content: flex-end;
  }
  .header-right .btn, .header-right label.btn {
    font-size: 10px !important;
    padding: 3px 6px !important;
  }

  /* 統計バー：縦幅を半減 */
  .stat-cell {
    padding: 4px 8px;
  }
  .stat-value {
    font-size: 13px;
  }

  /* コントロールバー：パディング・ギャップを縮小 */
  .controls {
    padding: 5px 10px;
    gap: 8px;
  }

  /* シミュレーションバー：縦幅を縮小 */
  #sim-bar {
    padding: 3px 10px !important;
    gap: 6px !important;
  }

}

.header-right {
  display: flex;
  gap: 8px;
  align-items: center;
  position: relative;
  z-index: 2;
}

/* コンパクトモード */
body.compact #stats-bar,
body.compact #sim-bar,
body.compact .log-panel { display: none !important; }
body.compact #compact-btn { opacity: 1; color: var(--accent); border-color: var(--accent); }

.btn {
  font-family: inherit;
  font-size: 11px;
  padding: 5px 12px;
  border: 0.5px solid var(--border2);
  border-radius: 5px;
  background: var(--bg3);
  color: var(--text2);
  cursor: pointer;
  transition: background 0.1s, color 0.1s, border-color 0.1s;
}
.btn:hover { background: var(--bg2); color: var(--text); border-color: var(--border2); }
.btn.active { background: var(--bg2); color: var(--text); border-color: rgba(255,255,255,0.3); }
.trend-toggle { opacity: 0.35; }
.trend-toggle.active { opacity: 1; }

.stats-bar {
  display: flex;
  gap: 1px;
  background: var(--border);
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
}

.stat-cell {
  flex: 1;
  padding: 8px 16px;
  background: var(--bg);
}

.stat-label {
  font-size: 10px;
  color: rgba(255,255,255,0.75);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 2px;
}

.stat-value {
  font-size: 18px;
  font-weight: 500;
  color: var(--text);
}

.stat-value.highlight { color: var(--accent); }

.controls {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 8px 20px;
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.ctrl-group {
  display: flex;
  align-items: center;
  gap: 6px;
}

.ctrl-label {
  font-size: 10px;
  color: var(--text2);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.charts-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 12px 20px;
  gap: 10px;
  overflow-x: hidden;
  overflow-y: auto;
  min-height: 0;
}

#live-panes-container { min-height: 240px !important; }
.live-pane-main       { min-height: 120px !important; }
.live-pane-band       { min-height:  90px !important; }
.live-pane-band .chart-wrap { min-height: 60px !important; }
#cumul-section        { min-height: 200px !important; }
#rate-section         { min-height: 120px !important; }

.chart-wrap {
  position: relative;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

.chart-wrap.rate-wrap {
  flex: 1;
}

.chart-label {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.drop-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15,15,16,0.85);
  z-index: 100;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--blue);
  border: 2px dashed var(--blue);
}

.drop-overlay.visible { display: flex; }

.empty-msg {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 8px;
  color: var(--text3);
}

.empty-msg .big { font-size: 15px; color: var(--text2); }

/* ===== ログ管理パネル ===== */
.log-panel {
  display: none;
  flex-shrink: 0;
  flex-wrap: wrap;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-bottom: 0.5px solid var(--border);
  background: var(--bg2);
}
.log-entry {
  display: flex;
  align-items: center;
  gap: 4px;
  background: var(--bg3);
  border: 0.5px solid var(--border);
  border-radius: 5px;
  padding: 2px 5px;
  font-size: 10px;
  user-select: none;
}
.log-entry.log-hidden { opacity: 0.4; }
.log-swatch {
  width: 10px; height: 10px;
  border-radius: 2px;
  flex-shrink: 0;
  cursor: pointer;
  border: 0.5px solid rgba(255,255,255,0.15);
}
.log-ref-btn {
  font-size: 9px;
  padding: 0 3px;
  border-radius: 3px;
  border: 0.5px solid var(--text3);
  color: var(--text3);
  background: transparent;
  cursor: pointer;
  line-height: 1.5;
}
.log-ref-btn.active {
  border-color: var(--accent);
  color: var(--accent);
}
.log-anchor-sel {
  background: transparent;
  border: none;
  border-bottom: 0.5px solid var(--border2);
  color: var(--text2);
  font-size: 10px;
  font-family: inherit;
  cursor: pointer;
  outline: none;
  padding: 0;
}
.log-offset-input {
  width: 50px;
  background: transparent;
  border: none;
  border-bottom: 0.5px solid var(--border2);
  color: var(--text2);
  font-size: 10px;
  font-family: inherit;
  text-align: center;
  outline: none;
  padding: 0;
}
.log-del-btn {
  font-size: 11px;
  line-height: 1;
  color: #e05555;
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 0 2px;
  opacity: 0.7;
}
.log-del-btn:hover { opacity: 1; }
.log-group-entry {
  border-style: dashed;
  border-color: rgba(93,202,165,0.5);
}

.band-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  padding: 4px 0;
  font-size: 10px;
  color: var(--text2);
}

.band-dot {
  width: 8px; height: 8px;
  border-radius: 2px;
  display: inline-block;
  margin-right: 3px;
  vertical-align: middle;
}

/* === SkookumNet WebSocket Bridge UI === */
.ws-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--text3);
  flex-shrink: 0;
  transition: background 0.3s;
}
.ws-dot.connected { background: var(--accent); box-shadow: 0 0 5px var(--accent); }
.ws-dot.connecting { background: #D85A30; animation: ws-blink 0.7s infinite; }
.ws-dot.error { background: #E24B4A; }
@keyframes ws-blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
@keyframes blink { 50% { opacity: 0; } }
.ws-live-badge {
  display: none;
  font-size: 9px;
  color: var(--accent);
  border: 0.5px solid var(--accent);
  border-radius: 3px;
  padding: 1px 4px;
  letter-spacing: 0.07em;
  animation: ws-blink 1.6s infinite;
}
.ws-live-badge.visible { display: inline; }
.ws-panel {
  display: none;
  position: fixed;
  top: 44px; right: 16px;
  z-index: 300;
  background: var(--bg2);
  border: 0.5px solid var(--border2);
  border-radius: 8px;
  padding: 14px 16px;
  min-width: 270px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.65);
}
.ws-panel.open { display: block; }
.ws-panel-title {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.09em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.ws-url-row {
  display: flex;
  gap: 6px;
  align-items: center;
  margin-bottom: 10px;
}
.ws-url-input {
  flex: 1;
  font-family: inherit;
  font-size: 11px;
  padding: 5px 8px;
  border: 0.5px solid var(--border2);
  border-radius: 4px;
  background: var(--bg3);
  color: var(--text);
  outline: none;
}
.ws-url-input:focus { border-color: var(--accent); }
.ws-status-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
}
.ws-qso-count { color: var(--accent); font-weight: 500; }

/* === Contest range inputs === */
.range-input {
  font-family: inherit;
  font-size: 11px;
  padding: 4px 6px;
  border: 0.5px solid var(--border2);
  border-radius: 4px;
  background: var(--bg3);
  color: var(--text);
  outline: none;
  color-scheme: dark;
}
.range-input:focus { border-color: var(--accent); }
.range-input::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="app-sub" id="format-label">Cabrillo / ADIF</span>
  </div>
  <div id="header-title-wrap" style="position:absolute;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px;">
    <span class="app-title" id="contest-title">Contest Log Analyzer</span>
  </div>
  <div class="header-right">
    <button class="btn" id="ws-toggle-btn" style="display:flex;align-items:center;gap:6px;padding:4px 10px;" data-i18n-title="wsToggleBtnTitle" title="SkookumNetライブ接続パネルを開く">
      <span class="ws-dot" id="ws-dot"></span>
      <span>SkookumNet</span>
      <span class="ws-live-badge" id="ws-live-badge">LIVE</span>
    </button>
    <label class="btn" style="cursor:pointer;padding:4px 8px;display:inline-block;line-height:1.4;">
      <span data-i18n="openFile">ファイルを開く</span>
      <input type="file" id="file-input" accept="*/*" style="display:none;">
    </label>
    <button class="btn" id="reload-file-btn" data-i18n-title="reloadFileTitle" title="ファイルを再読み込み" style="display:none; font-size:15px; padding:2px 8px; line-height:1.4;">↺</button>
    <button class="btn" id="log-panel-btn" data-i18n-title="logPanelBtnTitle" title="ログ管理パネル" style="font-size:11px; padding:4px 8px;">Logs</button>
    <input type="file" id="log-add-input" accept="*/*" style="display:none;">
    <button class="btn" id="lang-btn" style="font-size:13px; padding:4px 8px;" data-i18n-title="langBtnTitle" title="切替: 日本語 / English">EN</button>
    <button class="btn" id="session-save-btn" style="padding:4px 8px; font-size:10px;" data-i18n="sessionSave" data-i18n-title="sessionSaveTitle" title="">保存</button>
    <button class="btn" id="session-restore-btn" style="padding:4px 8px; font-size:10px;" data-i18n="sessionRestore" data-i18n-title="sessionRestoreTitle" title="">復元</button>
    <button class="btn" id="compact-btn" style="padding:4px 8px; font-size:13px;" data-i18n-title="compactBtnTitle" title="コンパクトモード切替">⊡</button>
    <button class="btn" id="doc-btn" style="padding:4px 8px; font-size:10px;" data-i18n-title="docBtnTitle" title="マニュアルを開く">Doc</button>
  </div>
</header>

<div class="ws-panel" id="ws-panel">
  <div class="ws-panel-title">SkookumNet Live</div>
  <div class="ws-url-row">
    <input class="ws-url-input" id="ws-url" value="ws://localhost:2237" spellcheck="false">
    <button class="btn" id="ws-connect-btn" style="white-space:nowrap;" data-i18n="wsConnect">接続</button>
  </div>
  <div class="ws-status-row">
    <span id="ws-status-text" style="color:var(--text3);">—</span>
    <span class="ws-qso-count" id="ws-qso-count" style="display:none;"></span>
  </div>
</div>

<div class="stats-bar" id="stats-bar" style="display:none;">
  <div class="stat-cell">
    <div class="stat-label" data-i18n="totalQso">総QSO数</div>
    <div class="stat-value highlight" id="stat-total">—</div>
  </div>
  <div class="stat-cell">
    <div class="stat-label" data-i18n="peakRate">最高レート</div>
    <div class="stat-value" id="stat-peak">—</div>
  </div>
  <div class="stat-cell">
    <div class="stat-label" data-i18n="opHours">運用時間</div>
    <div class="stat-value" id="stat-hours">—</div>
  </div>
  <div class="stat-cell">
    <div class="stat-label" data-i18n="avgRate">平均レート</div>
    <div class="stat-value" id="stat-avg">—</div>
  </div>
  <div class="stat-cell">
    <div class="stat-label" data-i18n="callsign">コールサイン</div>
    <div class="stat-value" id="stat-call" style="font-size:14px;">—</div>
  </div>
</div>

<!-- シミュレーションスライダー（ADIF/Cabrillo読み込み時に表示） -->
<div id="sim-bar" style="display:none; align-items:center; gap:8px; padding:5px 12px; background:rgba(255,80,80,0.07); border-top:0.5px solid rgba(255,80,80,0.2); flex-wrap:wrap;">
  <button id="sim-play-btn" class="btn" style="min-width:34px; font-size:14px; padding:2px 8px; line-height:1.4;">▶</button>
  <div style="display:flex; gap:3px;">
    <button class="btn sim-speed-btn active" data-wall="30000"  style="font-size:10px; padding:2px 6px;">30s</button>
    <button class="btn sim-speed-btn"        data-wall="60000"  style="font-size:10px; padding:2px 6px;">1m</button>
    <button class="btn sim-speed-btn"        data-wall="300000" style="font-size:10px; padding:2px 6px;">5m</button>
    <button class="btn sim-speed-btn"        data-wall="rt"     style="font-size:10px; padding:2px 6px;" data-i18n="rtSpeed">実時間</button>
  </div>
  <span id="sim-time-label" style="font-size:11px; font-family:'SF Mono','Fira Code',monospace; min-width:90px; color:rgba(255,80,80,0.9);">—</span>
  <input type="range" id="sim-slider" min="0" max="1000000" value="1000000" style="flex:1; min-width:120px; accent-color:#E24B4A; cursor:pointer; height:16px;">
  <span id="sim-end-label" style="font-size:11px; font-family:'SF Mono','Fira Code',monospace; min-width:55px; text-align:right; color:rgba(255,255,255,0.4);">—</span>
</div>

<div class="controls">
  <div class="ctrl-group">
    <span class="ctrl-label" data-i18n="view">表示</span>
    <button class="btn view-btn active" data-view="full" data-i18n="viewFull">全体</button>
    <button class="btn view-btn" id="pane-view-btn" data-view="live3h" data-i18n="viewPane">ペイン</button>
    <button class="btn" id="band-toggle-btn" data-i18n="viewBand">+バンド別</button>
  </div>
  <div class="ctrl-group" style="gap:4px;">
    <button class="btn trend-toggle active" id="toggle-rate"  style="font-size:10px;padding:1px 7px;border-color:#4fc3f7;color:#4fc3f7;" data-i18n-title="rateTitle" title="レート表示">Rate</button>
    <button class="btn trend-toggle" id="toggle-ema"   style="font-size:10px;padding:1px 7px;border-color:#00e5ff;color:#00e5ff;" data-i18n-title="emaTitle" title="指数移動平均">EMA</button>
    <button class="btn trend-toggle" id="toggle-loess" style="font-size:10px;padding:1px 7px;border-color:#69f0ae;color:#69f0ae;" data-i18n-title="loessTitle" title="局所回帰">LOESS</button>
    <button class="btn trend-toggle active" id="toggle-accel" style="font-size:10px;padding:1px 7px;border-color:#ffd600;color:#ffd600;" data-i18n-title="accelTitle" title="レート変化加速度">ACCEL</button>
  </div>
  <div class="ctrl-group" style="gap:8px;">
    <span class="ctrl-label" data-i18n="rightRate" data-i18n-title="rateWindowTitle" title="">ベースレート</span>
    <input type="range" id="rate-window" min="1" max="7200" value="600" step="1"
      style="flex:1;min-width:60px;max-width:480px;accent-color:#5DCAA5;">
    <input type="text" id="rate-window-label" value="10:00" style="font-size:11px;color:var(--text2);width:44px;background:transparent;border:none;border-bottom:1px solid var(--text2);text-align:center;outline:none;padding:0;cursor:text;">
    <button class="btn" id="rate-window-reset" data-i18n-title="rateWindowReset" style="font-size:18px; line-height:1; padding:2px 8px;">↺</button>
  </div>
  <div class="ctrl-group" style="gap:6px;">
    <span class="ctrl-label" data-i18n="gridLabel">グリッド</span>
    <input type="text" id="grid-input" class="range-input" placeholder="AA00AA" maxlength="6"
      style="width:72px; text-transform:uppercase;" data-i18n-title="gridTitle" title="グリッドロケーター（ログに含まれない場合に使用）">
  </div>
  <div class="ctrl-group" style="gap:6px;">
    <span class="ctrl-label">UTC</span>
    <input type="text" id="contest-start" class="range-input" placeholder="YYYY-MM-DD HH:MM" data-i18n-title="contestStart" title="コンテスト開始 (UTC)" style="width:130px;">
    <span style="color:var(--text3);align-self:center;">—</span>
    <input type="text" id="contest-end" class="range-input" placeholder="YYYY-MM-DD HH:MM" data-i18n-title="contestEnd" title="コンテスト終了 (UTC)" style="width:130px;">
    <button class="btn" id="range-apply-btn" data-i18n="rangeApply" style="padding:5px 10px; color:var(--accent); border-color:var(--accent);">適用</button>
    <button class="btn" id="range-clear-btn" data-i18n-title="rangeClear" style="display:none; padding:3px 8px; font-size:18px; line-height:1; color:#e05555; border-color:#e05555;" title="範囲クリア">✕</button>
    <button class="btn" id="offtime-skip-btn" style="display:none; padding:5px 10px;" data-i18n="offtimeSkip" data-i18n-title="offtimeSkipTitle" title="Off Time区間をレート計算から除外するかどうか切り替え">Off Timeスキップ</button>
  </div>
</div>

<!-- カスタム確認ダイアログ -->
<div id="custom-confirm-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:99999;align-items:center;justify-content:center;">
  <div style="background:#2a2a2d;border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:24px 28px;min-width:320px;max-width:480px;box-shadow:0 8px 32px rgba(0,0,0,0.7);color:var(--text);font-family:inherit;font-size:13px;">
    <div id="custom-confirm-msg" style="white-space:pre-line;line-height:1.6;margin-bottom:20px;"></div>
    <div style="display:flex;justify-content:flex-end;gap:8px;">
      <button id="custom-confirm-cancel" class="btn" style="padding:5px 16px;"></button>
      <button id="custom-confirm-ok" class="btn" style="padding:5px 16px;background:var(--blue-dim);border-color:var(--blue);color:#fff;"></button>
    </div>
  </div>
</div>

<!-- ログ管理パネル -->
<div class="log-panel" id="log-panel">
  <button class="btn" id="log-add-btn" style="font-size:10px;padding:2px 8px;flex-shrink:0;" data-i18n="logAdd">＋ログ追加</button>
  <button class="btn" id="log-group-btn" style="font-size:10px;padding:2px 8px;flex-shrink:0;display:none;" data-i18n="logGroupBtn">グループ化</button>

<script>

// グリッドロケーター -> 緯度経度
function gridToLatLon(grid) {
  if (!grid || grid.length < 4) return null;
  const g = grid.toUpperCase();
  const lon = (g.charCodeAt(0) - 65) * 20 - 180 + (parseInt(g[2]) * 2);
  const lat = (g.charCodeAt(1) - 65) * 10 - 90  + (parseInt(g[3]) * 1);
  // 6文字あればさらに精度向上
  const lonOff = grid.length >= 6 ? (g.charCodeAt(4) - 65) * 2 / 24 : 1.0;
  const latOff = grid.length >= 6 ? (g.charCodeAt(5) - 65) * 1 / 24 : 0.5;
  return { lat: lat + latOff, lon: lon + lonOff };
}

// 日の出・日没をUTC msで返す (NOAA式簡易計算)
// 戻り値: { sunrise: ms or null, sunset: ms or null }
function calcSunriseSunset(dateMs, lat, lon) {
  const D2R = Math.PI / 180;
  const date = new Date(dateMs);
  const year  = date.getUTCFullYear();
  const month = date.getUTCMonth() + 1;
  const day   = date.getUTCDate();

  // ユリウス通日(整数) - NOAA式はJDNを正午基準の整数で使う
  const A   = Math.floor((14 - month) / 12);
  const Y   = year + 4800 - A;
  const M   = month + 12 * A - 3;
  const JDN = day + Math.floor((153 * M + 2) / 5) + 365 * Y +
              Math.floor(Y / 4) - Math.floor(Y / 100) + Math.floor(Y / 400) - 32045;

  // J2000.0からの整数日
  const n = JDN - 2451545;

  const Jstar   = n - lon / 360.0;
  const M_sun   = ((357.5291 + 0.98560028 * Jstar) % 360 + 360) % 360;
  const C       = 1.9148 * Math.sin(M_sun * D2R)
                + 0.0200 * Math.sin(2 * M_sun * D2R)
                + 0.0003 * Math.sin(3 * M_sun * D2R);
  const lam     = (M_sun + C + 180 + 102.9372) % 360;
  const Jtransit = 2451545.0 + Jstar
                 + 0.0053 * Math.sin(M_sun * D2R)
                 - 0.0069 * Math.sin(2 * lam * D2R);

  const sinDec = Math.sin(lam * D2R) * Math.sin(23.4397 * D2R);
  const cosDec = Math.cos(Math.asin(sinDec));
  const cosH   = (Math.sin(-0.833 * D2R) - Math.sin(lat * D2R) * sinDec)
               / (Math.cos(lat * D2R) * cosDec);

  if (cosH < -1) return { sunrise: null, sunset: null }; // 極昼
  if (cosH >  1) return { sunrise: null, sunset: null }; // 極夜

  const H     = Math.acos(cosH) * (180 / Math.PI);
  const Jrise = Jtransit - H / 360.0;
  const Jset  = Jtransit + H / 360.0;

  const jdToMs = jd => (jd - 2440587.5) * 86400000;
  return { sunrise: jdToMs(Jrise), sunset: jdToMs(Jset) };
}

// コンテスト期間中の全日付の日の出・日没リストを生成
function buildSunEvents(qsos, lat, lon) {
  if (!qsos.length) return [];
  const startDay = Math.floor(qsos[0].time.getTime() / 86400000) * 86400000;
  const endDay   = Math.floor(qsos[qsos.length-1].time.getTime() / 86400000) * 86400000;
  const events = [];
  for (let d = startDay; d <= endDay + 86400000; d += 86400000) {
    const { sunrise, sunset } = calcSunriseSunset(d, lat, lon);
    if (sunrise) events.push({ ms: sunrise, type: 'rise' });
    if (sunset)  events.push({ ms: sunset,  type: 'set'  });
  }
  events.sort((a, b) => a.ms - b.ms);
  return events;
}

// 日照背景プラグイン
// ライブチャート向け日照オーバーレイ描画 (任意のdMin/dMaxで呼び出し可能)
function _drawDaylightOverlay(ctx, ca, dMin, dMax) {
  if (!sunEvents || !sunEvents.length) return;
  if (dMax <= dMin) return;
  const { left, right, top, bottom } = ca;
  const width = right - left;
  const height = bottom - top;

  ctx.save();
  ctx.beginPath();
  ctx.rect(left, top, width, height);
  ctx.clip();

  ctx.fillStyle = 'rgba(10, 20, 60, 0.45)';
  ctx.fillRect(left, top, width, height);

  let inDay = false;
  for (let i = 0; i < sunEvents.length; i++) {
    if (sunEvents[i].ms <= dMin) inDay = (sunEvents[i].type === 'rise');
  }

  let segStart = dMin;
  const allPts = [
    ...sunEvents.filter(e => e.ms > dMin && e.ms < dMax),
    { ms: dMax, type: 'end' }
  ];

  for (const ev of allPts) {
    const segEnd = Math.min(ev.ms, dMax);
    const px1 = left + (segStart - dMin) / (dMax - dMin) * width;
    const px2 = left + (segEnd   - dMin) / (dMax - dMin) * width;

    if (inDay) {
      ctx.fillStyle = 'rgba(255, 200, 80, 0.10)';
      ctx.fillRect(px1, top, px2 - px1, height);
    }

    if (ev.type === 'rise' || ev.type === 'set') {
      const twilightMs = 30 * 60000;
      const t1 = Math.max(dMin, ev.ms - twilightMs);
      const t2 = Math.min(dMax, ev.ms + twilightMs);
      const gx1 = left + (t1 - dMin) / (dMax - dMin) * width;
      const gx2 = left + (t2 - dMin) / (dMax - dMin) * width;
      if (gx2 > gx1) {
        const grad = ctx.createLinearGradient(gx1, 0, gx2, 0);
        if (ev.type === 'rise') {
          grad.addColorStop(0,   'rgba(0,0,0,0)');
          grad.addColorStop(0.5, 'rgba(220,100,20,0.35)');
          grad.addColorStop(1,   'rgba(0,0,0,0)');
        } else {
          grad.addColorStop(0,   'rgba(0,0,0,0)');
          grad.addColorStop(0.5, 'rgba(200,80,20,0.35)');
          grad.addColorStop(1,   'rgba(0,0,0,0)');
        }
        ctx.fillStyle = grad;
        ctx.fillRect(gx1, top, gx2 - gx1, height);
      }
    }

    segStart = ev.ms;
    if (ev.type === 'rise') inDay = true;
    if (ev.type === 'set')  inDay = false;
  }

  ctx.restore();
}

const daylightPlugin = {
  id: 'daylight',
  beforeDraw(chart) {
    try {
    if (chart._isLiveChart) return;  // ライブチャートはRAFオーバーレイで日照を描画
    if (!sunEvents || !sunEvents.length) return;
    const { ctx, chartArea, scales } = chart;
    if (!chartArea || !scales || !scales.x) return;
    _drawDaylightOverlay(ctx, chartArea, scales.x.min, scales.x.max);
    } catch(e) { console.warn('daylightPlugin error:', e.message); }
  }
};
Chart.register(daylightPlugin);


// ドラッグ選択ズームプラグイン（横方向のみ）
// 両グラフに適用し、ズーム範囲を同期する
let dragZoomState = { active: false, startX: null, startMs: null };

// ツールチップをマウスカーソル位置に表示するカスタムpositioner
Chart.Tooltip.positioners.cursor = function(elements, eventPosition) {
  return {
    x: eventPosition.x,
    y: eventPosition.y
  };
};

const dragZoomPlugin = {
  id: 'dragZoom',
  afterInit(chart) {
    const canvas = chart.canvas;

    canvas.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const ca = chart.chartArea;
      if (!ca || x < ca.left || x > ca.right) return;
      if (y > ca.bottom) return;  // 目盛りエリアはパン担当
      let startMs;
      if (chart._isLiveChart && chart._drawXMin !== undefined) {
        startMs = chart._drawXMin + (x - ca.left) / (ca.right - ca.left) * (chart._drawXMax - chart._drawXMin);
      } else {
        startMs = chart.scales.x.getValueForPixel(x);
      }
      dragZoomState = { active: true, chart, startX: x, startMs };
      canvas.style.cursor = 'col-resize';
      e.preventDefault();
    });

    canvas.addEventListener('mousemove', e => {
      if (!dragZoomState.active || dragZoomState.chart !== chart) return;
      chart._dragX = e.clientX - canvas.getBoundingClientRect().left;
      if (!chart._isLiveChart) chart.draw();
    });

    canvas.addEventListener('mouseup', e => {
      if (!dragZoomState.active || dragZoomState.chart !== chart) return;
      canvas.style.cursor = '';
      const rect = canvas.getBoundingClientRect();
      const ca = chart.chartArea;
      const endX = e.clientX - rect.left;
      let endMs;
      if (chart._isLiveChart && chart._drawXMin !== undefined && ca) {
        endMs = chart._drawXMin + (endX - ca.left) / (ca.right - ca.left) * (chart._drawXMax - chart._drawXMin);
      } else {
        endMs = chart.scales.x.getValueForPixel(endX);
      }
      const rawMs1 = Math.min(dragZoomState.startMs, endMs);
      const rawMs2 = Math.max(dragZoomState.startMs, endMs);
      chart._dragX = null;
      dragZoomState = { active: false };

      if (chart._isLiveChart) {
        if (rawMs2 - rawMs1 >= 60000) {
          _setLiveZoom(chart._liveKey, { min: rawMs1, max: rawMs2 });
        }
        chart.draw();
        return;
      }
      // 通常チャート: ズーム処理
      const ms1 = Math.max(rawMs1, globalStartMs);
      const ms2 = Math.min(rawMs2, globalEndMs);
      if (Math.abs(ms2 - ms1) < 60000) { chart.draw(); return; }
      applyZoom(ms1, ms2);
    });

    canvas.addEventListener('mouseleave', () => {
      if (dragZoomState.active && dragZoomState.chart === chart) {
        chart._dragX = null;
        dragZoomState = { active: false };
        canvas.style.cursor = '';
        chart.draw();
      }
    });

    // タッチ対応: 水平スワイプでドラッグズーム
    canvas.addEventListener('touchstart', e => {
      if (e.touches.length !== 1) return;
      const t = e.touches[0];
      const rect = canvas.getBoundingClientRect();
      const x = t.clientX - rect.left;
      const y = t.clientY - rect.top;
      const ca = chart.chartArea;
      if (!ca || x < ca.left || x > ca.right || y > ca.bottom) return;
      chart._touchZoomPending = { startClientX: t.clientX, startClientY: t.clientY, startX: x };
      e.preventDefault(); // テキスト選択・ゴーストマウスイベントを防ぐ
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
      if (e.touches.length !== 1) return;
      const t = e.touches[0];
      if (chart._touchZoomPending && !(dragZoomState.active && dragZoomState.chart === chart)) {
        const dx = Math.abs(t.clientX - chart._touchZoomPending.startClientX);
        const dy = Math.abs(t.clientY - chart._touchZoomPending.startClientY);
        if (dx < 8 && dy < 8) return;
        if (dx > dy) {
          const ca = chart.chartArea;
          const x = chart._touchZoomPending.startX;
          let startMs;
          if (chart._isLiveChart && chart._drawXMin !== undefined) {
            startMs = chart._drawXMin + (x - ca.left) / (ca.right - ca.left) * (chart._drawXMax - chart._drawXMin);
          } else if (chart.scales && chart.scales.x) {
            startMs = chart.scales.x.getValueForPixel(x);
          }
          if (startMs !== undefined) dragZoomState = { active: true, chart, startX: x, startMs };
        }
        chart._touchZoomPending = null;
      }
      if (!dragZoomState.active || dragZoomState.chart !== chart) return;
      chart._dragX = t.clientX - canvas.getBoundingClientRect().left;
      if (!chart._isLiveChart) chart.draw();
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
      chart._touchZoomPending = null;
      if (!dragZoomState.active || dragZoomState.chart !== chart) return;
      const t = e.changedTouches[0];
      const rect = canvas.getBoundingClientRect();
      const ca = chart.chartArea;
      const endX = t.clientX - rect.left;
      let endMs;
      if (chart._isLiveChart && chart._drawXMin !== undefined && ca) {
        endMs = chart._drawXMin + (endX - ca.left) / (ca.right - ca.left) * (chart._drawXMax - chart._drawXMin);
      } else if (chart.scales && chart.scales.x) {
        endMs = chart.scales.x.getValueForPixel(endX);
      }
      const rawMs1 = Math.min(dragZoomState.startMs, endMs);
      const rawMs2 = Math.max(dragZoomState.startMs, endMs);
      chart._dragX = null;
      dragZoomState = { active: false };
      if (chart._isLiveChart) {
        if (rawMs2 - rawMs1 >= 60000) _setLiveZoom(chart._liveKey, { min: rawMs1, max: rawMs2 });
        chart.draw();
        return;
      }
      const ms1 = Math.max(rawMs1, globalStartMs);
      const ms2 = Math.min(rawMs2, globalEndMs);
      if (Math.abs(ms2 - ms1) < 60000) { chart.draw(); return; }
      applyZoom(ms1, ms2);
    });
  },

  afterDraw(chart) {
    if (!chart._dragX || !dragZoomState.active || dragZoomState.chart !== chart) return;
    const { ctx, chartArea: { top, bottom } } = chart;
    const x1 = dragZoomState.startX;
    const x2 = chart._dragX;
    ctx.save();
    ctx.fillStyle = 'rgba(55,138,221,0.15)';
    ctx.fillRect(Math.min(x1,x2), top, Math.abs(x2-x1), bottom-top);
    ctx.strokeStyle = 'rgba(55,138,221,0.6)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x1, top); ctx.lineTo(x1, bottom);
    ctx.moveTo(x2, top); ctx.lineTo(x2, bottom);
    ctx.stroke();
    ctx.restore();
  }
};
Chart.register(dragZoomPlugin);

// 3hチャート専用ズーム矩形描画プラグイン（新アーキテクチャのライブチャートはスキップ）
const live3hZoomPlugin = {
  id: 'live3hZoom',
  afterDraw(chart) {
    // ライブチャートはRAFループで描画するため何もしない
    if (chart._isLiveChart) return;
  }
};
Chart.register(live3hZoomPlugin);

let sharedCrosshairMs = null; // 両グラフ共有の時刻(ms)
let _tooltipAutoHideTimer = null;
let _suppressTooltip = false; // external callback によるツールチップ再表示を抑制するフラグ

function _hideSharedTooltip() {
  if (_tooltipAutoHideTimer) { clearTimeout(_tooltipAutoHideTimer); _tooltipAutoHideTimer = null; }
  sharedCrosshairMs = null;
  _suppressTooltip = true;
  const tip = document.getElementById('bar-tooltip');
  if (tip) tip.style.display = 'none';
  try { if (typeof cumulChart !== 'undefined' && cumulChart) cumulChart.canvas.dispatchEvent(new MouseEvent('mouseout', {bubbles: false})); } catch(e_) {}
  try { if (typeof rateChart  !== 'undefined' && rateChart)  rateChart.canvas.dispatchEvent(new MouseEvent('mouseout', {bubbles: false})); } catch(e_) {}
}

function _scheduleTooltipHide(ms) {
  if (_tooltipAutoHideTimer) clearTimeout(_tooltipAutoHideTimer);
  _tooltipAutoHideTimer = setTimeout(_hideSharedTooltip, ms || 3000);
}

const crosshairPlugin = {
  id: 'crosshair',
  afterDraw(chart) {
    try {
      if (sharedCrosshairMs === null) return;
      const { ctx, chartArea, scales } = chart;
      if (!chartArea || !scales.x) return;
      const { top, bottom, left, right } = chartArea;
      const x = left + (sharedCrosshairMs - scales.x.min) / (scales.x.max - scales.x.min) * (right - left);
      if (x < left || x > right) return;
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(x, top);
      ctx.lineTo(x, bottom);
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 3]);
      ctx.stroke();
      ctx.restore();
      // cumulChartの場合、最近傍の積算ポイントをハイライト
      if (typeof cumulChart !== 'undefined' && chart === cumulChart) {
        const cd = chart.data.datasets[0] ? chart.data.datasets[0].data : null;
        if (cd && cd.length && chart.scales.y) {
          let lo = 0, hi = cd.length - 1, best = 0;
          while (lo <= hi) { const mid = (lo + hi) >> 1; if (cd[mid].x <= sharedCrosshairMs) { best = mid; lo = mid + 1; } else hi = mid - 1; }
          const pt = cd[best];
          const px = left + (pt.x - scales.x.min) / (scales.x.max - scales.x.min) * (right - left);
          const py = chart.scales.y.getPixelForValue(pt.y);
          if (px >= left && px <= right && py >= top && py <= bottom) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(px, py, 5, 0, Math.PI * 2);
            ctx.strokeStyle = '#E24B4A';
            ctx.lineWidth = 2;
            ctx.setLineDash([]);
            ctx.stroke();
            ctx.fillStyle = 'rgba(226,75,74,0.25)';
            ctx.fill();
            ctx.restore();
          }
        }
      }
    } catch(e) {}
  },
  afterEvent(chart, args) {
    if (args.replay) return; // chart.update()によるリプレイは無視
    const e = args.event;
    if (e.type === 'mousemove' || e.type === 'mousedown') { // chart.update()によるリプレイイベントは無視
      _suppressTooltip = false; // 新しいインタラクションでフラグをリセット
      if (chart.scales && chart.scales.x) {
        sharedCrosshairMs = chart.scales.x.getValueForPixel(e.x);
      }
      // 両グラフを再描画（ライブチャートはRAFループが担当するためスキップ）
      if (cumulChart && cumulChart !== chart) cumulChart.draw();
      if (rateChart && rateChart !== chart) rateChart.draw();
      if (!chart._isLiveChart) chart.draw();
      _scheduleTooltipHide(3000);
    } else if (e.type === 'mouseout') {
      if (_tooltipAutoHideTimer) { clearTimeout(_tooltipAutoHideTimer); _tooltipAutoHideTimer = null; }
      sharedCrosshairMs = null;
      _suppressTooltip = true;
      const _tip = document.getElementById('bar-tooltip');
      if (_tip) _tip.style.display = 'none';
      if (cumulChart && cumulChart !== chart) cumulChart.draw();
      if (rateChart && rateChart !== chart) rateChart.draw();
      if (!chart._isLiveChart) chart.draw();
    }
  }
};
Chart.register(crosshairPlugin);

const BAND_COLORS = {
  '160':'#534AB7','80':'#1D9E75','60':'#2E8B57','40':'#D85A30','30':'#8B6914',
  '20':'#378ADD','17':'#5DCAA5','15':'#BA7517','12':'#D4537E','10':'#E24B4A',
  '6':'#9B59B6','2':'#1ABC9C','70cm':'#E67E22','23cm':'#E74C3C',
  '13cm':'#C0392B','9cm':'#F39C12','6cm':'#27AE60','3cm':'#2980B9','other':'#888780'
};

// バンド名を波長(m)に変換してソート順を決める
function bandToMeters(b) {
  const n = parseFloat(b);
  if (!isNaN(n)) return n; // 160, 80, 40... → そのまま
  // cm表記 (70cm, 23cm...)
  const cm = b.match(/^(\d+(?:\.\d+)?)cm$/);
  if (cm) return parseFloat(cm[1]) / 100;
  return 0;
}

// バンド表示名: 430MHz以上はcm表記
function bandLabel(b) {
  const cm = b.match(/^(\d+(?:\.\d+)?)cm$/);
  if (cm) return b; // すでにcm表記
  const n = parseFloat(b);
  if (isNaN(n)) return b;
  if (n < 1) return Math.round(n * 100) + 'cm'; // 0.7 → 70cm
  return b + 'm';
}

let currentLang = navigator.language.startsWith('ja') ? 'ja' : 'en';

function i18n(key, ...args) {
  const val = I18N[currentLang][key];
  return typeof val === 'function' ? val(...args) : (val || I18N.ja[key] || key);
}

function applyLang() {
  // data-i18n属性を持つ全要素を更新
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    const val = I18N[currentLang][key];
    if (val && typeof val === 'string') el.textContent = val;
  });
  document.querySelectorAll('[data-i18n-title]').forEach(el => {
    const key = el.dataset.i18nTitle;
    const val = I18N[currentLang][key];
    if (val && typeof val === 'string') el.title = val;
  });
  // 言語ボタンのフラグを切り替え
  const btn = document.getElementById('lang-btn');
  if (btn) btn.textContent = currentLang === 'ja' ? 'EN' : 'JA';
  // レートボタンのラベル更新
  document.querySelectorAll('.rate-btn[data-i18n-min]').forEach(btn => {
    btn.textContent = i18n('minBtn', btn.dataset.min);
  });
  // ペインごとのモードボタン・ズームリセットボタン（初期化前アクセスを防ぐためtry-catch）
  try {
    for (const pane of _livePanes) {
      const modeBtn = pane.el.querySelector('.pane-mode-btn');
      if (modeBtn) {
        const st = _liveState[pane.id];
        modeBtn.textContent = i18n(st && st.mode === 'scroll' ? 'live3hScroll' : 'live3hFollow');
        modeBtn.title = i18n('live3hModeTitle');
      }
      const zoomBtn = pane.el.querySelector('.pane-zoom-reset');
      if (zoomBtn) zoomBtn.textContent = i18n('zoomReset');
      const winSpan = pane.el.querySelector('[data-i18n="winLabel"]');
      if (winSpan) winSpan.textContent = i18n('winLabel');
      const rightRateSpan = pane.el.querySelector('[data-i18n="rightRate"]');
      if (rightRateSpan) rightRateSpan.textContent = i18n('rightRate');
      const closeBtn = pane.el.querySelector('.pane-close-btn');
      if (closeBtn) closeBtn.title = i18n('paneCloseTitle');
      const logSelBtn = pane.el.querySelector('.pane-log-sel-btn');
      if (logSelBtn) logSelBtn.title = i18n('paneLogSelTitle');
    }
    const paneAddBtn = document.getElementById('pane-add-btn');
    if (paneAddBtn) paneAddBtn.textContent = i18n('paneAdd');
  } catch(e) {}
  // ログ管理パネルを再描画（動的生成要素のi18n更新）
  try { if (typeof _renderLogPanel === 'function') _renderLogPanel(); } catch(e) {}
  // Off Timeトグルボタンのテキストを更新
  try { if (typeof _updateOffTimeToggle === 'function') _updateOffTimeToggle(); } catch(e) {}
  // グラフが存在すれば再描画（ラベル更新のため）
  if (typeof currentQsos !== 'undefined' && currentQsos.length) renderCharts(currentQsos);
  // ウィンドウラベル更新（renderCharts後に必ず上書き）
  const wl = document.getElementById('rate-window-label');
  if (wl) {
    const v = document.getElementById('rate-window');
    if (v) wl.value = _fmtRateWin(parseInt(v.value));
  }
}

// カスタム確認ダイアログ（ネイティブconfirm()の代替）
function _customConfirm(msg, okLabel, cancelLabel) {
  return new Promise(resolve => {
    const overlay = document.getElementById('custom-confirm-overlay');
    document.getElementById('custom-confirm-msg').textContent = msg;
    document.getElementById('custom-confirm-ok').textContent = okLabel || 'OK';
    document.getElementById('custom-confirm-cancel').textContent = cancelLabel || i18n('cancelBtn');
    overlay.style.display = 'flex';
    const cleanup = result => { overlay.style.display = 'none'; resolve(result); };
    document.getElementById('custom-confirm-ok').onclick = () => cleanup(true);
    document.getElementById('custom-confirm-cancel').onclick = () => cleanup(false);
  });
}

function freqToBand(khz) {
  if (khz >= 1800 && khz <= 2000) return '160';
  if (khz >= 3500 && khz <= 4000) return '80';
  if (khz >= 5250 && khz <= 5450) return '60';
  if (khz >= 7000 && khz <= 7300) return '40';
  if (khz >= 10100 && khz <= 10150) return '30';
  if (khz >= 14000 && khz <= 14350) return '20';
  if (khz >= 18068 && khz <= 18168) return '17';
  if (khz >= 21000 && khz <= 21450) return '15';
  if (khz >= 24890 && khz <= 24990) return '12';
  if (khz >= 28000 && khz <= 29700) return '10';
  if (khz >= 50000 && khz <= 54000) return '6';
  if (khz >= 144000 && khz <= 148000) return '2';
  if (khz >= 430000 && khz <= 440000) return '70cm';
  if (khz >= 1240000 && khz <= 1300000) return '23cm';
  if (khz >= 2300000 && khz <= 2450000) return '13cm';
  if (khz >= 3400000 && khz <= 3410000) return '9cm';
  if (khz >= 5650000 && khz <= 5850000) return '6cm';
  if (khz >= 10000000 && khz <= 10500000) return '3cm';
  return 'other';
}

function parseCabrillo(text) {
  const qsos = [];
  callsign = '';
  isAdif = false;
  const lines = text.split('\n');
  for (const line of lines) {
    const t = line.trim();
    if (t.startsWith('CALLSIGN:')) {
      callsign = t.replace('CALLSIGN:', '').trim();
    }
    if (t.startsWith('CONTEST:')) {
      contestName = t.replace('CONTEST:', '').trim();
    }
    if (t.startsWith('GRID-LOCATOR:')) {
      gridLocator = t.replace('GRID-LOCATOR:', '').trim().toUpperCase();
    }
    if (!t.startsWith('QSO:')) continue;
    const parts = t.split(/\s+/);
    if (parts.length < 5) continue;
    const freqKhz = parseInt(parts[1]);
    const mode = parts[2];
    const dateStr = parts[3];
    const timeStr = parts[4].padStart(4, '0');
    const band = freqToBand(freqKhz);
    const hh = parseInt(timeStr.slice(0, 2));
    const mm = parseInt(timeStr.slice(2, 4));
    let dateObj;
    if (dateStr.includes('-')) {
      const [y, mo, d] = dateStr.split('-').map(Number);
      dateObj = new Date(Date.UTC(y, mo - 1, d, hh, mm, 0));
    } else {
      dateObj = new Date(Date.UTC(2000, 0, 1, hh, mm, 0));
    }
    qsos.push({ time: dateObj, band, mode, freq: freqKhz });
  }
  qsos.sort((a, b) => a.time - b.time);
  return qsos;
}

function parseAdif(text) {
  const qsos = [];
  callsign = '';
  isAdif = true;

  // フィールド抽出ヘルパー: <FIELD:len>value または <FIELD:len:type>value
  function getField(record, name) {
    const re = new RegExp('<' + name + ':\\d+(?::[^>]*)?>([^<]*)', 'i');
    const m = record.match(re);
    return m ? m[1].trim() : null;
  }

  // ADIF: ヘッダー(<EOH>まで)をスキップしてQSOレコードを処理
  const body = text.includes('<EOH>') || text.includes('<eoh>')
    ? text.replace(/[\s\S]*?<eoh>/i, '')
    : text;

  // <EOR>でレコード分割
  const records = body.split(/<eor>/i);
  for (const rec of records) {
    if (!rec.trim()) continue;

    const dateStr = getField(rec, 'QSO_DATE');
    const timeStr = getField(rec, 'TIME_ON');
    const bandStr = getField(rec, 'BAND');
    const freqStr = getField(rec, 'FREQ');
    const contestStr = getField(rec, 'CONTEST_ID');
    const mode    = getField(rec, 'MODE') || '';
    const station = getField(rec, 'STATION_CALLSIGN') || getField(rec, 'OPERATOR') || '';

    if (!dateStr || !timeStr) continue;
    if (!callsign && station) callsign = station;
    if (!contestName && contestStr) contestName = contestStr;

    // DATE: YYYYMMDD, TIME_ON: HHMMSS or HHMM
    const y  = parseInt(dateStr.slice(0, 4));
    const mo = parseInt(dateStr.slice(4, 6));
    const d  = parseInt(dateStr.slice(6, 8));
    const hh = parseInt(timeStr.slice(0, 2));
    const mm = parseInt(timeStr.slice(2, 4));
    const ss = timeStr.length >= 6 ? parseInt(timeStr.slice(4, 6)) : 0;

    const dateObj = new Date(Date.UTC(y, mo - 1, d, hh, mm, ss));

    // バンド文字列を正規化: "15M"->"15", "20m"->"20", "1.8M"->"160"等
    // ADIFのBANDフィールドは "10M","15M","20M"等、整数メートル帯をそのまま使用
    let band = 'other';
    if (bandStr) {
      const bm = bandStr.trim().match(/^(\d+(?:\.\d+)?)\s*m$/i);
      if (bm) {
        const val = parseFloat(bm[1]);
        if (val >= 6) {
          band = String(Math.round(val)); // 6m, 10m, 15m... → そのまま
        } else if (val >= 0.5 && val < 6) {
          // 0.7m=70cm, 0.23m=23cm, 0.13m=13cm等 → cm表記に変換
          band = Math.round(val * 100) + 'cm';
        } else if (val < 0.5 && val >= 0.01) {
          band = Math.round(val * 100) + 'cm';
        } else if (val < 2.5) band = '160';
        else if (val < 4.5) band = '80';
        else if (val < 5.5) band = '60';
      }
    }

    const freqMhz = freqStr ? parseFloat(freqStr) : 0;
    qsos.push({ time: dateObj, band, mode, freq: freqMhz });
  }

  // グリッドロケーターを取得(最初のQSOから)
  if (!gridLocator) {
    const firstRec = records.find(r => r.trim());
    if (firstRec) {
      const gl = getField(firstRec, 'MY_GRIDSQUARE');
      if (gl) gridLocator = gl.toUpperCase().slice(0, 6);
    }
  }

  qsos.sort((a, b) => a.time - b.time);
  return qsos;
}

function detectAndParse(text) {
  gridLocator = '';
  sunEvents = null;
  // ログ解析後にフォールバックするため先に手動入力値を更新
  manualGridLocator = (document.getElementById('grid-input')?.value || '').trim().toUpperCase();
  contestName = '';
  contestYear = '';
  // ADIFの判別: <EOH>/<EOR>タグが存在するか、または.adi/.adif拡張子
  if (/<eoh>/i.test(text) || /<eor>/i.test(text)) {
    isAdif = true;
    return parseAdif(text);
  } else {
    isAdif = false;
    return parseCabrillo(text);
  }
}

// ===== _logStore ヘルパー関数 =====

function _newLogId() { return 'L' + (++_logIdCounter); }

// ログのアンカー時刻(ms)を返す
function _logAnchorMs(log) {
  if (!log) return 0;
  if (log.isGroup) {
    const first = log.memberIds.map(id => _logStore.find(l => l.id === id)).find(Boolean);
    return first ? _logAnchorMs(first) : 0;
  }
  if (log.anchorMode === 'firstQso') return log.qsos.length ? log.qsos[0].time.getTime() : 0;
  return log.contestStartMs || 0;
}

// 現在のリファレンスログを返す
function _refLog() { return _logStore.find(l => l.isReference) || _logStore[0] || null; }

// hex色を反転（補色）して返す
function _invertHexColor(hex) {
  if (!hex || hex.length < 7) return hex;
  const r = 255 - parseInt(hex.slice(1, 3), 16);
  const g = 255 - parseInt(hex.slice(3, 5), 16);
  const b = 255 - parseInt(hex.slice(5, 7), 16);
  return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
}

// hex色を暗くして返す（factor: 0-1、デフォルト0.55で約半分の明度）
function _darkenHexColor(hex, factor = 0.55) {
  if (!hex || hex.length < 7) return hex;
  const r = Math.round(parseInt(hex.slice(1, 3), 16) * factor);
  const g = Math.round(parseInt(hex.slice(3, 5), 16) * factor);
  const b = Math.round(parseInt(hex.slice(5, 7), 16) * factor);
  return '#' + [r, g, b].map(v => Math.max(0, Math.min(255, v)).toString(16).padStart(2, '0')).join('');
}

// 追加ログのレートライン専用カラー（参照ログの青緑系と識別しやすい彩度の高い色）
const _ADD_LOG_RATE_COLORS = ['#ff4757','#ffa502','#7bed9f','#a29bfe','#fd79a8','#00cec9'];
const _ADD_GROUP_RATE_COLORS = ['#ffffff','#e0e0e0','#c0c0c0']; // グループ合算線は白系
function _logRateColor(log) {
  if (log.isGroup) {
    const groups = _logStore.filter(l => l.isGroup);
    const idx = groups.findIndex(l => l.id === log.id);
    return _ADD_GROUP_RATE_COLORS[Math.max(idx, 0) % _ADD_GROUP_RATE_COLORS.length];
  }
  const nonRefLogs = _logStore.filter(l => !l.isGroup && !l.isReference);
  const idx = nonRefLogs.findIndex(l => l.id === log.id);
  return _ADD_LOG_RATE_COLORS[Math.max(idx, 0) % _ADD_LOG_RATE_COLORS.length];
}

// 追加ログのEMA/LOESS/ACCEL色: 参照ログの対応色の反転
// 参照: EMA=#00e5ff LOESS=#69f0ae ACCEL=#ffd600
// ログごとのEMA/LOESS/ACCELオーバーレイ色（ログインデックス順、参照ログ以外）
// ref log: ema=#00e5ff, loess=#69f0ae, accel=#ffd600
const _LOG_OVERLAY_COLORS = [
  { ema: '#ff6d00', loess: '#b39ddb', accel: '#40c4ff' },
  { ema: '#ffca28', loess: '#ef5350', accel: '#66bb6a' },
  { ema: '#a5d6a7', loess: '#ff8a65', accel: '#ce93d8' },
  { ema: '#80cbc4', loess: '#f06292', accel: '#fff176' },
  { ema: '#ffe082', loess: '#80deea', accel: '#ff8a80' },
];
function _logOverlayColors(log) {
  if (!log || log.isReference) return { ema: '#00e5ff', loess: '#69f0ae', accel: '#ffd600' };
  const eligible = _logStore.filter(l => !l.isGroup && !l.isReference);
  const idx = Math.max(eligible.findIndex(l => l.id === log.id), 0);
  return _LOG_OVERLAY_COLORS[idx % _LOG_OVERLAY_COLORS.length];
}
// 6桁16進に'cc'(80%不透明)を付与してやや暗く表示する; rgba/hsla形式はそのまま返す
function _dimHex(color) {
  if (!color) return color;
  if (color.startsWith('#') && color.length === 7) return color + 'cc';
  return color;
}
// コンテストタイトル表示を更新
function _updateContestTitle() {
  const titleEl = document.getElementById('contest-title');
  if (!titleEl) return;
  const fileLogs = _logStore.filter(l => !l.isLive && !l.isGroup);
  const liveLog  = _logStore.find(l => l.isLive && !l.isGroup);
  // コンテスト名: SkookumNet > 最初のファイルログ > グローバルcontest変数
  let dispContest = null;
  if (wsLiveMode && wsContestName) dispContest = wsContestName;
  else if (fileLogs.length > 0) {
    const m = fileLogs[0]._meta;
    dispContest = (m && m.contestName) || contestName || null;
  } else dispContest = contestName || null;
  const totalSources = fileLogs.length + (liveLog ? 1 : 0);
  if (totalSources <= 1) {
    const parts = [];
    if (dispContest) parts.push(dispContest);
    if (contestYear) parts.push(contestYear);
    titleEl.textContent = parts.length ? parts.join(' ') : i18n('noContest');
  } else {
    titleEl.textContent = dispContest || i18n('noContest');
  }
}

// グラフライン用: 6桁16進に'66'(40%不透明)を付与; rgba形式はalphaを0.5倍にして返す
function _muted(color) {
  if (!color) return color;
  if (color.startsWith('#') && color.length === 7) return color + '66';
  if (color.startsWith('rgba(')) {
    return color.replace(/rgba\(([^,]+),([^,]+),([^,]+),([\d.]+)\)/, (m, r, g, b, a) =>
      `rgba(${r},${g},${b},${(parseFloat(a) * 0.55).toFixed(2)})`);
  }
  return color;
}
// 下位互換: 単一の追加ログ色 (deprecated - use _logOverlayColors)
const _ADD_EMA_COLOR   = '#ff6d00';
const _ADD_LOESS_COLOR = '#b39ddb';
const _ADD_ACCEL_COLOR = '#40c4ff';

// 複数ログ比較時に各ログを区別するための最短ラベルを返す（ツールチップ用）
function _logDistinctLabel(log) {
  if (!log) return '';
  if (log.isLive && !log.isGroup) return 'SKNet';
  const allVisible = _logStore.filter(l => l.visible && !l.isGroup && !l.isLive);
  const metas    = allVisible.map(l => l._meta || {});
  const contests = new Set(metas.map(m => m.contestName).filter(Boolean));
  const m = log._meta || {};
  const parts = [];
  if (m.callsign) parts.push(m.callsign);
  if (m.year)     parts.push(String(m.year));
  if (contests.size > 1 && m.contestName) parts.push(m.contestName);
  return parts.length ? parts.join(' ') : log.label;
}

// ペインログ選択メニュー用の短いラベル
function _menuShortLabel(log) {
  if (!log) return '';
  if (log.isLive && !log.isGroup) return 'SkookumNet';
  const allLogs  = _logStore.filter(l => !l.isGroup && !l.isLive);
  const contests = new Set(allLogs.map(l => l._meta && l._meta.contestName).filter(Boolean));
  const m = log._meta || {};
  const parts = [];
  if (m.callsign) parts.push(m.callsign);
  if (m.year)     parts.push(String(m.year));
  if (contests.size > 1 && m.contestName) parts.push(m.contestName);
  return parts.length ? parts.join(' ') : log.label;
}

// グループの場合はメンバーQSOをマージして返す
function _getLogQsos(log) {
  if (!log) return [];
  if (!log.isGroup) return log.qsos;
  const all = [];
  for (const id of (log.memberIds || [])) {
    const m = _logStore.find(l => l.id === id);
    if (m) all.push(..._getLogQsos(m));
  }
  all.sort((a, b) => a.time - b.time);
  return all;
}

// 全体グラフでこのlogが表示対象かどうか
function _isFullChartLogVisible(log) {
  if (!log.visible) return false;
  if (!_fullChartLogIds) return true;
  return _fullChartLogIds.has(log.id);
}

// 全体グラフのログ選択ボタン表示を更新

// ログを_logStoreに追加して id を返す
function _addLogEntry(qsos, label, opts = {}) {
  const id = _newLogId();
  const firstMs = qsos.length ? qsos[0].time.getTime() : Date.now();
  const contestStartMs = Math.floor(firstMs / 3600000) * 3600000; // first QSOをhour単位に切り捨て
  const nonGroupCount = _logStore.filter(l => !l.isGroup).length;
  const color = opts.color || LOG_COLORS[nonGroupCount % LOG_COLORS.length];
  const isFirst = _logStore.length === 0;
  _logStore.push({
    id, label: label || id, color, qsos,
    anchorMode: opts.anchorMode || 'contestStart',
    contestStartMs,
    offsetMs: opts.offsetMs || 0,
    visible: true,
    isLive: opts.isLive || false,
    isGroup: false,
    isReference: isFirst || !!opts.isReference,
    memberIds: [],
    station: opts.station || '',
    _isAdif: opts._isAdif !== undefined ? opts._isAdif : isAdif,
    _meta: opts._meta || null,  // { callsign, year, contestName }
  });
  _multiLogMode = _logStore.filter(l => !l.isGroup).length > 1;
  return id;
}

// _logStoreから削除
function _removeLogEntry(id) {
  const idx = _logStore.findIndex(l => l.id === id);
  if (idx === -1) return;
  const wasRef = _logStore[idx].isReference;
  _logStore.splice(idx, 1);
  _logStore.forEach(l => { if (l.isGroup) l.memberIds = l.memberIds.filter(m => m !== id); });
  _logStore = _logStore.filter(l => !l.isGroup || l.memberIds.length > 0);
  if (wasRef && _logStore.length > 0 && !_logStore.find(l => l.isReference)) {
    _logStore[0].isReference = true;
  }
  _multiLogMode = _logStore.filter(l => !l.isGroup).length > 1;
  // 全体グラフ選択から削除されたIDを除去
  if (_fullChartLogIds) { _fullChartLogIds.delete(id); if (_fullChartLogIds.size === 0) _fullChartLogIds = null; }
}

// グループエントリを作成
function _createGroupEntry(memberIds, label) {
  const id = _newLogId();
  const color = LOG_COLORS[_logStore.length % LOG_COLORS.length];
  _logStore.push({
    id, label: label || i18n('logGroupName'), color, qsos: [],
    anchorMode: 'contestStart', contestStartMs: 0, offsetMs: 0,
    visible: true, isLive: false, isGroup: true, isReference: false,
    memberIds: [...memberIds], station: '',
  });
  return id;
}

// リファレンスログを変更
function _setLogReference(id) {
  _logStore.forEach(l => { l.isReference = (l.id === id); });
}

// ±H:MM 文字列をmsに変換 (例 "-1:30" → -5400000)
function _parseOffset(str) {
  str = (str || '').trim();
  const sign = str.startsWith('-') ? -1 : 1;
  str = str.replace(/^[+-]/, '');
  const parts = str.split(':');
  const h = parseInt(parts[0] || '0') || 0;
  const m = parseInt(parts[1] || '0') || 0;
  return sign * (h * 3600000 + m * 60000);
}

// msを±H:MM文字列に変換
function _fmtOffset(ms) {
  const sign = ms < 0 ? '-' : '+';
  const abs = Math.abs(ms);
  const h = Math.floor(abs / 3600000);
  const m = Math.floor((abs % 3600000) / 60000);
  return sign + h + ':' + String(m).padStart(2, '0');
}

// ログ管理パネルを再描画
function _renderLogPanel() {
  const panel = document.getElementById('log-panel');
  const container = document.getElementById('log-entries');
  const groupBtn = document.getElementById('log-group-btn');
  if (!panel || !container) return;

  // パネル表示: _logStore に1件以上あれば表示
  panel.style.display = _logStore.length > 0 ? 'flex' : 'none';
  if (groupBtn) groupBtn.style.display = _logStore.filter(l => !l.isGroup).length >= 2 ? '' : 'none';
  // ペインのログ選択ボタン表示更新
  _updatePaneLogBtns();
  // 全体グラフのログ選択ボタン表示更新
  _updateFullChartLogBtn();

  container.innerHTML = '';
  for (const log of _logStore) {
    const div = document.createElement('div');
    div.className = 'log-entry' + (log.isGroup ? ' log-group-entry' : '') + (!log.visible ? ' log-hidden' : '');
    div.dataset.logId = log.id;

    // 色スウォッチ (クリックで表示切替)
    const swatch = document.createElement('span');
    swatch.className = 'log-swatch';
    swatch.style.background = log.color;
    swatch.title = log.visible ? i18n('swatchHide') : i18n('swatchShow');
    swatch.onclick = () => {
      log.visible = !log.visible;
      _renderLogPanel();
      if (cumulChart && rateChart) renderCharts(currentQsos);
      updateLiveCharts();
    };
    div.appendChild(swatch);

    // ラベル
    const lbl = document.createElement('span');
    lbl.textContent = log.label;
    lbl.style.cssText = 'cursor:text; max-width:100px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;';
    lbl.title = log.label;
    lbl.contentEditable = 'true';
    lbl.spellcheck = false;
    lbl.onblur = () => { log.label = lbl.textContent.trim() || log.id; _renderLogPanel(); };
    lbl.onkeydown = e => { if (e.key === 'Enter') { e.preventDefault(); lbl.blur(); } };
    div.appendChild(lbl);

    if (!log.isGroup) {
      // REFボタン
      const refBtn = document.createElement('button');
      refBtn.className = 'log-ref-btn' + (log.isReference ? ' active' : '');
      refBtn.textContent = i18n('logRef');
      refBtn.title = i18n('refBtnTitle');
      refBtn.onclick = () => {
        _setLogReference(log.id);
        currentQsos = _getLogQsos(_refLog()) || currentQsos;
        _renderLogPanel();
        if (cumulChart && rateChart) renderCharts(currentQsos);
      };
      div.appendChild(refBtn);

      // アンカー選択
      const anc = document.createElement('select');
      anc.className = 'log-anchor-sel';
      anc.innerHTML = `<option value="contestStart"${log.anchorMode==='contestStart'?' selected':''}>${i18n('logAnchorContest')}</option>` +
                      `<option value="firstQso"${log.anchorMode==='firstQso'?' selected':''}>${i18n('logAnchorFirst')}</option>`;
      anc.onchange = () => {
        log.anchorMode = anc.value;
        if (cumulChart && rateChart) renderCharts(currentQsos);
      };
      div.appendChild(anc);

      // オフセット入力
      const offInp = document.createElement('input');
      offInp.className = 'log-offset-input';
      offInp.value = _fmtOffset(log.offsetMs);
      offInp.title = i18n('offsetTitle');
      offInp.onblur = () => {
        log.offsetMs = _parseOffset(offInp.value);
        offInp.value = _fmtOffset(log.offsetMs);
        if (cumulChart && rateChart) renderCharts(currentQsos);
      };
      offInp.onkeydown = e => { if (e.key === 'Enter') offInp.blur(); };
      div.appendChild(offInp);
    } else {
      // グループメンバー表示
      const members = log.memberIds.map(id => {
        const m = _logStore.find(l => l.id === id);
        return m ? m.label : '?';
      }).join(', ');
      const ml = document.createElement('span');
      ml.style.cssText = 'color:var(--text3); font-size:9px; max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;';
      ml.textContent = '(' + members + ')';
      div.appendChild(ml);

      // グループ解除ボタン
      const ungroupBtn = document.createElement('button');
      ungroupBtn.className = 'log-ref-btn';
      ungroupBtn.textContent = i18n('logUngroup') || '解除';
      ungroupBtn.title = i18n('ungroupTitle');
      ungroupBtn.onclick = () => {
        const gi = _logStore.findIndex(l => l.id === log.id);
        if (gi !== -1) {
          const wasRef = _logStore[gi].isReference;
          const mids = _logStore[gi].memberIds.slice();
          _logStore.splice(gi, 1);
          // グループが参照ログだった場合、最初のメンバーを参照ログに設定
          if (wasRef && !_logStore.find(l => l.isReference)) {
            const first = _logStore.find(l => mids.includes(l.id));
            if (first) first.isReference = true;
            else if (_logStore.length > 0) _logStore[0].isReference = true;
          }
        }
        _multiLogMode = _logStore.filter(l => !l.isGroup).length > 1;
        _renderLogPanel();
        currentQsos = _getLogQsos(_refLog());
        if (cumulChart && rateChart) renderCharts(currentQsos);
      };
      div.appendChild(ungroupBtn);
    }

    // 削除ボタン
    const del = document.createElement('button');
    del.className = 'log-del-btn';
    del.textContent = '×';
    del.title = i18n('delLogTitle');
    del.onclick = () => {
      const _wasLive = log.isLive;
      _removeLogEntry(log.id);
      // ライブログ削除時: WebSocket切断・ライブ状態クリア
      if (_wasLive) {
        _wsClearReconnectTimer();
        _wsConnectUrl = null;
        if (wsRenderTimer) { clearTimeout(wsRenderTimer); wsRenderTimer = null; }
        if (wsSocket) wsSocket.close();
        wsSocket = null;
        wsLiveMode = false;
        wsQsos = [];
        _wsLiveQsos = null;
        _wsStations.clear();
        wsSetStatus('', i18n('wsDisconnected'));
      }
      _renderLogPanel();
      if (_logStore.length === 0) {
        currentQsos = [];
        opSegments = [];
        stopSimMode();
        if (cumulChart) { cumulChart.destroy(); cumulChart = null; }
        if (rateChart)  { rateChart.destroy();  rateChart  = null; }
        for (const _dp of _livePanes) {
          if (_dp.chart)    { _dp.chart._liveData = null; _dp.chart._extraLiveData = null; _dp.chart._bgReady = false; }
          if (_dp.bandChart){ _dp.bandChart._liveBandData = null; _dp.bandChart._extraBandData = null; _dp.bandChart._bgReady = false; }
        }
        updateLiveCharts();
        document.getElementById('empty-msg').style.display = '';
      } else {
        currentQsos = _getLogQsos(_refLog());
        // ペインの全データをクリアして残像を防ぐ
        for (const _dp of _livePanes) {
          if (_dp.chart) {
            _dp.chart._extraLiveData = null;
            _dp.chart._liveData = null;
            _dp.chart._bgReady = false;
          }
          if (_dp.bandChart) {
            _dp.bandChart._extraBandData = null;
            _dp.bandChart._liveBandData = null;
            _dp.bandChart._bgReady = false;
          }
        }
        renderCharts(currentQsos);
        // ライブログ削除後はシムモードでリファレンスログの末尾を表示する
        if (_wasLive) initSimMode(currentQsos);
        updateLiveCharts();
      }
    };
    div.appendChild(del);

    container.appendChild(div);
  }
}

// ペイン毎のログ選択ボタンテキストを更新
function _updatePaneLogBtns() {
  // ファイルログ複数 or SkookumNet複数局でAllボタン表示
  const hasMulti = _logStore.length > 1 || _wsStations.size > 1;
  for (const pane of _livePanes) {
    const btn = pane.el.querySelector('.pane-log-sel-btn');
    if (!btn) continue;
    btn.style.display = hasMulti ? '' : 'none';
    if (!hasMulti) continue;
    const st = _liveState[pane.id];
    const _hasLogSel  = st.logIds && st.logIds.size > 0;
    const _hasStaSel  = st.wsStationSel && st.wsStationSel.size > 0;
    if (!_hasLogSel && !_hasStaSel) {
      btn.textContent = 'All';
      btn.style.color = '';
      btn.style.borderColor = '';
    } else {
      const n = (st.logIds ? st.logIds.size : 0) + (st.wsStationSel ? st.wsStationSel.size : 0);
      if (n === 1) {
        if (_hasLogSel) {
          const lid = [...st.logIds][0];
          const l = _logStore.find(x => x.id === lid);
          btn.textContent = l ? _menuShortLabel(l) : 'Log';
        } else {
          const sid = [...st.wsStationSel][0];
          btn.textContent = sid === 'combined' ? 'SkookumNet' : sid;
        }
      } else {
        btn.textContent = i18n('nSelected', n);
      }
      btn.style.color = 'var(--accent)';
      btn.style.borderColor = 'var(--accent)';
    }
  }
}

function buildTimeline(qsos, intervalMins) {
  if (!qsos.length) return { labels: [], cumul: [], rates: [], bandData: {}, allBands: [] };
  const start = new Date(Math.floor(qsos[0].time.getTime() / (intervalMins * 60000)) * intervalMins * 60000);
  const end = qsos[qsos.length - 1].time;
  const slots = [];
  for (let t = new Date(start); t <= end; t = new Date(t.getTime() + intervalMins * 60000)) {
    slots.push(new Date(t));
  }
  const labels = slots.map(t => {
    const hh = String(t.getUTCHours()).padStart(2, '0');
    const mm = String(t.getUTCMinutes()).padStart(2, '0');
    return `${hh}:${mm}`;
  });
  const slotMs = slots.map(t => t.getTime());
  const allBands = [...new Set(qsos.map(q => q.band))];
  const bandCounts = {};
  allBands.forEach(b => { bandCounts[b] = new Array(slots.length).fill(0); });
  const rates = new Array(slots.length).fill(0);
  qsos.forEach(q => {
    const idx = Math.min(Math.floor((q.time - start) / (intervalMins * 60000)), slots.length - 1);
    rates[idx]++;
    if (bandCounts[q.band]) bandCounts[q.band][idx]++;
  });
  const cumul = [];
  let sum = 0;
  rates.forEach(r => { sum += r; cumul.push(sum); });
  return { labels, cumul, rates, bandData: bandCounts, allBands, slotMs };
}

function updateStats(qsos, rates, intervalMins) {
  document.getElementById('stat-total').textContent = qsos.length.toLocaleString();
  const peakPerSlot = Math.max(...rates);
  const peakPerHour = Math.round(peakPerSlot * (60 / intervalMins));
  document.getElementById('stat-peak').textContent = `${peakPerHour} q/h`;
  const dur = (qsos[qsos.length - 1].time - qsos[0].time) / 3600000;
  document.getElementById('stat-hours').textContent = dur.toFixed(1) + 'h';
  document.getElementById('stat-avg').textContent = `${Math.round(qsos.length / Math.max(dur, 0.01))} q/h`;
  document.getElementById('stat-call').textContent = callsign || '—';
  document.getElementById('stats-bar').style.display = 'flex';
}

function updateLegend(allBands) {

  const sorted = [...allBands].sort((a, b) => bandToMeters(b) - bandToMeters(a));
  leg.innerHTML = sorted.map(b => `
    <span>
      <span class="band-dot" style="background:${BAND_COLORS[b] || BAND_COLORS.other}"></span>${bandLabel(b)}

function fmtUtc(ms) {
  const d = new Date(ms);
  const hh = String(d.getUTCHours()).padStart(2, '0');
  const mm = String(d.getUTCMinutes()).padStart(2, '0');
  const ss = String(d.getUTCSeconds()).padStart(2, '0');
  return `${hh}:${mm}:${ss}`;
}


// ---- Run/S&P 判定 ----
// 戻り値: qsos配列と同じ長さの状態配列 'run'|'sp'|'unknown'
function calcRateData(qsos, windowMins, offTimeSegs) {
  if (!qsos.length) return [];
  const windowMs = windowMins * 60000;
  const _offSegs = offTimeSegs && offTimeSegs.length ? offTimeSegs : null;

  // rate(x) = count(過去t分間のQSO数) / t * 60  [QSO/h]
  // 各QSOの時刻xを基準に過去windowMs内のQSO数を二分探索で取得

  // Off Timeスキップ時: 各QSOの調整済み時刻を事前計算
  // Off Time区間(duration D)を「1分の間隔」に圧縮: shift += max(D - 60000, 0)
  // これによりOff Time前後のQSO間の実効時間差が1分となり、ウィンドウ計算が自然に機能する
  let adjTimes = null;
  if (_offSegs) {
    const sortedSegs = _offSegs.slice().sort((a, b) => a.startMs - b.startMs);
    adjTimes = new Array(qsos.length);
    let shift = 0;
    let si = 0;
    for (let i = 0; i < qsos.length; i++) {
      const t = qsos[i].time.getTime();
      while (si < sortedSegs.length && sortedSegs[si].endMs <= t) {
        shift += Math.max(sortedSegs[si].endMs - sortedSegs[si].startMs - 60000, 0);
        si++;
      }
      adjTimes[i] = t - shift;
    }
  }

  function getAdj(i) {
    return adjTimes ? adjTimes[i] : qsos[i].time.getTime();
  }

  function lowerBoundAdj(targetMs, hi) {
    let lo = 0;
    while (lo < hi) {
      const mid = (lo + hi) >> 1;
      if (getAdj(mid) < targetMs) lo = mid + 1;
      else hi = mid;
    }
    return lo;
  }

  const result = [];
  let prevMinKey = -1;
  let prevXMs    = null;
  let prevAdjMs  = null;
  let afterGap   = false; // 空白区間直後フラグ

  for (let i = 0; i < qsos.length; i++) {
    const xMs   = qsos[i].time.getTime();
    const adjMs = getAdj(i);

    // Cabrillo: 同一分(原時刻)は最後のQSOのみ代表点とする
    if (!isAdif) {
      const minKey = Math.floor(xMs / 60000) * 60000;
      if (minKey === prevMinKey) {
        prevMinKey = minKey;
        continue;
      }
      prevMinKey = minKey;
    }

    // 調整済み時刻でギャップ判定
    // Off Timeは圧縮済みのため adjGap はOff Timeを含まない実活動ギャップ
    if (prevAdjMs !== null) {
      const adjGap = adjMs - prevAdjMs;
      if (adjGap > windowMs) {
        result.push({ x: prevXMs + 1,                           y: 0 });
        result.push({ x: Math.max(prevXMs + 2, xMs - windowMs), y: 0 });
        afterGap = true;
      }
    }
    prevXMs   = xMs;
    prevAdjMs = adjMs;

    // 調整済み時刻でウィンドウ内QSO数を取得
    const windowStart   = lowerBoundAdj(adjMs - windowMs, i + 1);
    const countInWindow = (i + 1) - windowStart;

    let ratePerHour;
    if (isAdif && countInWindow > 0) {
      // ADIFは秒精度: ウィンドウ内の最古QSOから現在まで（調整済み時刻）の実時間で割る
      // ただし以下の場合は固定windowMsで割る（異常値防止）:
      // 1. count=1（前後関係が不明）
      // 2. ウィンドウ内に空白区間（windowMs以上のギャップ）がある
      const oldestAdj = getAdj(windowStart);
      const spanMs    = adjMs - oldestAdj; // ウィンドウ内の調整済み時間幅
      // ウィンドウ内で最大のQSO間ギャップを検出（調整済み時刻）
      let maxGapMs = 0;
      for (let j = windowStart; j < i; j++) {
        const gap = getAdj(j + 1) - getAdj(j);
        if (gap > maxGapMs) maxGapMs = gap;
      }
      // ウィンドウ開始直前のギャップも確認
      // （直前に大きな切れ目がある場合はウィンドウ内QSOが一端に偏り spanMs が小さくなるため）
      if (windowStart > 0) {
        const gapBeforeWindow = oldestAdj - getAdj(windowStart - 1);
        if (gapBeforeWindow > maxGapMs) maxGapMs = gapBeforeWindow;
      }
      // 空白区間（windowMs以上のギャップ）がウィンドウ内に含まれる場合はwindowMsで割る
      const hasGapInWindow = maxGapMs >= windowMs;
      // spanMsがwindowMsの10%未満（QSOが短時間に集中）でもwindowMsで割る
      const isConcentrated = spanMs < windowMs * 0.1 && countInWindow >= 2;
      // count=1のときは時間幅が不明なので固定windowMsで割る
      const baseWindowMs = (countInWindow === 1 || hasGapInWindow || isConcentrated)
        ? windowMs
        : Math.max(spanMs, 1000);
      ratePerHour = countInWindow / baseWindowMs * 3600000;
    } else {
      // Cabrillo: 調整済みウィンドウ幅 = windowMs（圧縮後なのでOff Time除外済み）
      ratePerHour = Math.round(countInWindow / windowMs * 3600000);
    }

    // 空白区間の直後の1点のみ表示を0に（フラグはすぐリセット）
    const displayY = afterGap ? 0 : ratePerHour;
    afterGap = false;
    result.push({ x: xMs, y: displayY });
  }
  // Off Timeスキップ時: 区間内を視覚的に0にする境界点を挿入
  // seg.startMsは直前QSO時刻なので+1msで即0落ち、seg.endMs-1で直前まで0を維持
  if (_offSegs) {
    for (const seg of _offSegs) {
      result.push({ x: seg.startMs + 1, y: 0 });
      result.push({ x: seg.endMs   - 1, y: 0 });
    }
  }
  // x値が時系列順になっていることを保証
  result.sort((a, b) => a.x - b.x);
  return result;
}

// 基本アルゴリズムのみのレート計算（EMA/LOESS/ACCEL入力用）
// Off Time・ADIF補正なし: count / windowMs * 3600000
function calcRateBasic(qsos, windowMins) {
  if (!qsos.length) return [];
  const windowMs = windowMins * 60000;
  const result = [];
  let lo = 0;
  for (let i = 0; i < qsos.length; i++) {
    const xMs = _qTime(qsos[i]);
    while (_qTime(qsos[lo]) < xMs - windowMs) lo++;
    const count = i - lo + 1;
    result.push({ x: xMs, y: Math.round(count / windowMs * 3600000) });
  }
  return result;
}

// === Rate Trend 計算関数 (EMA / LOESS / ACCEL) ===
// x は Unixタイムスタンプ(ms)、y は QSO/h

let showRate  = true;
let showEMA   = false;
let _accelYMin = -1, _accelYMax = 1;

// SkookumNetライブモード時に全体グラフへ現在時刻の破線を描くプラグイン
const wsNowLinePlugin = {
  id: 'wsNowLine',
  afterDraw(chart) {
    if (!wsLiveMode && !_logStore.some(l => l.isLive && !l.isGroup)) return;
    const { ctx, chartArea: ca, scales } = chart;
    if (!ca || !scales.x) return;
    const nowMs = Date.now();
    let nowX;
    if (_wsLiveQsos !== null) {
      const ref = _refLog();
      const liveLog = _logStore.find(l => l.isLive && !l.isGroup);
      if (!ref || !liveLog) return;
      nowX = ref.contestStartMs + (nowMs - liveLog.contestStartMs) + liveLog.offsetMs - ref.offsetMs;
    } else {
      nowX = nowMs;
    }
    const px = scales.x.getPixelForValue(nowX);
    if (px < ca.left || px > ca.right) return;
    ctx.save();
    ctx.strokeStyle = 'rgba(255,100,100,0.85)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(px, ca.top);
    ctx.lineTo(px, ca.bottom);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
};

// ACCEL目盛りをyRate軸エリアに手描きするプラグイン
const accelAxisPlugin = {
  id: 'accelAxis',
  afterDraw(chart) {
    if (!showACCEL) return;
    const yRate = chart.scales.yRate;
    const yMin = chart._accelYMin !== undefined ? chart._accelYMin : _accelYMin;
    const yMax = chart._accelYMax !== undefined ? chart._accelYMax : _accelYMax;
    if (!yRate || yMin === yMax) return;
    const { ctx, chartArea: { top, bottom } } = chart;
    const H = bottom - top;
    const toY = v => bottom - (v - yMin) / (yMax - yMin) * H;
    ctx.save();
    ctx.font = '8px SF Mono, Fira Code, monospace';
    ctx.fillStyle = 'rgba(255,214,0,0.85)';
    ctx.textAlign = 'right';
    const nTicks = 6;
    for (let i = 0; i <= nTicks; i++) {
      const val = yMin + (yMax - yMin) * i / nTicks;
      const y = toY(val);
      if (y < top - 1 || y > bottom + 1) continue;
      ctx.fillText(val.toFixed(1), yRate.left - 4, y + 3);
    }
    ctx.save();
    ctx.font = '10px SF Mono, Fira Code, monospace';
    ctx.fillStyle = 'rgba(255,214,0,0.75)';
    ctx.textAlign = 'center';
    ctx.translate(yRate.right - 8, top + (bottom - top) / 4);
    ctx.rotate(Math.PI / 2);
    ctx.fillText('(QSO/h)/min', 0, 0);
    ctx.restore();
    ctx.restore();
  }
};
let showLOESS = false;
let showACCEL = true;
let _lastLoadedText = null;

function computeEMA(points, windowMins) {
  if (!points.length) return [];
  const alpha = 2 / (windowMins + 1);
  const result = [{ x: points[0].x, y: points[0].y }];
  for (let i = 1; i < points.length; i++)
    result.push({ x: points[i].x, y: alpha * points[i].y + (1 - alpha) * result[i - 1].y });
  return result;
}

function computeLOESS(rawPts, bwFraction) {
  if (rawPts.length < 2) return rawPts.slice();
  const step    = Math.max(1, Math.floor(rawPts.length / 500));
  const sampled = rawPts.filter((_, i) => i % step === 0);
  const xRange  = rawPts[rawPts.length - 1].x - rawPts[0].x;
  if (xRange <= 0) return sampled.map(p => ({ x: p.x, y: p.y }));
  const bw = bwFraction * xRange;
  return sampled.map(pt => {
    let sw = 0, swx = 0, swy = 0, swxx = 0, swxy = 0;
    for (const p of rawPts) {
      if (p.x > pt.x) break;   // 因果的: 未来参照なし
      const d = pt.x - p.x;
      if (d > bw) continue;
      const u = d / bw;
      const w = Math.pow(1 - u * u * u, 3);
      sw += w; swx += w * p.x; swy += w * p.y; swxx += w * p.x * p.x; swxy += w * p.x * p.y;
    }
    if (sw < 1e-10) return { x: pt.x, y: pt.y };
    const det = sw * swxx - swx * swx;
    if (Math.abs(det) < 1e-10) return { x: pt.x, y: Math.max(0, swy / sw) };
    const b0 = (swxx * swy - swx * swxy) / det;
    const b1 = (sw * swxy - swx * swy) / det;
    return { x: pt.x, y: Math.max(0, b0 + b1 * pt.x) };
  });
}

function _smoothN(pts, n) {
  return pts.map((p, i) => {
    let s = 0, c = 0;
    for (let j = Math.max(0, i - n * 2); j <= i; j++) { s += pts[j].y; c++; }
    return { x: p.x, y: s / c };
  });
}

function computeAccel(emaPts) {
  if (emaPts.length < 2) return [];
  const raw = [];
  for (let i = 1; i < emaPts.length; i++) {
    const dx = emaPts[i].x - emaPts[i - 1].x;
    const dy = emaPts[i].y - emaPts[i - 1].y;
    // dx は分単位（呼び出し元で変換済み）→ dy/dx = (QSO/h)/min
    raw.push({ x: emaPts[i].x, y: dx > 0 ? dy / dx : 0 });
  }
  return _smoothN(raw, 12);
}

// RAWレートからEMA/LOESS/ACCELを計算して返す
// 内部計算はx=分単位で行い、出力時にmsに戻す（参照実装と単位を合わせる）
function _computeTrendSeries(rawRate, windowMins) {
  const toMs  = pts => pts.map(p => ({ x: p.x * 60000, y: p.y }));
  const inMin = rawRate.map(p => ({ x: p.x / 60000, y: p.y }));
  const emaMin   = showEMA || showACCEL ? computeEMA(inMin, windowMins) : [];
  const loessMin = showLOESS ? computeLOESS(inMin, 0.07) : [];
  const accelMin = showACCEL ? computeAccel(emaMin) : [];
  return {
    ema:   showEMA ? toMs(emaMin)   : [],
    loess: toMs(loessMin),
    accel: toMs(accelMin),
  };
}
