function classifyRunSP(qsos) {
  const FREQ_THRESH = 0.5; // kHz
  const result = new Array(qsos.length).fill('unknown');

  // バンドごとに系列を分離
  const bandMap = new Map();
  qsos.forEach((q, i) => {
    if (!bandMap.has(q.band)) bandMap.set(q.band, []);
    bandMap.get(q.band).push(i);
  });

  bandMap.forEach(indices => {
    const n = indices.length;
    if (n === 0) return;
    if (n === 1) { result[indices[0]] = 'run'; return; }

    // 各隣接ペアの周波数差 (MHz単位なのでkHz変換)
    const diff = [];
    for (let i = 0; i < n - 1; i++) {
      const qi = qsos[indices[i]];
      const qj = qsos[indices[i + 1]];
      const fi = qi.freq || 0;
      const fj = qj.freq || 0;
      const fiKhz = fi > 1000 ? fi : fi * 1000;
      const fjKhz = fj > 1000 ? fj : fj * 1000;
      diff.push(Math.abs(fjKhz - fiKhz));
    }
    // large[i] = diff[i] >= FREQ_THRESH
    const large = diff.map(d => d >= FREQ_THRESH);

    // 時間的に離れた隣接QSO間（30分以上）はS&P伝播の境界とする
    const GAP_MS = 30 * 60000;
    const isGap = [];
    for (let i = 0; i < n - 1; i++) {
      const dt = qsos[indices[i + 1]].time.getTime() - qsos[indices[i]].time.getTime();
      isGap.push(dt >= GAP_MS);
    }

    const stateArr = new Array(n).fill('?');

    // S&P確定: 連続2回Large（Gapをまたがない）
    for (let i = 1; i < n - 1; i++) {
      if (large[i - 1] && large[i] && !isGap[i - 1] && !isGap[i]) {
        stateArr[i] = 'sp';
      }
    }

    // 確定S&PからLargeを前後に伝播（Gapを超えない）
    for (let i = n - 1; i >= 1; i--) {
      if (stateArr[i] === 'sp' && large[i - 1] && !isGap[i - 1]) stateArr[i - 1] = 'sp';
    }
    for (let i = 0; i < n - 1; i++) {
      if (stateArr[i] === 'sp' && large[i] && !isGap[i]) stateArr[i + 1] = 'sp';
    }

    // 残り'?'はRun
    for (let i = 0; i < n; i++) {
      if (stateArr[i] === '?') stateArr[i] = 'run';
    }

    // 結果をresultに書き戻し
    indices.forEach((qIdx, i) => { result[qIdx] = stateArr[i]; });
  });

  return result;
}

function isOffTimeContest() {
  const refMeta = (() => { const r = _refLog(); return r && !r.isLive ? (r._meta?.contestName || '') : ''; })();
  const n = (contestName || refMeta || wsContestName || '').toLowerCase();
  return n.includes('wpx') || n.includes('worked all europe');
}

// SO2R状態推定 + 帯セグメント生成
// 戻り値: [{startMs, endMs, state}]
// state: 'rr'=両Run, 'rs'=Run+S&P, 'ss'=両S&P, 'r1'=単独Run, 's1'=単独S&P
function buildOpSegments(qsos, runSP, skipBoundary = false, boundaryMs = null) {
  if (!qsos.length) return [];

  const bandMap = new Map();
  qsos.forEach((q, i) => {
    if (!bandMap.has(q.band)) bandMap.set(q.band, []);
    bandMap.get(q.band).push(i);
  });

  // 各QSOについて「他バンドQSOを挟まない同一バンド連続区間の長さ(分)」を事前計算
  // qsosは時系列ソート済みを前提
  // 隣接するQSOが同一バンドかどうかで連続区間を判定
  const streakMins = new Array(qsos.length).fill(0);
  (() => {
    // 時系列上で連続する同一バンドのブロックを検出
    // 「ブロック」= 間に他バンドQSOが1つも挟まれない同一バンドの連続
    let blockStart = 0;
    for (let i = 0; i <= qsos.length; i++) {
      const isBreak = i === qsos.length || qsos[i].band !== qsos[blockStart].band;
      if (!isBreak) continue;
      // blockStart..i-1 が同一バンド連続ブロック
      const tStart = qsos[blockStart].time.getTime();
      const tEnd = qsos[i - 1].time.getTime();
      const dur = (tEnd - tStart) / 60000;
      for (let j = blockStart; j < i; j++) streakMins[j] = dur;
      blockStart = i;
    }
  })();

  // 時刻tiに他バンドがアクティブかどうか判定
  // アクティブ = 以下のいずれか:
  //   1. 他バンドの直前QSOと直後QSOが両方存在する（区間の中間）
  //   2. 直前QSOから10分以内（Runで次を待っている）
  //   3. 直後QSOが10分以内（系列の最初でまだ直前がない）
  // ただし自バンドが20分以上単独連続している場合はシングルリグとみなす
  // No QSOギャップ（10分以上）のリストを事前計算
  const NO_QSO_THRESH = 10 * 60000;
  const noQsoGapList = [];
  for (let i = 1; i < qsos.length; i++) {
    const gap = qsos[i].time.getTime() - qsos[i-1].time.getTime();
    if (gap >= NO_QSO_THRESH) {
      noQsoGapList.push({ start: qsos[i-1].time.getTime(), end: qsos[i].time.getTime() });
    }
  }

  function isOtherBandActive(i) {
    const ti = qsos[i].time.getTime();
    const myBand = qsos[i].band;

    // 自バンドが20分以上連続していればシングルリグ
    if (streakMins[i] >= 20) return false;

    // tiの前後にNo QSOギャップがあれば、そのギャップを挟んだ他バンドはアクティブでない
    const prevGap = noQsoGapList.find(g => g.end > ti - NO_QSO_THRESH && g.end <= ti);
    const nextGap = noQsoGapList.find(g => g.start >= ti && g.start < ti + NO_QSO_THRESH);

    for (const [band, indices] of bandMap) {
      if (band === myBand) continue;
      let prevT = -1, nextT = -1;
      for (const idx of indices) {
        const t = qsos[idx].time.getTime();
        if (t <= ti) prevT = t;
        else if (nextT === -1) { nextT = t; break; }
      }
      // ギャップをまたぐ他バンドQSOは除外
      if (prevT !== -1 && prevGap && prevT < prevGap.start) prevT = -1;
      if (nextT !== -1 && nextGap && nextT > nextGap.end) nextT = -1;

      if (prevT !== -1 && nextT !== -1) return true;
      if (prevT !== -1 && ti - prevT <= 600000) return true;
      if (nextT !== -1 && nextT - ti <= 600000) return true;
    }
    return false;
  }

  // 各QSOについて「同時アクティブな」他バンドのRun/SP状態を取得
  // アクティブでないバンド（例：既に終了した80m）は除外する
  function getOtherState(i) {
    const ti = qsos[i].time.getTime();
    const myBand = qsos[i].band;
    let otherRun = 0, otherSP = 0;
    for (const [band, indices] of bandMap) {
      if (band === myBand) continue;
      // このバンドがtiの時点でアクティブかチェック
      let prevT = -1, nextT = -1;
      let closestIdx = -1, closestDiff = Infinity;
      for (const idx of indices) {
        const t = qsos[idx].time.getTime();
        if (t <= ti) prevT = t;
        else if (nextT === -1) nextT = t;
        const diff = Math.abs(t - ti);
        if (diff < closestDiff) { closestDiff = diff; closestIdx = idx; }
      }
      // アクティブ判定: 前後両方ある、または10分以内に隣接QSO
      const active = (prevT !== -1 && nextT !== -1) ||
                     (prevT !== -1 && ti - prevT <= 600000) ||
                     (nextT !== -1 && nextT - ti <= 600000);
      if (!active) continue;
      if (closestIdx !== -1) {
        if (runSP[closestIdx] === 'run') otherRun++; else otherSP++;
      }
    }
    return otherRun >= otherSP ? 'run' : 'sp';
  }

  function getState(i) {
    const myRun = runSP[i] === 'run';
    if (!isOtherBandActive(i)) return myRun ? 'r1' : 's1';
    const otherRun = getOtherState(i) === 'run';
    if (myRun && otherRun)  return 'rr';
    if (myRun && !otherRun) return 'rs';
    if (!myRun && otherRun) return 'rs';
    return 'ss';
  }

  const stateArr = qsos.map((_, i) => getState(i));
  const segments = [];
  let segState = stateArr[0];
  let segStart = qsos[0].time.getTime();

  for (let i = 1; i < qsos.length; i++) {
    const st = stateArr[i];
    const ms = qsos[i].time.getTime();
    if (st !== segState) {
      segments.push({ startMs: segStart, endMs: ms, state: segState });
      segState = st;
      segStart = ms;
    }
  }
  segments.push({
    startMs: segStart,
    endMs: qsos[qsos.length - 1].time.getTime(),
    state: segState
  });

  // No QSO区間（10分以上のギャップ）をQSO時刻の生データから直接検出
  const NO_QSO_MS = 10 * 60000;
  const sortedTimes = qsos.map(q => q.time.getTime()).sort((a,b) => a-b);
  const noQsoSegs = [];
  const offTimeContest = isOffTimeContest();
  for (let i = 1; i < sortedTimes.length; i++) {
    const gap = sortedTimes[i] - sortedTimes[i-1];
    if (gap >= NO_QSO_MS) {
      // WPX/WAE: 両端を分単位に切り捨てた差が60分以上ならOff Time
      let state = 'noqso';
      if (offTimeContest) {
        const floorStart = Math.floor(sortedTimes[i-1] / 60000);
        const floorEnd   = Math.floor(sortedTimes[i]   / 60000);
        if (floorEnd - floorStart >= 60) state = 'offtime';
      }
      noQsoSegs.push({ startMs: sortedTimes[i-1], endMs: sortedTimes[i], state });
    }
  }

  // WPX/WAE: 表示範囲の境界でもOff Timeを検出（開始前・終了後）
  // boundaryMs={startMs,endMs}: 明示的な境界（追加ログ・ライブログ）
  // boundaryMs=null: UIの入力欄から境界を取得（参照ログ）
  // skipBoundary=true: 境界検出をスキップ（contestStartMsが不明な場合）
  if (offTimeContest && sortedTimes.length && !skipBoundary) {
    const firstQsoMs = sortedTimes[0];
    const lastQsoMs  = sortedTimes[sortedTimes.length - 1];
    let dispStart, dispEnd;
    if (boundaryMs !== null) {
      dispStart = boundaryMs.startMs;
      dispEnd   = boundaryMs.endMs;
    } else {
      const inputStart = parseRangeInput(document.getElementById('contest-start')?.value || '');
      const inputEnd   = parseRangeInput(document.getElementById('contest-end')?.value || '');
      dispStart = inputStart !== null ? inputStart : firstQsoMs;
      dispEnd   = inputEnd   !== null ? inputEnd   : lastQsoMs;
    }
    if (Math.floor(firstQsoMs / 60000) - Math.floor(dispStart / 60000) >= 60) {
      noQsoSegs.push({ startMs: dispStart, endMs: firstQsoMs, state: 'offtime' });
    }
    if (Math.floor(dispEnd / 60000) - Math.floor(lastQsoMs / 60000) >= 60) {
      noQsoSegs.push({ startMs: lastQsoMs, endMs: dispEnd, state: 'offtime' });
    }
  }

  // セグメントとNo QSOをまとめてstartMsでソートして返す
  // No QSOと重複するセグメントはNo QSOを優先して除外
  const allSegs = [...segments, ...noQsoSegs];
  allSegs.sort((a,b) => a.startMs - b.startMs);

  // No QSOと重複するセグメントを除外（No QSOの区間に完全に含まれるセグメントを除く）
  const withNoQso = allSegs.filter(seg => {
    if (seg.state === 'noqso' || seg.state === 'offtime') return true;
    // このセグメントがNo QSOの区間と重複しないか確認
    return !noQsoSegs.some(g => seg.startMs >= g.startMs && seg.endMs <= g.endMs);
  });

  return withNoQso;
}

const OP_COLORS = {
  rr: '#1D9E75', // 2BSIQ: 緑
  rs: '#9B59B6', // SO2R(Run+S&P): 紫
  ss: '#E24B4A', // SO2R(S&P+S&P): 赤
  r1: '#F1C40F', // Run(1R): 黄
  s1: '#E67E22', // S&P(1R): オレンジ
  noqso: '#555553', // No QSO: グレー
  offtime: '#ffffff', // Off Time: 白
};
const OP_LABELS = {
  rr: '2BSIQ',
  rs: 'SO2R(Run+S&P)',
  ss: 'SO2R(S&P+S&P)',
  r1: 'Run(1R)',
  s1: 'S&P(1R)',
  noqso: 'No QSO',
  offtime: 'Off Time',
};

function renderOpLegend(segments, multiSegs) {
  const seen = new Set(segments.map(s => s.state));
  if (multiSegs) {
    for (const entry of multiSegs) {
      for (const s of entry.segments) seen.add(s.state);
    }
  }
  const ORDER = ['rr', 'rs', 'ss', 'r1', 's1', 'noqso', 'offtime'];

  // Off Time累計をログごとに計算して並記
  function _offHHMM(segs) {
    const ms = segs.filter(s => s.state === 'offtime').reduce((a, s) => a + (s.endMs - s.startMs), 0);
    return { ms, str: `${String(Math.floor(ms / 3600000)).padStart(2,'0')}:${String(Math.floor((ms % 3600000) / 60000)).padStart(2,'0')}` };
  }
  let offTimeLabel;
  if (multiSegs && multiSegs.length > 1) {
    const parts = multiSegs.map(entry => {
      const { ms, str } = _offHHMM(entry.segments);
      if (!ms) return null;
      return entry.label ? `${entry.label} ${str}` : str;
    }).filter(Boolean);
    offTimeLabel = parts.length ? `Off Time: ${parts.join(' / ')}` : 'Off Time (00:00)';
    // 単独表示時もseen判定のためにチェック
    if (!seen.has('offtime') && multiSegs.some(e => e.segments.some(s => s.state === 'offtime'))) seen.add('offtime');
  } else {
    const { str } = _offHHMM(segments);
    offTimeLabel = `Off Time (${str})`;
  }

  const ids = ['op-legend', 'op-legend-10m', 'op-legend-1h', 'op-legend-3h'];
  ids.forEach(id => {
    const legend = document.getElementById(id);
    if (!legend) return;
    legend.innerHTML = '';
    ORDER.filter(st => seen.has(st)).forEach(st => {
      const el = document.createElement('span');
      el.style.cssText = 'display:flex;align-items:center;gap:4px;';
      const label = st === 'offtime' ? offTimeLabel : OP_LABELS[st];
      const borderStyle = st === 'offtime' ? 'border:1px solid #888;' : '';
      el.innerHTML = `<span style="width:10px;height:10px;border-radius:2px;background:${OP_COLORS[st]};display:inline-block;${borderStyle}"></span>${label}`;
      legend.appendChild(el);
    });
  });
}

// Chart.jsプラグイン: 帯をチャートエリア底部に描画（ズーム連動）

// グラフ内左上にラベルを描画するプラグイン
const chartLabelPlugin = {
  id: 'chartLabel',
  afterDraw(chart) {
    if (!chart.options._label) return;
    const { ctx, chartArea: { left, top } } = chart;
    ctx.save();
    ctx.font = '10px SF Mono, Fira Code, monospace';
    ctx.fillStyle = chart.options._labelColor || '#E24B4A';
    ctx.textAlign = 'left';
    ctx.fillText(chart.options._label, left + 6, top + 14);
    ctx.restore();
  }
};
Chart.register(chartLabelPlugin);

// シミュレーションモード: 全体グラフにシム時刻の赤破線を描画
const simLinePlugin = {
  id: 'simLine',
  afterDraw(chart) {
    if (chart._isLiveChart) return;  // ライブチャートはRAPオーバーレイで赤線を描画
    const lineMs = (simNowMs !== null) ? simNowMs
                 : (chart._showLiveLine ? Date.now() : null);
    if (lineMs === null) return;
    const { ctx, chartArea, scales } = chart;
    if (!chartArea || !scales.x) return;
    if (lineMs < scales.x.min || lineMs > scales.x.max) return;
    const px = scales.x.getPixelForValue(lineMs);
    ctx.save();
    ctx.strokeStyle = 'rgba(255,80,80,0.8)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 3]);
    ctx.beginPath();
    ctx.moveTo(px, chartArea.top);
    ctx.lineTo(px, chartArea.bottom);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
};
Chart.register(simLinePlugin);

const opStripPlugin = {
  id: 'opStrip',
  afterDraw(chart) {
    try {
      if (!opSegments || !opSegments.length) return;
      if (chart._isLiveChart) return;  // ライブチャートはRAPオーバーレイで描画
      const cid = chart.canvas && chart.canvas.id;
      if (cid !== 'chart-cumul' && cid !== 'chart-live-3h') return;
      const { ctx, chartArea, scales } = chart;
      if (!chartArea || !scales || !scales.x) return;
      const { left, right, bottom } = chartArea;
      const x = scales.x;
      const xMin = x.min;
      const xMax = x.max;
      if (!xMin || !xMax || xMax <= xMin) return;
      const stripH = 5;
      const stripGap = 1;
      // _multiOpSegments が null なら未初期化（renderCharts前）: opSegments で単一帯を描画
      // 空配列は「参照ログが非表示」を意味するため帯なし
      const strips = (_multiOpSegments !== null) ? _multiOpSegments : (opSegments.length ? [{ segments: opSegments }] : []);
      ctx.save();
      strips.forEach((strip, si) => {
        const y0 = bottom + 2 + si * (stripH + stripGap);
        (strip.segments || []).forEach(seg => {
          if (seg.endMs < xMin || seg.startMs > xMax) return;
          const x1 = left + (Math.max(seg.startMs, xMin) - xMin) / (xMax - xMin) * (right - left);
          const x2 = left + (Math.min(seg.endMs,   xMax) - xMin) / (xMax - xMin) * (right - left);
          if (x2 <= x1) return;
          ctx.fillStyle = OP_COLORS[seg.state] || '#888';
          ctx.fillRect(x1, y0, x2 - x1, stripH);
        });
      });
      ctx.restore();
    } catch(e) {}
  }
};
Chart.register(opStripPlugin);

// 24時間超コンテストの「Day N」ラベルをx軸下に描画するプラグイン
const dayLabelPlugin = {
  id: 'dayLabel',
  afterDraw(chart) {
    try {
      const anchor = chart._dayAnchorMs;
      if (!anchor) return;
      const { ctx, scales } = chart;
      const xScale = scales.x;
      if (!xScale) return;
      const xMin = xScale.min, xMax = xScale.max;
      if (xMax - xMin <= 24 * 3600000) return;
      const dayMs = 24 * 3600000;
      const firstDay = Math.floor((xMin - anchor) / dayMs);
      const lastDay  = Math.ceil( (xMax - anchor) / dayMs);
      ctx.save();
      ctx.font = '9px "SF Mono","Fira Code",monospace';
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      for (let d = firstDay; d < lastDay; d++) {
        const dayStart = anchor + d * dayMs;
        const dayEnd   = anchor + (d + 1) * dayMs;
        const visStart = Math.max(dayStart, xMin);
        const visEnd   = Math.min(dayEnd, xMax);
        if (visStart >= visEnd) continue;
        const midMs = (visStart + visEnd) / 2;
        const px = xScale.getPixelForValue(midMs);
        ctx.fillText('Day ' + (d + 1), px, chart.canvas.height - 2);
      }
      ctx.restore();
    } catch(e) {}
  }
};
Chart.register(dayLabelPlugin);


function renderCharts(qsos) {
  const { labels, cumul, rates, bandData, allBands, slotMs } = buildTimeline(qsos, rateMins);
  document.getElementById('empty-msg').style.display = 'none';
  document.getElementById('format-label').textContent = isAdif ? 'ADIF' : 'Cabrillo v3';

  // コンテスト名と年をタイトルに反映
  if (qsos.length) {
    contestYear = String(qsos[0].time.getUTCFullYear());
  }
  _updateContestTitle();

  // 日照情報を計算（手動入力を優先、なければログ内のグリッドを使用）
  if (manualGridLocator) gridLocator = manualGridLocator;
  const gridEl = document.getElementById('grid-input');
  if (gridEl && gridLocator && !gridEl.value) gridEl.value = gridLocator;
  const ll = gridToLatLon(gridLocator);
  if (ll && qsos.length) {
    sunEvents = buildSunEvents(qsos, ll.lat, ll.lon);
  } else {
    sunEvents = null;
  }
  if (!qsos.length) return;
  // Run/S&P判定と帯描画
  const runSP = classifyRunSP(qsos);
  opSegments = buildOpSegments(qsos, runSP);
  const firstMs = qsos[0].time.getTime();
  const lastMs  = qsos[qsos.length - 1].time.getTime();
  _updateOffTimeToggle();

  // マルチログ: 参照ログ + 追加ログ（非グループ）それぞれの帯を構築
  {
    const _mosRef = _refLog();
    const _mosRefAnchor = _mosRef ? _mosRef.contestStartMs : (qsos[0] ? qsos[0].time.getTime() : 0); // 全体グラフ: 常にcontest start基準
    _multiOpSegments = [];
    if (!_mosRef || _isFullChartLogVisible(_mosRef)) {
      _multiOpSegments.push({ logId: _mosRef ? _mosRef.id : null, color: null, label: _mosRef ? _logDistinctLabel(_mosRef) : null, segments: opSegments });
    }
    if (_multiLogMode) {
      for (const _mosLog of _logStore) {
        if (_mosLog.isGroup || !_isFullChartLogVisible(_mosLog) || (_mosRef && _mosLog.id === _mosRef.id)) continue;
        const _mosQsos = _getLogQsos(_mosLog);
        if (!_mosQsos.length) continue;
        const _mosRunSP = classifyRunSP(_mosQsos);
        const _mosDurMs = _guessContestDurationMs(_mosLog._meta?.contestName || '');
        const _mosSegs  = _mosLog.contestStartMs
          ? buildOpSegments(_mosQsos, _mosRunSP, false, { startMs: _mosLog.contestStartMs, endMs: _mosLog.contestStartMs + _mosDurMs })
          : buildOpSegments(_mosQsos, _mosRunSP, true);
        const _mosAnchor = _mosLog.contestStartMs; // 全体グラフ: 常にcontest start基準
        const _mosShift  = _mosRefAnchor - _mosAnchor + _mosLog.offsetMs;
        _multiOpSegments.push({
          logId: _mosLog.id,
          color: _mosLog.color,
          label: _logDistinctLabel(_mosLog),
          segments: _mosSegs.map(s => ({ ...s, startMs: s.startMs + _mosShift, endMs: s.endMs + _mosShift })),
        });
      }
    }
  }
  // _multiOpSegments 構築後に凡例を描画してログごとのOff Timeを反映
  renderOpLegend(opSegments, _multiOpSegments);

  updateStats(qsos, rates, rateMins);
  {
    const _allBandsSet = new Set(allBands);
    if (_multiLogMode) {
      for (const _bl of _logStore) {
        if (_bl.isGroup || !_isFullChartLogVisible(_bl) || (_refLog() && _bl.id === _refLog().id)) continue;
        for (const q of _getLogQsos(_bl)) if (q.band) _allBandsSet.add(q.band);
      }
    }
    updateLegend([..._allBandsSet]);
  }

  // ADIFは秒単位で実時刻をそのまま使用、Cabrilloは分内展開
  let scatterData;
  if (isAdif) {
    scatterData = qsos.map((q, i) => ({ x: q.time.getTime(), y: i + 1 }));
    minuteGroups = new Map(); // tooltip用(空でよい)
    // ライブチャート用: 秒精度そのまま
    qsos.forEach(q => { q._liveTime = q.time.getTime(); });
  } else {
    minuteGroups = new Map();
    qsos.forEach((q, i) => {
      const minKey = Math.floor(q.time.getTime() / 60000) * 60000;
      if (!minuteGroups.has(minKey)) minuteGroups.set(minKey, []);
      minuteGroups.get(minKey).push(i);
    });
    const adjustedTimes = new Array(qsos.length);
    minuteGroups.forEach((indices, minMs) => {
      const n = indices.length;
      indices.forEach((qIdx, k) => {
        adjustedTimes[qIdx] = minMs + Math.round(60000 * (k + 1) / (n + 1));
      });
    });
    scatterData = qsos.map((q, i) => ({ x: adjustedTimes[i], y: i + 1 }));
    // ライブチャート用: k/n 均等分割（0, 30; 0, 12, 24, 36, 48 ...）
    minuteGroups.forEach((indices, minMs) => {
      const n = indices.length;
      indices.forEach((qIdx, k) => {
        qsos[qIdx]._liveTime = minMs + Math.round(60000 * k / n);
      });
    });
  }
  const _offTimeSegs = skipOffTimeRate ? opSegments.filter(s => s.state === 'offtime') : [];
  const rateLineData = calcRateData(qsos, rateWindowSecs / 60, _offTimeSegs);
  const maxRate = Math.max(...rateLineData.map(d => d.y), 1);
  const _initBasicRate = calcRateBasic(qsos, rateWindowSecs / 60);
  const _initTrend = _computeTrendSeries(_initBasicRate, rateWindowSecs / 60);
  const ptRadius = qsos.length > 5000 ? 1 : qsos.length > 1000 ? 1.5 : 2.5;

  const cCtx = document.getElementById('chart-cumul').getContext('2d');
  if (cumulChart) { cumulChart.destroy(); cumulChart = null; }

  // 両グラフのx軸をスロット境界で統一
  const slotWidthMs = rateMins * 60000;
  currentSlotWidthMs = slotWidthMs;
  let startMs = slotMs[0];
  let endMs = slotMs[slotMs.length - 1] + slotWidthMs; // 最後のスロット終端

  // ライブモード: X軸をコンテスト全体に合わせて拡張
  if (wsLiveMode) {
    // 追加ログ読み込み時にX軸が縮まないよう、前回の正しい範囲を下限として維持
    if (_multiLogMode && globalStartMs !== null && globalStartMs < startMs) startMs = globalStartMs;
    if (_multiLogMode && globalEndMs   !== null && globalEndMs   > endMs)   endMs   = globalEndMs;
    const _liveEntry = _logStore.find(l => l.isLive && !l.isGroup);
    // コンテスト名から開始・終了時刻を確定（UTC欄の設定によらず常にこの値を使用）
    // 最初のQSOが日曜→2日目として前日土曜を開始とみなす。それ以外→1日目として当該土曜を使用
    if (_liveEntry && _liveEntry.contestStartMs) {
      const _nameList = [wsContestName, contestName, ..._logStore.filter(l => !l.isLive && !l.isGroup && l._meta).map(l => l._meta.contestName)].filter(Boolean);
      const _durMs = _guessContestDurationMs(_nameList[0] || '');
      if (_wsLiveQsos !== null) {
        // Scenario A: 過去ログが参照、SkookumNetはオーバーレイ
        // SkookumNetの絶対時刻(別年)でX軸を拡張しないよう、参照ログ時間軸基準で計算する
        const _xRefA = _refLog();
        const _refAnchorA = _xRefA ? _xRefA.contestStartMs : startMs;
        const _mappedEnd = _refAnchorA + _durMs;
        if (_mappedEnd > endMs) endMs = _mappedEnd;
      } else {
        const _contestEndMs = _liveEntry.contestStartMs + _durMs;
        if (_liveEntry.contestStartMs < startMs) startMs = _liveEntry.contestStartMs;
        if (_contestEndMs > endMs) endMs = _contestEndMs;
      }
    }
    // 追加ログのシフト後終端時刻を計算してX軸を拡張（過去ログが長い場合）
    if (_multiLogMode) {
      const _xRef = _refLog();
      const _xRefAnchor = _xRef ? _xRef.contestStartMs || startMs : startMs;
      for (const _xLog of _logStore) {
        if (!_isFullChartLogVisible(_xLog) || (_xRef && _xLog.id === _xRef.id)) continue;
        const _xQsos = _getLogQsos(_xLog);
        if (!_xQsos.length) continue;
        const _xShift = _xRefAnchor - (_xLog.contestStartMs || 0) + _xLog.offsetMs;
        const _xLastMs = _xQsos[_xQsos.length - 1].time.getTime() + _xShift;
        const _xSlotEnd = Math.ceil((_xLastMs + slotWidthMs) / slotWidthMs) * slotWidthMs;
        if (_xSlotEnd > endMs) endMs = _xSlotEnd;
      }
    }
    // 現在時刻より2スロット先まで確保（nowラインが見えるように）
    if (_wsLiveQsos !== null && _liveEntry && _liveEntry.contestStartMs) {
      // Scenario A: 参照ログ時間軸上のnow位置で拡張（絶対時刻Date.now()は別年になるため使わない）
      const _xRefB = _refLog();
      const _refAnchorB = _xRefB ? _xRefB.contestStartMs : startMs;
      const _mappedNow = _refAnchorB + (Date.now() - _liveEntry.contestStartMs);
      const _nowNeeded = Math.ceil((_mappedNow + slotWidthMs * 2) / slotWidthMs) * slotWidthMs;
      if (_nowNeeded > endMs) endMs = _nowNeeded;
    } else {
      const _nowNeeded = Math.ceil((Date.now() + slotWidthMs * 2) / slotWidthMs) * slotWidthMs;
      if (_nowNeeded > endMs) endMs = _nowNeeded;
    }
  }

  globalStartMs = startMs;
  globalEndMs = endMs;
  const spanMs = endMs - startMs;
  const tickStepMs = spanMs <= 2 * 3600000 ? 15 * 60000
                   : spanMs <= 6 * 3600000 ? 30 * 60000
                   : spanMs <= 12 * 3600000 ? 60 * 60000
                   : 2 * 3600000;

  // ===== マルチログ: チャート生成前にy軸・yRate軸のmax値を全ログ分含めて算出 =====
  let _allLogsMaxY = qsos.length;
  let _allLogsMaxRate = maxRate;
  if (_multiLogMode) {
    const _preRef = _refLog();
    const _preRefAnchor = _preRef ? _logAnchorMs(_preRef) : startMs;
    for (const _preLog of _logStore) {
      if (!_isFullChartLogVisible(_preLog) || (_preRef && _preLog.id === _preRef.id)) continue;
      const _preQsos = _getLogQsos(_preLog);
      if (!_preQsos.length) continue;
      _allLogsMaxY = Math.max(_allLogsMaxY, _preQsos.length);
      const _preRate = calcRateData(_preQsos, rateWindowSecs / 60, []);
      if (_preRate.length) _allLogsMaxRate = Math.max(_allLogsMaxRate, ..._preRate.map(p => p.y));
    }
    // 少し余白を追加（追加ログがメインログより多い場合でも見切れないように）
    _allLogsMaxY = Math.ceil(_allLogsMaxY * 1.05);
    _allLogsMaxRate = Math.ceil(_allLogsMaxRate * 1.05);
  }

  cumulChart = new Chart(cCtx, {
    type: 'scatter',
    data: {
      datasets: [
        {
          label: i18n('cumulDataset'),
          data: scatterData,
          backgroundColor: '#E24B4A',
          pointRadius: ptRadius,
          pointHoverRadius: ptRadius + 2,
          pointStyle: 'circle',
          yAxisID: 'y'
        },
        {
          label: i18n('rateDataset'),
          data: rateLineData,
          type: 'line',
          borderColor: 'rgba(79,195,247,0.35)',
          backgroundColor: 'transparent',
          borderWidth: 1.5,
          pointRadius: 0,
          pointHoverRadius: 3,
          tension: 0,
          spanGaps: false,
          normalized: true,
          parsing: false,
          hidden: !showRate,
          _isRate: true,
          yAxisID: 'yRate'
        },
        {
          label: 'EMA',
          data: _initTrend.ema,
          type: 'line',
          borderColor: 'rgba(0,229,255,0.35)',
          backgroundColor: 'transparent',
          borderWidth: 2,
          pointRadius: 0,
          tension: 0,
          spanGaps: false,
          normalized: true,
          parsing: false,
          yAxisID: 'yRate'
        },
        {
          label: 'LOESS',
          data: _initTrend.loess,
          type: 'line',
          borderColor: 'rgba(105,240,174,0.35)',
          backgroundColor: 'transparent',
          borderWidth: 2.5,
          pointRadius: 0,
          tension: 0,
          spanGaps: false,
          normalized: true,
          parsing: false,
          yAxisID: 'yRate'
        },
        {
          label: 'ACCEL',
          data: _initTrend.accel,
          type: 'line',
          borderColor: 'rgba(255,214,0,0.25)',
          backgroundColor: 'rgba(255,214,0,0.03)',
          fill: 'origin',
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0,
          spanGaps: false,
          normalized: true,
          parsing: false,
          yAxisID: 'yAccel'
        }
      ]
    },
    options: {
      _label: i18n('cumulLabel'),
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      layout: { padding: { top: 0, bottom: spanMs > 24 * 3600000 ? 14 : 0 } },
      plugins: {
        legend: { display: false },
        tooltip: {
          enabled: false,
          animation: false,
          mode: 'index',
          intersect: false,
          external: (context) => {
            const {chart, tooltip} = context;
            const tip = document.getElementById('bar-tooltip');
            if (!tip) return;
            if (sharedCrosshairMs === null) return; // ペインが bar-tooltip を使用中の可能性があるため触らない
            if (tooltip.opacity === 0 || _suppressTooltip) { tip.style.display = 'none'; return; }
            const timeMs = sharedCrosshairMs;
            const d_ = new Date(timeMs);
            const ts = [d_.getUTCHours(), d_.getUTCMinutes(), d_.getUTCSeconds()].map(v => String(v).padStart(2,'0')).join(':');
            const bsearch = arr => {
              if (!arr || !arr.length) return null;
              let lo = 0, hi = arr.length - 1, best = 0;
              while (lo <= hi) { const mid = (lo+hi)>>1; if (arr[mid].x <= timeMs) { best = mid; lo = mid+1; } else hi = mid-1; }
              return arr[best];
            };
            const ds = chart.data.datasets;
            const _tipLine = (pfx, nc, nr, ne, nl, na, cC, rC, eC, lC, aC) => {
              const parts = [];
              if (nc) parts.push(`<span style="color:${cC}">${pfx}${i18n('cumulTooltip', Math.round(nc.y)).trim()}</span>`);
              if (nr) parts.push(`<span style="color:${_dimHex(rC)}">Rate: ${nr.y.toFixed(1)}</span>`);
              if (ne) parts.push(`<span style="color:${_dimHex(eC)}">EMA: ${ne.y.toFixed(1)}</span>`);
              if (nl) parts.push(`<span style="color:${_dimHex(lC)}">LOESS: ${nl.y.toFixed(1)}</span>`);
              if (na) parts.push(`<span style="color:${_dimHex(aC)}">ACCEL: ${na.y.toFixed(2)}</span>`);
              return parts.join(' · ');
            };
            const lines = [];
            // 参照ログ (datasets 0-4)
            const refLog_ = _refLog();
            if (!refLog_ || refLog_.visible) {
              const pfx = _multiLogMode ? `[${refLog_ ? _logDistinctLabel(refLog_) : ''}] ` : '';
              const refC = (refLog_ && refLog_.color) || '#E24B4A';
              const nc = bsearch(ds[0] ? ds[0].data : null);
              const nr = bsearch(ds[1] ? ds[1].data : null);
              const ne = showEMA   ? bsearch(ds[2] ? ds[2].data : null) : null;
              const nl = showLOESS ? bsearch(ds[3] ? ds[3].data : null) : null;
              const na = showACCEL ? bsearch(ds[4] ? ds[4].data : null) : null;
              const ln = _tipLine(pfx, nc, nr, ne, nl, na, refC, 'rgba(79,195,247,0.9)', '#00e5ff', '#69f0ae', '#ffd600');
              if (ln) lines.push(ln);
            }
            // 追加ログ
            if (_multiLogMode) {
              const seen = new Set();
              for (let i = 0; i < ds.length; i++) {
                const d2 = ds[i];
                if (!d2._isAdditional || !d2._logId || d2.yAxisID !== 'y' || seen.has(d2._logId)) continue;
                seen.add(d2._logId);
                const log_ = _logStore.find(l => l.id === d2._logId);
                if (!log_ || !log_.visible) continue;
                const lbl = _logDistinctLabel(log_);
                const oc = _logOverlayColors(log_);
                const rc = _logRateColor(log_);
                const sibs = ds.filter(sd => sd._logId === d2._logId && sd._isAdditional && sd !== d2);
                const rateDs  = sibs.find(sd => (sd.label||'').endsWith(' rate'));
                const emaDs   = sibs.find(sd => (sd.label||'').endsWith(' EMA'));
                const loessDs = sibs.find(sd => (sd.label||'').endsWith(' LOESS'));
                const accelDs = sibs.find(sd => sd.yAxisID === 'yAccel');
                const nc = bsearch(d2.data);
                const nr = bsearch(rateDs ? rateDs.data : null);
                const ne = showEMA   && emaDs   ? bsearch(emaDs.data)   : null;
                const nl = showLOESS && loessDs ? bsearch(loessDs.data) : null;
                const na = showACCEL && accelDs ? bsearch(accelDs.data) : null;
                const ln = _tipLine(`[${lbl}] `, nc, nr, ne, nl, na, log_.color, rc, oc.ema, oc.loess, oc.accel);
                if (ln) lines.push(ln);
              }
            }
            if (!lines.length) { tip.style.display = 'none'; return; }
            tip.innerHTML = `<div style="color:#8a8a88;margin-bottom:2px;">${ts} UTC</div>${lines.join('<br>')}`;
            tip.style.display = 'block';
            const cr = chart.canvas.getBoundingClientRect();
            const _tipX = cr.left + tooltip.caretX;
            const _tipW = tip.offsetWidth;
            tip.style.left = Math.max(4, _tipX + 14 + _tipW < window.innerWidth ? _tipX + 14 : _tipX - _tipW - 12) + 'px';
            tip.style.top  = (cr.top  + tooltip.caretY - 20) + 'px';
          }
        }
      },
      scales: {
        x: {
          type: 'linear',
          min: startMs,
          max: endMs,
          ticks: {
            stepSize: tickStepMs,
            font: { size: 10, family: 'SF Mono, Fira Code, monospace' },
            color: 'rgba(255,255,255,0.65)',
            padding: 2 + Math.max(1, _multiOpSegments.length) * 6,
            callback: v => { const d = new Date(v); return String(d.getUTCHours()).padStart(2,'0') + ':' + String(d.getUTCMinutes()).padStart(2,'0'); }
          },
          grid: { color: 'rgba(255,255,255,0.05)' },
          border: { color: 'rgba(255,255,255,0.1)' }
        },
        y: {
          min: 0,
          max: _allLogsMaxY,
          beginAtZero: true,
          grace: 0,
          afterFit(scale) { scale.width = 52; },
          afterBuildTicks(scale) {
            // ズーム時は表示範囲(min〜max)に合わせてキリ番tickを生成
            const minVal = scale.min || 0;
            const maxVal = scale.max;
            const range  = Math.max(maxVal - minVal, 1);
            const steps  = [1,2,5,10,20,25,50,100,200,250,500,1000,2000,2500,5000,10000];
            const step   = steps.find(s => range / s <= 6) || 10000;
            const firstTick = minVal === 0 ? 0 : Math.ceil(minVal / step) * step;
            const ticks = [];
            for (let v = firstTick; v <= maxVal; v += step) ticks.push({ value: v });
            // 非ズーム時(min=0)のみ最後にqsos.length合計を追加
            if (minVal === 0 && ticks.length && ticks[ticks.length - 1].value !== maxVal) {
              ticks.push({ value: maxVal });
            }
            if (!ticks.length) ticks.push({ value: maxVal });
            scale.ticks = ticks;
          },
          ticks: { font: { size: 10 }, color: '#E24B4A' },
          grid: { color: 'rgba(255,255,255,0.05)' },
          border: { color: 'rgba(255,255,255,0.1)' }
        },
        yRate: {
          position: 'right',
          min: 0,
          max: _allLogsMaxRate,
          beginAtZero: true,
          grace: 0,
          afterFit(scale) { scale.width = 52; },
          ticks: { font: { size: 10 }, color: 'rgba(79,195,247,0.9)', maxTicksLimit: 8 },
          grid: { drawOnChartArea: false },
          border: { color: 'rgba(79,195,247,0.3)' },
          title: { display: true, text: 'QSO/h', font: { size: 10 }, color: 'rgba(79,195,247,0.9)' }
        },
        yAccel: {
          display: false,
          min: -1,
          max: 1,
          beginAtZero: false,
        },
      }
    },
    plugins: [accelAxisPlugin, wsNowLinePlugin],
  });
  // シングルログモード: 日付アンカーを設定
  cumulChart._dayAnchorMs = startMs;

  // ===== マルチログ: 追加ログのデータセットをcumulChartに追加 =====
  if (_multiLogMode) {
    const _mlRef = _refLog();
    // 全体グラフは常にcontest start基準で揃える（アンカー設定に依存しない）
    const _mlRefAnchor = _mlRef ? _mlRef.contestStartMs : startMs;
    for (const _mlLog of _logStore) {
      if (!_isFullChartLogVisible(_mlLog) || (_mlRef && _mlLog.id === _mlRef.id)) continue;
      const _mlQsos = _getLogQsos(_mlLog);
      if (!_mlQsos.length) continue;
      // Cabrilloログの _liveTime を必要に応じて設定
      if (!_mlLog._isAdif) {
        const _mlGroups = new Map();
        _mlQsos.forEach((q, i) => {
          const k = Math.floor(q.time.getTime() / 60000) * 60000;
          if (!_mlGroups.has(k)) _mlGroups.set(k, []);
          _mlGroups.get(k).push(i);
        });
        _mlGroups.forEach((idxs, minMs) => {
          const n = idxs.length;
          idxs.forEach((qi, k) => { _mlQsos[qi]._liveTime = minMs + Math.round(60000 * k / n); });
        });
      }
      const _mlAnchor = _mlLog.contestStartMs;  // 全体グラフ: 常にcontest start基準
      const _mlShift  = _mlRefAnchor - _mlAnchor + _mlLog.offsetMs;
      const _mlPr = _mlQsos.length > 5000 ? 1 : _mlQsos.length > 1000 ? 1.5 : 2.5;
      const _mlRateColor = _logRateColor(_mlLog);
      const _mlIsGroup = _mlLog.isGroup;
      if (_mlIsGroup) {
        // グループ合算: 累積は破線で結んだライン（散点なし）、レート線も破線
        cumulChart.data.datasets.push({
          label: _mlLog.label,
          data: _mlQsos.map((q, i) => ({
            x: (_mlLog._isAdif !== false ? q.time.getTime() : (q._liveTime ?? q.time.getTime())) + _mlShift,
            y: i + 1,
          })),
          type: 'line',
          borderColor: _mlLog.color + 'cc', backgroundColor: 'transparent',
          borderWidth: 1.5, borderDash: [6, 3], pointRadius: 0, tension: 0,
          spanGaps: false, normalized: true, parsing: false,
          yAxisID: 'y', _logId: _mlLog.id, _isAdditional: true, _isGroup: true,
        });
        cumulChart.data.datasets.push({
          label: _mlLog.label + ' rate',
          data: calcRateData(_mlQsos, rateWindowSecs / 60, []).map(pt => ({ x: pt.x + _mlShift, y: pt.y })),
          type: 'line',
          borderColor: _mlRateColor + 'aa', backgroundColor: 'transparent',
          borderWidth: 1.5, borderDash: [4, 4], pointRadius: 0, tension: 0,
          spanGaps: false, normalized: true, parsing: false,
          hidden: !showRate, _isRate: true,
          yAxisID: 'yRate', _logId: _mlLog.id, _isAdditional: true, _isGroup: true,
        });
      } else {
      // cumul scatter
      cumulChart.data.datasets.push({
        label: _mlLog.label,
        data: _mlQsos.map((q, i) => ({
          x: (_mlLog._isAdif ? q.time.getTime() : (q._liveTime ?? q.time.getTime())) + _mlShift,
          y: i + 1,
        })),
        backgroundColor: _mlLog.color,
        pointRadius: _mlPr, pointHoverRadius: _mlPr + 2,
        pointStyle: 'circle', yAxisID: 'y',
        _logId: _mlLog.id, _isAdditional: true,
      });
      // rate line (scatter色と異なる系列色)
      cumulChart.data.datasets.push({
        label: _mlLog.label + ' rate',
        data: calcRateData(_mlQsos, rateWindowSecs / 60, []).map(pt => ({ x: pt.x + _mlShift, y: pt.y })),
        type: 'line',
        borderColor: _mlRateColor + '66', backgroundColor: 'transparent',
        borderWidth: 1.5, pointRadius: 0, tension: 0,
        spanGaps: false, normalized: true, parsing: false,
        hidden: !showRate, _isRate: true,
        yAxisID: 'yRate', _logId: _mlLog.id, _isAdditional: true,
      });
      // EMA / LOESS / ACCEL（表示フラグに従い追加）
      const _mlBasic = calcRateBasic(_mlQsos, rateWindowSecs / 60);
      const _mlTrend = _computeTrendSeries(_mlBasic, rateWindowSecs / 60);
      const _mlOC = _logOverlayColors(_mlLog);
      if (showEMA && _mlTrend.ema.length) {
        cumulChart.data.datasets.push({
          label: _mlLog.label + ' EMA',
          data: _mlTrend.ema.map(pt => ({ x: pt.x + _mlShift, y: pt.y })),
          type: 'line', borderColor: _mlOC.ema + '66', backgroundColor: 'transparent',
          borderWidth: 2, pointRadius: 0, tension: 0,
          spanGaps: false, normalized: true, parsing: false,
          yAxisID: 'yRate', _logId: _mlLog.id, _isAdditional: true,
        });
      }
      if (showLOESS && _mlTrend.loess.length) {
        cumulChart.data.datasets.push({
          label: _mlLog.label + ' LOESS',
          data: _mlTrend.loess.map(pt => ({ x: pt.x + _mlShift, y: pt.y })),
          type: 'line', borderColor: _mlOC.loess + '66', backgroundColor: 'transparent',
          borderWidth: 2.5, pointRadius: 0, tension: 0,
          spanGaps: false, normalized: true, parsing: false,
          yAxisID: 'yRate', _logId: _mlLog.id, _isAdditional: true,
        });
      }
      if (showACCEL && _mlTrend.accel.length) {
        cumulChart.data.datasets.push({
          label: _mlLog.label + ' ACCEL',
          data: _mlTrend.accel.map(pt => ({ x: pt.x + _mlShift, y: pt.y })),
          type: 'line', borderColor: _mlOC.accel + '44',
          backgroundColor: _mlOC.accel + '0a', fill: 'origin',
          borderWidth: 1, pointRadius: 0, tension: 0,
          spanGaps: false, normalized: true, parsing: false,
          yAxisID: 'yAccel', _logId: _mlLog.id, _isAdditional: true,
        });
      }
      } // end non-group else
    }
    // 参照ログが非表示または全体グラフ選択から除外されている場合、メインデータセット(0-4)を隠す
    if (_mlRef && !_isFullChartLogVisible(_mlRef)) {
      for (let _vi = 0; _vi < 5 && _vi < cumulChart.data.datasets.length; _vi++) {
        cumulChart.setDatasetVisibility(_vi, false);
      }
    }
    // x軸を経過時間表示に切り替え (H:MM elapsed、24h超は0に折り返し)
    cumulChart._dayAnchorMs = _mlRefAnchor;
    cumulChart.options.scales.x.ticks.callback = v => {
      const el = v - _mlRefAnchor;
      const dayMs = 24 * 3600000;
      const wrapped = ((el % dayMs) + dayMs) % dayMs;
      return String(Math.floor(wrapped / 3600000)).padStart(2, '0') + ':' + String(Math.floor((wrapped % 3600000) / 60000)).padStart(2, '0');
    };
    // y軸・yRate軸maxを事前計算値で確実に上書き（Chart.js内部で変わっている場合への保険）
    cumulChart.options.scales.y.max = _allLogsMaxY;
    cumulChart.options.scales.yRate.max = _allLogsMaxRate;
    cumulChart.update('none');
  }

  // バンド別積み上げデータを構築 (スロットごと)
  // 左軸: QSO数(生), 右軸: QSO/h
  const slotMaxQso = (() => {
    const totals = slotMs.map((_, si) =>
      allBands.reduce((s, b) => s + (bandData[b][si] || 0), 0)
    );
    return Math.max(...totals, 1);
  })();
  const slotMaxRate = (() => {
    const totals = slotMs.map((_, si) =>
      allBands.reduce((s, b) => s + Math.round((bandData[b][si] || 0) * (60 / rateMins)), 0)
    );
    return Math.max(...totals, 1);
  })();

  // 棒グラフ用データ: [{ms, stacks:[{band,val}]}]
  // バンドを波長の大きい順（160m最下部→10m→6m...上へ積み上げ）にソート
  const sortedBands = [...allBands].sort((a, b) => bandToMeters(b) - bandToMeters(a));
  rateSlots = slotMs.map((ms, si) => ({
    ms,
    stacks: sortedBands
      .map(b => ({
        band: b,
        qso: bandData[b][si] || 0,
        rate: Math.round((bandData[b][si] || 0) * (60 / rateMins))
      }))
      .filter(s => s.qso > 0)
  }));

  // カスタム棒描画プラグイン
  // 棒グラフのツールチップ
  const barTooltipEl = document.getElementById('bar-tooltip');
  const rateCanvas = document.getElementById('chart-rate');
  rateCanvas.addEventListener('mousemove', e => {
    if (!rateChart || !rateChart.scales || !rateChart.scales.x) return;
    const rect = rateCanvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const xScale = rateChart.scales.x;
    const ca = rateChart.chartArea;
    if (mouseX < ca.left || mouseX > ca.right) { barTooltipEl.style.display = 'none'; return; }
    const ms = xScale.getValueForPixel(mouseX);

    // マウス位置が乗っているログのサブバーを特定する
    const sets = (_multiLogMode ? _rateSlotsPerLog : (_rateSlotsPerLog.length ? [_rateSlotsPerLog[0]] : [])).filter(s => {
      const log = _logStore.find(l => l.id === s.logId);
      return !log || _isFullChartLogVisible(log);
    });
    const n = sets.length;
    if (n === 0) { barTooltipEl.style.display = 'none'; return; }

    // 時刻から参照スロット開始時刻を取得
    let slotMs = null;
    for (const set of sets) {
      const s = set.slots.find(sl => ms >= sl.ms && ms < sl.ms + currentSlotWidthMs);
      if (s) { slotMs = s.ms; break; }
    }
    if (slotMs === null) { barTooltipEl.style.display = 'none'; return; }

    // スロットのピクセル幅からサブバー幅を算出し、どのログか判定
    const xMin = xScale.min, xMax = xScale.max, W = ca.right - ca.left;
    const fullPx  = ca.left + (slotMs - xMin) / (xMax - xMin) * W;
    const fullEnd = ca.left + (Math.min(slotMs + currentSlotWidthMs, xMax) - xMin) / (xMax - xMin) * W;
    const subW    = Math.max(1, (fullEnd - fullPx) / n);
    const logIdx  = Math.min(n - 1, Math.max(0, Math.floor((mouseX - fullPx) / subW)));

    const targetSet = sets[logIdx];
    const slot = targetSet.slots.find(sl => ms >= sl.ms && ms < sl.ms + currentSlotWidthMs);
    if (!slot || !slot.stacks.length) { barTooltipEl.style.display = 'none'; return; }

    const log = _logStore.find(l => l.id === targetSet.logId);
    const timeStr = fmtUtc(slot.ms) + '〜' + fmtUtc(slot.ms + currentSlotWidthMs);
    const totalQso  = slot.stacks.reduce((s, x) => s + x.qso,  0);
    const totalRate = slot.stacks.reduce((s, x) => s + x.rate, 0);
    const lbl    = (_multiLogMode && log) ? `[${_logDistinctLabel(log)}] ` : '';
    const isDark = logIdx > 0;
    const rows = [...slot.stacks].reverse().map(({band, qso, rate}) => {
      const bc = isDark ? _darkenHexColor(BAND_COLORS[band]||BAND_COLORS.other) : (BAND_COLORS[band]||BAND_COLORS.other);
      return `<span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${bc};margin-right:4px;"></span>${i18n('bandTooltip', bandLabel(band), qso, rate)}`;
    }).join('<br>');
    barTooltipEl.innerHTML = `<div style="color:#8a8a88;margin-bottom:2px;">${lbl}${timeStr} UTC</div>${rows}<div style="border-top:0.5px solid rgba(255,255,255,0.1);margin-top:4px;padding-top:4px;">${lbl}${i18n('totalTooltip', totalQso, totalRate)}</div>`;
    barTooltipEl.style.display = 'block';
    const _rtW = barTooltipEl.offsetWidth;
    barTooltipEl.style.left = Math.max(4, e.clientX + 12 + _rtW < window.innerWidth ? e.clientX + 12 : e.clientX - _rtW - 12) + 'px';
    barTooltipEl.style.top  = (e.clientY - 20) + 'px';
  });
  rateCanvas.addEventListener('mouseleave', () => {
    barTooltipEl.style.display = 'none';
  });
  rateCanvas.addEventListener('touchmove', e => {
    if (e.touches.length !== 1) return;
    e.preventDefault();
    const t = e.touches[0];
    rateCanvas.dispatchEvent(new MouseEvent('mousemove', { clientX: t.clientX, clientY: t.clientY - 60, bubbles: false }));
  }, { passive: false });
  rateCanvas.addEventListener('touchend', () => _scheduleTooltipHide(3000));

  rateBarsPlugin = {
    id: 'rateBars',
    afterDraw(chart) {
      try {
        const { ctx, chartArea: { left, right, top, bottom }, scales: { x, y } } = chart;
        if (!x || !y) return;
        const xMin = x.min, xMax = x.max, yMax = y.max;
        const W = right - left, H = bottom - top;
        ctx.save();
        ctx.beginPath();
        ctx.rect(left, top, W, H);
        ctx.clip();
        const sets = _rateSlotsPerLog.filter(s => s.visible);
        const n = sets.length || 1;
        sets.forEach((set, si) => {
          set.slots.forEach(slot => {
            if (slot.ms + currentSlotWidthMs < xMin || slot.ms >= xMax) return;
            const fullPx  = left + (slot.ms - xMin) / (xMax - xMin) * W;
            const fullEnd = left + (Math.min(slot.ms + currentSlotWidthMs, xMax) - xMin) / (xMax - xMin) * W;
            const fullW   = Math.max(1, fullEnd - fullPx);
            const subW    = fullW / n;
            const px      = fullPx + si * subW;
            let yBase = bottom;
            slot.stacks.forEach(({ band, qso }) => {
              const barH = qso / yMax * H;
              const baseColor = BAND_COLORS[band] || BAND_COLORS.other;
              ctx.fillStyle = (si === 0 ? baseColor : _darkenHexColor(baseColor)) + (n > 1 ? 'aa' : 'cc');
              ctx.fillRect(px, yBase - barH, Math.max(1, subW - 1), barH);
              yBase -= barH;
            });
          });
        });
        ctx.restore();
      } catch(e) {}
    }
  };

  const rCtx = document.getElementById('chart-rate').getContext('2d');
  if (rateChart) { rateChart.destroy(); rateChart = null; }
  rateChart = new Chart(rCtx, {
    type: 'scatter',
    data: { datasets: [] },
    plugins: [rateBarsPlugin],
    options: {
      _label: i18n('rateLabel'),
      _labelColor: '#ffffff',
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      layout: { padding: { top: 0, bottom: spanMs > 24 * 3600000 ? 14 : 0 } },
      plugins: {
        legend: { display: false },
        tooltip: { enabled: false }
      },
      scales: {
        x: {
          type: 'linear',
          min: startMs,
          max: endMs,
          ticks: {
            stepSize: tickStepMs,
            font: { size: 10, family: 'SF Mono, Fira Code, monospace' },
            color: 'rgba(255,255,255,0.65)',
            callback: v => { const d = new Date(v); return String(d.getUTCHours()).padStart(2,'0') + ':' + String(d.getUTCMinutes()).padStart(2,'0'); }
          },
          grid: { display: false },
          border: { color: 'rgba(255,255,255,0.1)' }
        },
        y: {
          min: 0,
          max: slotMaxQso,
          beginAtZero: true,
          grace: 0,
          bounds: 'ticks',
          afterFit(scale) { scale.width = 52; scale.paddingBottom = 0; scale.paddingTop = 0; },
          ticks: { font: { size: 10 }, color: 'rgba(255,255,255,0.65)', maxTicksLimit: 6 },
          grid: { color: 'rgba(255,255,255,0.05)' },
          border: { color: 'rgba(255,255,255,0.1)' },
          title: { display: true, text: i18n('yAxisQso'), font: { size: 10 }, color: 'rgba(255,255,255,0.65)' }
        },
        yRight: {
          position: 'right',
          display: true,
          min: 0,
          max: slotMaxRate,
          afterFit(scale) { scale.width = 52; },
          ticks: { font: { size: 10 }, color: '#888780', maxTicksLimit: 5,
            callback: v => v + '/h' },
          grid: { drawOnChartArea: false },
          border: { color: 'rgba(255,255,255,0.1)' },
          title: { display: true, text: 'QSO/h', font: { size: 10 }, color: '#888780' }
        }
      }
    }
  });
  rateChart._dayAnchorMs = startMs;

  // ===== _rateSlotsPerLog を構築 (rateBarsPlugin が参照) =====
  {
    const _rs_ref = _refLog();
    const _rs_refAnchor = _rs_ref ? _rs_ref.contestStartMs : startMs; // 全体グラフ: 常にcontest start基準
    // 参照ログ: rateSlots をそのまま使用
    _rateSlotsPerLog = [{
      logId: _rs_ref ? _rs_ref.id : null,
      visible: !_rs_ref || _isFullChartLogVisible(_rs_ref),
      slots: rateSlots,
    }];
    // 追加ログ
    if (_multiLogMode) {
      for (const _rsLog of _logStore) {
        if (!_isFullChartLogVisible(_rsLog) || (_rs_ref && _rsLog.id === _rs_ref.id) || _rsLog.isGroup) continue;
        const _rsQsos = _getLogQsos(_rsLog);
        if (!_rsQsos.length) continue;
        const _rsAnchor = _rsLog.contestStartMs; // 全体グラフ: 常にcontest start基準
        const _rsShift  = _rs_refAnchor - _rsAnchor + _rsLog.offsetMs;
        const { bandData: _rsBd, allBands: _rsAb, slotMs: _rsSms } = buildTimeline(_rsQsos, rateMins);
        const _rsSorted = [..._rsAb].sort((a, b) => bandToMeters(b) - bandToMeters(a));
        _rateSlotsPerLog.push({
          logId: _rsLog.id,
          visible: true,
          slots: _rsSms.map((ms, si) => ({
            ms: ms + _rsShift,
            stacks: _rsSorted.map(b => ({
              band: b,
              qso: _rsBd[b][si] || 0,
              rate: Math.round((_rsBd[b][si] || 0) * (60 / rateMins)),
            })).filter(s => s.qso > 0),
          })),
        });
      }
      // グループエントリはバンド棒グラフに追加しない（個別メンバーで二重計上になるため）
      // rateChart の x軸ラベルも経過時間表示に
      rateChart._dayAnchorMs = cumulChart._dayAnchorMs;
      rateChart.options.scales.x.ticks.callback = cumulChart.options.scales.x.ticks.callback;
      // y軸max: 全ログの最大スロット合計
      const _allMax = Math.max(..._rateSlotsPerLog.flatMap(s =>
        s.slots.map(sl => sl.stacks.reduce((a, b) => a + b.qso, 0))
      ), 1);
      rateChart.options.scales.y.max = _allMax;
      rateChart.update('none');
    }
  }

  // ACCEL軸を全データセットの実データ範囲で初期化（マルチログ時も全ログを考慮）
  if (showACCEL && cumulChart) {
    let _accelAbsMax = 1;
    cumulChart.data.datasets.forEach(ds => {
      if (ds.yAxisID === 'yAccel' && ds.data && ds.data.length > 0) {
        ds.data.forEach(p => { _accelAbsMax = Math.max(_accelAbsMax, Math.abs(p.y)); });
      }
    });
    _accelYMin = -_accelAbsMax; _accelYMax = _accelAbsMax;
    cumulChart._accelYMin = _accelYMin;
    cumulChart._accelYMax = _accelYMax;
    cumulChart.options.scales.yAccel.min = _accelYMin;
    cumulChart.options.scales.yAccel.max = _accelYMax;
    cumulChart.update('none');
  }

  applyView();
}

function applyZoom(xMin, xMax) {
  if (!cumulChart || !rateChart) return;

  // 累積グラフ: xMin-xMax内のQSOのy値(累積数)のmin/max
  const cumulData = cumulChart.data.datasets[0].data;
  let cumulMin = Infinity, cumulMax = 1;
  cumulData.forEach(pt => {
    if (pt.x >= xMin && pt.x <= xMax) {
      cumulMin = Math.min(cumulMin, pt.y);
      cumulMax = Math.max(cumulMax, pt.y);
    }
  });
  if (cumulMin === Infinity) cumulMin = 0;
  // マルチログ時: 追加ログのcumulデータも含めてy軸min/maxを計算
  if (_multiLogMode) {
    cumulChart.data.datasets.forEach(ds => {
      if (!ds._isAdditional || ds.yAxisID !== 'y') return;
      ds.data.forEach(pt => {
        if (pt.x >= xMin && pt.x <= xMax) {
          cumulMin = Math.min(cumulMin, pt.y);
          cumulMax = Math.max(cumulMax, pt.y);
        }
      });
    });
  }
  // 下側だけ少し余白を持たせる（上限は実データの最大値をそのまま使用）
  const cumulPad = Math.max(1, Math.round((cumulMax - cumulMin) * 0.05));
  const cumulYMin = Math.max(0, cumulMin - cumulPad);
  const cumulYMax = cumulMax;

  // レート: xMin-xMax内のレートデータのmax（追加ログ含む）
  let rateMax = 1;
  cumulChart.data.datasets.forEach(ds => {
    if (ds.yAxisID !== 'yRate') return;
    ds.data.forEach(pt => { if (pt.x >= xMin && pt.x <= xMax) rateMax = Math.max(rateMax, pt.y); });
  });

  // 棒グラフ: xMin-xMax内のスロットのmax
  let barMax = 1;
  if (typeof rateSlots !== 'undefined') {
    const slotW = currentSlotWidthMs;
    rateSlots.forEach(slot => {
      if (slot.ms + slotW >= xMin && slot.ms <= xMax) {
        const total = slot.stacks.reduce((s, x) => s + x.qso, 0);
        barMax = Math.max(barMax, total);
      }
    });
  }

  // 累積グラフのy軸更新
  cumulChart.options.scales.x.min = xMin;
  cumulChart.options.scales.x.max = xMax;
  cumulChart.options.scales.y.min = cumulYMin;
  cumulChart.options.scales.y.max = cumulYMax;
  cumulChart.options.scales.yRate.max = Math.max(rateMax, 1);

  if (showACCEL && cumulChart.data.datasets[4]) {
    const accelData = cumulChart.data.datasets[4].data;
    if (accelData && accelData.length > 0) {
      const accelVals = accelData.filter(p => p.x >= xMin && p.x <= xMax).map(p => p.y);
      if (accelVals.length > 0) {
        const absMax = Math.max(...accelVals.map(Math.abs), 1);
        _accelYMin = -absMax;
        _accelYMax =  absMax;
        cumulChart._accelYMin = _accelYMin;
        cumulChart._accelYMax = _accelYMax;
        cumulChart.options.scales.yAccel.min = _accelYMin;
        cumulChart.options.scales.yAccel.max = _accelYMax;
      }
    }
  }

  cumulChart.update('none');

  // 棒グラフのy軸更新
  rateChart.options.scales.x.min = xMin;
  rateChart.options.scales.x.max = xMax;
  rateChart.options.scales.y.max = Math.max(barMax, 1);
  rateChart.update('none');
}

function applyView() {
  const show     = id => { const el = document.getElementById(id); if (el) { el.style.display = 'flex'; el.style.flex = '1'; } };
  const showBand = id => { const el = document.getElementById(id); if (el) { el.style.display = 'flex'; el.style.flex = '0.5'; } };
  const hide     = id => { const el = document.getElementById(id); if (el) el.style.display = 'none'; };

  ['cumul-section','rate-section','legend-section','rate-unit-section'].forEach(hide);
  const panesContainer = document.getElementById('live-panes-container');
  if (panesContainer) panesContainer.style.display = 'none';

  // データ読込済みまたはlive3hアクティブ時は empty-msg を隠す
  const emptyMsg = document.getElementById('empty-msg');
  if (emptyMsg) {
    const _hasChartData = typeof cumulChart !== 'undefined' && cumulChart !== null;
    emptyMsg.style.display = (activeViews.has('live3h') || (activeViews.has('full') && _hasChartData)) ? 'none' : '';
  }

  if (activeViews.has('full')) {
    show('cumul-section');
    if (showBandActivity) showBand('rate-section');
  }
  const _anyView = activeViews.has('full') || activeViews.has('live3h');
  if (_anyView) {
    const legendSec = document.getElementById('legend-section');
    if (legendSec) legendSec.style.display = '';
    if (showBandActivity) {
      const rateUnitSec = document.getElementById('rate-unit-section');
      if (rateUnitSec) rateUnitSec.style.display = '';
    }
  }
  if (activeViews.has('live3h')) {
    if (panesContainer) panesContainer.style.display = 'flex';
    if (_livePanes.length === 0) _createLivePane(3 * 3600000);
    else _rebalanceLayout();  // 既存ペインがある場合も再計算
    _startLiveAnimation();  // データなし時もRAFループを開始
    // バンドセクション表示切り替え
    for (const pane of _livePanes) {
      const bandSec = pane.el.querySelector('.live-pane-band');
      if (bandSec) bandSec.style.display = (showBandActivity && rateBarsPlugin) ? 'flex' : 'none';
    }
  }

  document.querySelectorAll('.view-btn').forEach(b =>
    b.classList.toggle('active', activeViews.has(b.dataset.view)));
  const bt = document.getElementById('band-toggle-btn');
  if (bt) bt.classList.toggle('active', showBandActivity);

  requestAnimationFrame(() => {
    const allCharts = [cumulChart, rateChart, ..._livePanes.flatMap(p => [p.chart, p.bandChart])].filter(Boolean);
    allCharts.forEach(c => c.resize());
  });
}

async function loadText(text, appendMode) {
  try {
    const newQsos = detectAndParse(text);
    if (newQsos.length === 0) {
      alert(i18n('noQsoData'));
      return;
    }

    // await前にX軸範囲を保存（ライブログが既存の場合のみ、await中にwsLiveModeが変わっても復元できるよう）
    const _hasLiveEntry  = !!_logStore.find(l => l.isLive && !l.isGroup);
    const _preAwaitStart = (_hasLiveEntry && globalStartMs > 0) ? globalStartMs : null;
    const _preAwaitEnd   = (_hasLiveEntry && globalEndMs   > 0) ? globalEndMs   : null;

    // 追加モード判定: appendMode=true、またはログが既にある時に自動確認
    let isAppend = !!appendMode;
    if (!isAppend && _logStore.length > 0 && !appendMode) {
      const choice = await _customConfirm(i18n('logLoadedConfirm'), 'OK');
      isAppend = choice; // OK→追加, Cancel→置換
    }

    // ラベル生成: コールサイン + 年 + コンテスト名（全部つなげた詳細ラベル）
    // 表示時の短縮は _logDistinctLabel() が担当
    const _loadYear = newQsos.length ? newQsos[0].time.getUTCFullYear() : null;
    const _loadMeta = { callsign: callsign || null, year: _loadYear, contestName: contestName || null };
    function _makeLogLabel(fallback) {
      const parts = [];
      if (callsign) parts.push(callsign);
      if (_loadYear) parts.push(String(_loadYear));
      if (contestName) parts.push(contestName);
      return parts.length ? parts.join(' ') : fallback;
    }

    if (isAppend) {
      // ===== 追加モード =====
      // 重複チェック: 同一コールサイン+年+コンテスト名のログが既に存在する場合はスキップ
      if (_loadMeta.callsign || _loadMeta.year || _loadMeta.contestName) {
        const _isDup = _logStore.some(l => {
          if (!l._meta) return false;
          return l._meta.callsign === _loadMeta.callsign &&
                 l._meta.year === _loadMeta.year &&
                 l._meta.contestName === _loadMeta.contestName;
        });
        if (_isDup) {
          alert(i18n('duplicateLog'));
          return;
        }
      }
      const label = _makeLogLabel('Log ' + (_logStore.length + 1));
      _addLogEntry(newQsos, label, { _isAdif: isAdif, _meta: _loadMeta });
      _renderLogPanel();
      // ログパネルを自動表示
      const _lpEl = document.getElementById('log-panel');
      if (_lpEl) _lpEl.style.display = 'flex';
      // ライブモード中は wsScheduleRender で正しい範囲・データを描画
      if (wsLiveMode) {
        wsScheduleRender();
      } else {
        renderCharts(currentQsos);
        // wsLiveModeがfalseの場合のX軸範囲復元フォールバック
        if (_preAwaitStart !== null && _preAwaitEnd !== null && cumulChart && rateChart) {
          globalStartMs = _preAwaitStart;
          globalEndMs   = _preAwaitEnd;
          applyZoom(_preAwaitStart, _preAwaitEnd);
          cumulChart.update();
        }
      }
    } else {
      // ===== 置換モード =====
      // ライブ接続があれば切断・クリア（追加モードは維持するためここで行う）
      if (wsSocket) wsDisconnect();
      wsLiveMode = false;
      wsQsos = [];
      _wsLiveQsos = null;
      _wsStations.clear();
      if (_liveRafId) { cancelAnimationFrame(_liveRafId); _liveRafId = null; }
      for (const pane of [..._livePanes]) _destroyLivePane(pane.id);
      _logStore = [];
      _multiLogMode = false;
      currentQsos = newQsos;
      const label = _makeLogLabel('Log 1');
      _addLogEntry(newQsos, label, { isReference: true, _isAdif: isAdif, _meta: _loadMeta });
      _renderLogPanel();

      _resetContestRange();
      simLogStart = currentQsos[0].time.getTime();
      simLogEnd   = currentQsos[currentQsos.length - 1].time.getTime();
      simNowMs    = simLogEnd;
      _refreshSimQsos();
      if (activeViews.size === 0 || !activeViews.has('full')) {
        activeViews.add('full');
      }
      renderCharts(currentQsos);
      _startLiveAnimation();
      initSimMode(currentQsos);
    }
  } catch(e) {
    alert((currentLang === 'ja' ? '描画エラー: ' : 'Render error: ') + e.message + '\n' + e.stack.split('\n').slice(0,4).join('\n'));
  }
}

// MM:SS フォーマット
function _fmtRateWin(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

// "MM:SS" または "M:SS" 文字列を秒数に変換。不正な場合は null を返す
function _parseRateWin(str) {
  const m = str.trim().match(/^(\d+):(\d{1,2})$/);
  if (!m) return null;
  const mins = parseInt(m[1], 10), secs = parseInt(m[2], 10);
  if (secs > 59) return null;
  const total = mins * 60 + secs;
  if (total < 1 || total > 7200) return null;
  return total;
}

// レートウィンドウラベル（テキスト入力）から秒数を確定させる共通ハンドラ
// mode: 'master' | 'full' | '3h'
function _applyRateWinLabel(inputEl, sliderEl, mode) {
  const parsed = _parseRateWin(inputEl.value);
  if (parsed === null) {
    // 不正入力: スライダーの現在値に戻す
    inputEl.value = _fmtRateWin(parseInt(sliderEl.value));
    return;
  }
  sliderEl.value = parsed;
  inputEl.value  = _fmtRateWin(parsed);
  if (mode === 'full') {
    rateWindowSecs = parsed;
    _updateCumulRateOnly(parsed / 60);
  } else {
    // マスター: 全スライダーを連動
    rateWindowSecs = parsed;
    const fullEl = document.getElementById('rate-window-full');
    if (fullEl) { fullEl.value = parsed; document.getElementById('rate-window-label-full').value = _fmtRateWin(parsed); }
    // 全ペインに反映
    for (const p of _livePanes) {
      _liveState[p.id].rateWindowSecs = parsed;
      const rs = p.el.querySelector('.pane-rate-slider'); if (rs) rs.value = parsed;
      const rl = p.el.querySelector('.pane-rate-label');  if (rl) rl.value = _fmtRateWin(parsed);
    }
    _updateCumulRateOnly(parsed / 60);
  }
}


// レートラインデータセットだけをインプレース更新（ズーム状態を保持）
function _updateCumulRateOnly(windowMins) {
  if (!cumulChart || !currentQsos.length) return;
  // SkookumNetライブモード: 散点データ(dataset[0])をQSO数が変化したときに更新
  if (wsLiveMode) {
    const _prevLen = cumulChart.data.datasets[0] ? cumulChart.data.datasets[0].data.length : -1;
    if (_prevLen !== currentQsos.length) {
      const _newScatter = currentQsos.map((q, i) => ({
        x: q._liveTime !== undefined ? q._liveTime : q.time.getTime(),
        y: i + 1
      }));
      cumulChart.data.datasets[0].data = _newScatter;
      // x軸末尾を新QSOに合わせて拡張（縮小はしない）
      if (_newScatter.length > 0) {
        const _lastX = _newScatter[_newScatter.length - 1].x;
        const _slotMs = currentSlotWidthMs || 3600000;
        // 追加ログのシフト後終端も考慮してX軸maxを決定
        let _neededMax = Math.ceil((_lastX + _slotMs * 2) / _slotMs) * _slotMs;
        // コンテスト予定終了時刻まで確保（X軸を縮めない）
        const _ucLiveEntry = _logStore.find(l => l.isLive && !l.isGroup);
        // UTC範囲が適用済みならそれを優先使用
        if (contestRangeEndMs !== null && contestRangeEndMs > _neededMax) {
          _neededMax = contestRangeEndMs;
        }
        if (_ucLiveEntry && _ucLiveEntry.contestStartMs) {
          const _ucNames = [wsContestName, contestName, ..._logStore.filter(l => !l.isLive && !l.isGroup && l._meta).map(l => l._meta.contestName)].filter(Boolean);
          const _ucDurMs = _ucNames.reduce((d, n) => d || _guessContestDurationMs(n), null);
          if (_ucDurMs) {
            const _ucContestEnd = _ucLiveEntry.contestStartMs + _ucDurMs;
            if (_ucContestEnd > _neededMax) _neededMax = _ucContestEnd;
          }
        }
        if (_multiLogMode) {
          cumulChart.data.datasets.forEach(ds => {
            if (!ds._isAdditional || ds.yAxisID !== 'y' || !ds.data.length) return;
            const _dsLastX = ds.data[ds.data.length - 1].x;
            const _dsNeeded = Math.ceil((_dsLastX + _slotMs) / _slotMs) * _slotMs;
            if (_dsNeeded > _neededMax) _neededMax = _dsNeeded;
          });
        }
        if (_neededMax > (cumulChart.options.scales.x.max || 0)) {
          cumulChart.options.scales.x.max = _neededMax;
          if (rateChart) rateChart.options.scales.x.max = _neededMax;
        }
        // y軸も最新QSO数に合わせて拡張（追加ログの最大値も含める）
        let _addLogsMaxY = 0;
        if (_multiLogMode) {
          cumulChart.data.datasets.forEach(ds => {
            if (!ds._isAdditional || ds.yAxisID !== 'y') return;
            if (ds.data.length) _addLogsMaxY = Math.max(_addLogsMaxY, ds.data[ds.data.length - 1].y || 0);
          });
        }
        const _newYMax = Math.max(
          currentQsos.length + Math.ceil(currentQsos.length * 0.05) + 1,
          Math.ceil(_addLogsMaxY * 1.05),
          cumulChart.options.scales.y.max || 0
        );
        cumulChart.options.scales.y.max = _newYMax;
      }
    }
  }
  const newRate = calcRateData(currentQsos, windowMins, skipOffTimeRate ? opSegments.filter(s => s.state === 'offtime') : []);
  cumulChart.data.datasets[1].data = newRate;

  // EMA / LOESS / ACCEL 更新（基本アルゴリズムベース）
  const basicRate = calcRateBasic(currentQsos, windowMins);
  const trend = _computeTrendSeries(basicRate, windowMins);
  cumulChart.data.datasets[2].data = trend.ema;
  cumulChart.data.datasets[3].data = trend.loess;
  cumulChart.data.datasets[4].data = trend.accel;

  const xMin = cumulChart.scales.x.min;
  const xMax = cumulChart.scales.x.max;
  let rateMax = 1;
  newRate.forEach(pt => { if (pt.x >= xMin && pt.x <= xMax) rateMax = Math.max(rateMax, pt.y); });
  // 追加ログのRate/EMA/LOESSデータも含めてyRate最大値を算出（マルチログモード）
  if (_multiLogMode) {
    cumulChart.data.datasets.forEach(ds => {
      if (!ds._isAdditional || ds.yAxisID !== 'yRate') return;
      ds.data.forEach(pt => { if (pt.x >= xMin && pt.x <= xMax) rateMax = Math.max(rateMax, pt.y); });
    });
  }
  cumulChart.options.scales.yRate.max = Math.max(rateMax, 1);

  if (showACCEL && trend.accel.length > 0) {
    const accelVals = trend.accel.filter(p => p.x >= xMin && p.x <= xMax).map(p => p.y);
    // 追加ログのACCELも含めてyAccel範囲を算出
    let accelAbsMax = accelVals.length > 0 ? Math.max(...accelVals.map(Math.abs), 1) : 1;
    if (_multiLogMode) {
      cumulChart.data.datasets.forEach(ds => {
        if (!ds._isAdditional || ds.yAxisID !== 'yAccel') return;
        ds.data.forEach(pt => { if (pt.x >= xMin && pt.x <= xMax) accelAbsMax = Math.max(accelAbsMax, Math.abs(pt.y)); });
      });
    }
    if (accelAbsMax > 0) {
      _accelYMin = -accelAbsMax;
      _accelYMax =  accelAbsMax;
      cumulChart._accelYMin = _accelYMin;
      cumulChart._accelYMax = _accelYMax;
      cumulChart.options.scales.yAccel.min = _accelYMin;
      cumulChart.options.scales.yAccel.max = _accelYMax;
    }
  }

  cumulChart.update('none');
}

// コンテスト名から開始時刻(UTCh)と開催日(土曜)を推定してcontestStartMsを返す
function _guessContestDurationMs(contestNameStr) {
  const n = (contestNameStr || '').toUpperCase();
  if (/IARU|WRTC/.test(n)) return 24 * 3600000;
  return 48 * 3600000;
}

function _guessContestStartMs(contestNameStr, firstQsoMs, allOnSunday) {
  if (!firstQsoMs) return null;
  const n = (contestNameStr || '').toUpperCase();
  const startHour = /IARU|WRTC/.test(n) ? 12 : 0;
  const dayMs = 86400000;
  const firstDay = Math.floor(firstQsoMs / dayMs) * dayMs;
  if (allOnSunday) {
    // 全QSOが日曜→コンテスト2日目→前日（土曜）を開始日とする
    return firstDay - dayMs + startHour * 3600000;
  } else {
    // それ以外→最初のQSOをDay 1の開始日とする
    return firstDay + startHour * 3600000;
  }
}

// 参照コンテスト開始時刻の曜日+時刻をライブセッションの週にマッピング
function _mapContestStartToNow(refStartMs, liveFirstQsoMs) {
  const refDow      = new Date(refStartMs).getUTCDay();     // 曜日 (0=日, 6=土)
  const refTimeOfDay = refStartMs % 86400000;               // 日内時刻 (ms)
  const liveBase    = Math.floor(liveFirstQsoMs / 86400000) * 86400000;
  const liveDow     = new Date(liveFirstQsoMs).getUTCDay();
  const daysBack    = (liveDow - refDow + 7) % 7;
  let target = liveBase - daysBack * 86400000 + refTimeOfDay;
  if (target > liveFirstQsoMs) target -= 7 * 86400000;
  return target;
}

// === 設定永続化 (localStorage) ===
const _SETTINGS_KEY = 'cla_settings_v1';

function _saveSettings() {
  const s = {
    showRate, showEMA, showLOESS, showACCEL,
    rateMins, rateWindowSecs,
    activeViews: [...activeViews],
  };
  try { localStorage.setItem(_SETTINGS_KEY, JSON.stringify(s)); } catch(_) {}
}

function _loadSettings() {
  try {
    const raw = localStorage.getItem(_SETTINGS_KEY);
    if (!raw) return;
    const s = JSON.parse(raw);
    if (typeof s.showRate      === 'boolean') showRate      = s.showRate;
    if (typeof s.showEMA       === 'boolean') showEMA       = s.showEMA;
    if (typeof s.showLOESS     === 'boolean') showLOESS     = s.showLOESS;
    if (typeof s.showACCEL     === 'boolean') showACCEL     = s.showACCEL;
    if (typeof s.rateMins      === 'number')  rateMins      = s.rateMins;
    if (typeof s.rateWindowSecs=== 'number')  rateWindowSecs= s.rateWindowSecs;
    // ボタン状態をDOMに反映
    ['rate', 'ema', 'loess', 'accel'].forEach(k => {
      const on = k === 'rate' ? showRate : k === 'ema' ? showEMA : k === 'loess' ? showLOESS : showACCEL;
      document.getElementById(`toggle-${k}`)?.classList.toggle('active', on);
    });
    if (Array.isArray(s.activeViews) && s.activeViews.length) {
      activeViews = new Set(s.activeViews);
      document.querySelectorAll('.view-btn').forEach(b => {
        b.classList.toggle('active', activeViews.has(b.dataset.view));
      });
    }
    // rateWindowSecsをスライダーUIに反映
    const rw = document.getElementById('rate-window');
    if (rw) {
      rw.value = rateWindowSecs;
      const lbl = document.getElementById('rate-window-label');
      if (lbl) lbl.value = _fmtRateWin(rateWindowSecs);
    }
    // rateMinsをrate-btnに反映
    document.querySelectorAll('.rate-btn').forEach(b => {
      b.classList.toggle('active', parseInt(b.dataset.min) === rateMins);
    });
  } catch(_) {}
}

// === セッション保存/復元 ===
const _SESSION_KEY = 'cla_session_v1';

function _serializeQsos(qsos) {
  return qsos.map(q => ({
    ms: q.time.getTime(),
    band: q.band || '',
    mode: q.mode || '',
    freq: q.freq || 0,
    call: q._call || '',
    station: q.station || '',
    liveTime: q._liveTime !== undefined ? q._liveTime : null,
  }));
}

function _deserializeQsos(arr) {
  return arr.map(s => ({
    time: new Date(s.ms),
    band: s.band,
    mode: s.mode,
    freq: s.freq,
    _call: s.call,
    station: s.station,
    _liveTime: s.liveTime !== null ? s.liveTime : undefined,
  }));
}

function _saveSession() {
  try {
    const nonLiveLogs = _logStore.filter(l => !l.isLive && !l.isGroup);
    const logIdToIdx = new Map(nonLiveLogs.map((l, i) => [l.id, i]));
    const logs = nonLiveLogs.map(l => ({
      label: l.label, color: l.color, anchorMode: l.anchorMode,
      contestStartMs: l.contestStartMs, offsetMs: l.offsetMs,
      visible: l.visible, isReference: l.isReference,
      station: l.station, _isAdif: l._isAdif, _meta: l._meta,
      qsos: _serializeQsos(l.qsos),
    }));
    const panes = _livePanes.map(p => {
      const st = _liveState[p.id];
      return {
        winMs:          st.winMs,
        mode:           st.mode,
        rateWindowSecs: st.rateWindowSecs,
        logIdxs: st.logIds ? [...st.logIds].map(id => logIdToIdx.get(id)).filter(i => i !== undefined) : null,
        wsStationSel: st.wsStationSel ? [...st.wsStationSel] : null,
      };
    });
    const wsUrl = document.getElementById('ws-url')?.value || '';
    const rangeStart = document.getElementById('contest-start')?.value || '';
    const rangeEnd   = document.getElementById('contest-end')?.value   || '';
    const s = {
      version: 2, timestamp: Date.now(), logs,
      showRate, showEMA, showLOESS, showACCEL, rateMins, rateWindowSecs,
      activeViews: [...activeViews],
      rangeStart, rangeEnd, wsUrl, panes,
    };
    localStorage.setItem(_SESSION_KEY, JSON.stringify(s));
    // 保存完了フラッシュ
    const btn = document.getElementById('session-save-btn');
    if (btn) { btn.textContent = '✓' + i18n('sessionSave'); setTimeout(() => { btn.textContent = i18n('sessionSave'); }, 1200); }
  } catch(e) {
    alert(i18n('sessionSaveFail'));
  }
}

function _restoreSession() {
  try {
    const raw = localStorage.getItem(_SESSION_KEY);
    if (!raw) { alert(i18n('sessionNoData')); return; }
    const s = JSON.parse(raw);
    // ログを再構築
    if (Array.isArray(s.logs) && s.logs.length) {
      _logStore = [];
      currentQsos = [];
      wsQsos = [];
      _wsLiveQsos = null;
      wsLiveMode = false;
      contestRangeStartMs = null;
      contestRangeEndMs   = null;
      for (const l of s.logs) {
        const qsos = _deserializeQsos(l.qsos || []);
        const id = _newLogId();
        _logStore.push({
          id, label: l.label, color: l.color, qsos,
          anchorMode: l.anchorMode || 'contestStart',
          contestStartMs: l.contestStartMs,
          offsetMs: l.offsetMs || 0,
          visible: l.visible !== false,
          isLive: false, isGroup: false,
          isReference: !!l.isReference,
          memberIds: [], station: l.station || '',
          _isAdif: l._isAdif !== false, _meta: l._meta || null,
        });
      }
      _multiLogMode = _logStore.filter(l => !l.isGroup).length > 1;
      currentQsos = (_logStore.find(l => l.isReference) || _logStore[0])?.qsos.slice() || [];
    }
    // UI設定を復元
    if (typeof s.showRate  === 'boolean') showRate  = s.showRate;
    if (typeof s.showEMA   === 'boolean') showEMA   = s.showEMA;
    if (typeof s.showLOESS === 'boolean') showLOESS = s.showLOESS;
    if (typeof s.showACCEL === 'boolean') showACCEL = s.showACCEL;
    if (typeof s.rateMins      === 'number') rateMins      = s.rateMins;
    if (typeof s.rateWindowSecs=== 'number') rateWindowSecs= s.rateWindowSecs;
    ['rate', 'ema', 'loess', 'accel'].forEach(k => {
      const on = k === 'rate' ? showRate : k === 'ema' ? showEMA : k === 'loess' ? showLOESS : showACCEL;
      document.getElementById(`toggle-${k}`)?.classList.toggle('active', on);
    });
    if (Array.isArray(s.activeViews) && s.activeViews.length) {
      activeViews = new Set(s.activeViews);
      document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', activeViews.has(b.dataset.view)));
    }
    const rw = document.getElementById('rate-window');
    if (rw) { rw.value = rateWindowSecs; const lbl = document.getElementById('rate-window-label'); if (lbl) lbl.value = _fmtRateWin(rateWindowSecs); }
    document.querySelectorAll('.rate-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.min) === rateMins));
    // UTC範囲を復元
    if (s.rangeStart) document.getElementById('contest-start').value = s.rangeStart;
    if (s.rangeEnd)   document.getElementById('contest-end').value   = s.rangeEnd;
    if (s.rangeStart || s.rangeEnd) {
      contestRangeStartMs = parseRangeInput(s.rangeStart);
      contestRangeEndMs   = parseRangeInput(s.rangeEnd);
      _updateRangeApplyState();
    }
    // WS URLを復元
    if (s.wsUrl) { const wu = document.getElementById('ws-url'); if (wu) wu.value = s.wsUrl; }
    // ペイン状態を復元
    if (Array.isArray(s.panes) && s.panes.length && activeViews.has('live3h')) {
      for (const pane of [..._livePanes]) _destroyLivePane(pane.id);
      const restoredLogIds = _logStore.filter(l => !l.isLive && !l.isGroup).map(l => l.id);
      for (const pd of s.panes) {
        const pane = _createLivePane(pd.winMs || 3 * 3600000);
        const st = _liveState[pane.id];
        if (pd.mode === 'scroll' || pd.mode === 'fixed') st.mode = pd.mode;
        if (typeof pd.rateWindowSecs === 'number') {
          st.rateWindowSecs = pd.rateWindowSecs;
          const rs = pane.el.querySelector('.pane-rate-slider'); if (rs) rs.value = pd.rateWindowSecs;
          const rl = pane.el.querySelector('.pane-rate-label'); if (rl) rl.value = _fmtRateWin(pd.rateWindowSecs);
        }
        if (Array.isArray(pd.logIdxs) && pd.logIdxs.length) {
          const ids = pd.logIdxs.filter(i => i < restoredLogIds.length).map(i => restoredLogIds[i]);
          st.logIds = ids.length ? new Set(ids) : null;
        }
        if (Array.isArray(pd.wsStationSel) && pd.wsStationSel.length) {
          st.wsStationSel = new Set(pd.wsStationSel);
        }
        const modeBtn = pane.el.querySelector('.pane-mode-btn');
        if (modeBtn) modeBtn.textContent = i18n(st.mode === 'scroll' ? 'live3hScroll' : 'live3hFollow');
      }
      _updatePaneLogBtns();
    }
    // ログパネル更新・グラフ再描画
    _renderLogPanel();
    if (currentQsos.length) { renderCharts(currentQsos); applyView(); }
    else { document.getElementById('empty-msg').style.display = ''; applyView(); }
  } catch(e) {
    console.error('restoreSession error:', e);
    alert(i18n('sessionRestoreFail'));
  }
}

document.getElementById('session-save-btn').addEventListener('click', _saveSession);
document.getElementById('session-restore-btn').addEventListener('click', _restoreSession);
document.getElementById('compact-btn').addEventListener('click', () => {
  document.body.classList.toggle('compact');
  requestAnimationFrame(() => {
    if (cumulChart) cumulChart.resize();
    if (rateChart) rateChart.resize();
