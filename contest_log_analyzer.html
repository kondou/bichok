});

// 保存済み設定を復元（const宣言完了後に呼ぶ）
_loadSettings();

function parseRangeInput(val) {
  // "YYYY-MM-DD HH:MM" または "YYYY-MM-DDTHH:MM" を UTC として解釈
  if (!val || !val.trim()) return null;
  const s = val.trim().replace(' ', 'T');  // スペース区切りを T 区切りに統一
  const normalized = /T\d{2}:\d{2}:\d{2}$/.test(s) ? s + 'Z'
                   : /T\d{2}:\d{2}$/.test(s)        ? s + ':00Z'
                   : s + 'T00:00:00Z';
  const ms = new Date(normalized).getTime();
  return isNaN(ms) ? null : ms;
}

function applyContestRange() {
  if (contestRangeStartMs === null && contestRangeEndMs === null) return;
  const s = contestRangeStartMs !== null ? contestRangeStartMs : globalStartMs;
  const e = contestRangeEndMs   !== null ? contestRangeEndMs   : globalEndMs;
  if (isNaN(s) || isNaN(e) || s >= e) return;
  globalStartMs = s;
  globalEndMs   = e;
  // コンテスト範囲のスパンに合わせて目盛り間隔を再計算
  const span = e - s;
  const step = span <= 2 * 3600000  ? 15 * 60000
             : span <= 6 * 3600000  ? 30 * 60000
             : span <= 12 * 3600000 ? 60 * 60000
             : span <= 24 * 3600000 ? 2  * 3600000
             : span <= 48 * 3600000 ? 3  * 3600000
             :                        6  * 3600000;
  if (cumulChart) cumulChart.options.scales.x.ticks.stepSize = step;
  if (rateChart)  rateChart.options.scales.x.ticks.stepSize  = step;
  applyZoom(s, e);
}

function utcInputStr(ms) {
  const d = new Date(ms);
  const y  = d.getUTCFullYear();
  const mo = String(d.getUTCMonth() + 1).padStart(2, '0');
  const dy = String(d.getUTCDate()).padStart(2, '0');
  const hh = String(d.getUTCHours()).padStart(2, '0');
  const mm = String(d.getUTCMinutes()).padStart(2, '0');
  return `${y}-${mo}-${dy} ${hh}:${mm}`;
}

function autoFillRangeInputs(qsos) {
  if (!qsos.length) return;
  // 範囲が適用済みの場合は上書きしない（それ以外は新しいファイルの情報で常に更新）
  if (contestRangeStartMs !== null || contestRangeEndMs !== null) return;
  const startEl = document.getElementById('contest-start');
  const endEl   = document.getElementById('contest-end');
  // 最初のQSOの日の 00:00 UTC
  const dayStart = Math.floor(qsos[0].time.getTime() / 86400000) * 86400000;
  startEl.value = utcInputStr(dayStart);
  // 最後のQSOの翌日の 00:00 UTC
  const dayEnd = (Math.floor(qsos[qsos.length - 1].time.getTime() / 86400000) + 1) * 86400000;
  endEl.value = utcInputStr(dayEnd);
}

// renderCharts を上書き: 指定範囲でフィルタリングしてから描画
const _origRenderCharts = renderCharts;
renderCharts = function(qsos) {
  autoFillRangeInputs(qsos);
  let vis = qsos;
  if (contestRangeStartMs !== null || contestRangeEndMs !== null) {
    // SkookumNetライブQSO（_wsLiveQsos !== null の場合は別年のログと比較中）はフィルタしない
    const skipDateFilter = _wsLiveQsos !== null;
    if (!skipDateFilter) {
      vis = qsos.filter(q => {
        const t = q.time.getTime();
        if (contestRangeStartMs !== null && t < contestRangeStartMs) return false;
        if (contestRangeEndMs   !== null && t > contestRangeEndMs)   return false;
        return true;
      });
      if (!vis.length) return;
    }
  }
  _origRenderCharts(vis);
  if (!wsLiveMode && (contestRangeStartMs !== null || contestRangeEndMs !== null)) {
    setTimeout(applyContestRange, 0);
  }
  // レンジ変更時にシムモードの時間範囲を更新（_liveTime が renderCharts 後に確定する）
  if (typeof currentQsos !== 'undefined' && currentQsos.length && typeof simNowMs !== 'undefined' && simNowMs !== null) {
    initSimMode(currentQsos);
  }
};

document.getElementById('grid-input').addEventListener('change', () => {
  manualGridLocator = document.getElementById('grid-input').value.trim().toUpperCase();
  document.getElementById('grid-input').value = manualGridLocator;
  if (currentQsos.length) renderCharts(currentQsos);
});

function _resetContestRange() {
  contestRangeStartMs = null;
  contestRangeEndMs   = null;
  document.getElementById('contest-start').value = '';
  document.getElementById('contest-end').value   = '';
  _updateRangeApplyState();
}

function _updateRangeApplyState() {
  const applied = contestRangeStartMs !== null || contestRangeEndMs !== null;
  const applyBtn = document.getElementById('range-apply-btn');
  const clearBtn = document.getElementById('range-clear-btn');
  applyBtn.style.display = applied ? 'none' : '';
  clearBtn.style.display = applied ? ''     : 'none';
}

function _updateOffTimeToggle() {
  const hasOffTime = opSegments.some(s => s.state === 'offtime');
  const btn = document.getElementById('offtime-skip-btn');
  if (!btn) return;
  btn.style.display = hasOffTime ? '' : 'none';
  if (skipOffTimeRate) {
    btn.style.color = 'var(--accent)';
    btn.style.borderColor = 'var(--accent)';
    btn.textContent = i18n('offtimeSkipping');
  } else {
    btn.style.color = '';
    btn.style.borderColor = '';
    btn.textContent = i18n('offtimeIncluding');
  }
}

document.getElementById('offtime-skip-btn').addEventListener('click', () => {
  skipOffTimeRate = !skipOffTimeRate;
  _updateOffTimeToggle();
  if (currentQsos.length) renderCharts(currentQsos);
});

document.getElementById('range-apply-btn').addEventListener('click', () => {
  const sv = document.getElementById('contest-start').value;
  const ev = document.getElementById('contest-end').value;
  contestRangeStartMs = parseRangeInput(sv);
  contestRangeEndMs   = parseRangeInput(ev);
  if (contestRangeStartMs !== null) {
    // 参照ログのcontestStartMsをUTC範囲開始に合わせる
    const _refE = _refLog();
    if (_refE && !_refE.isLive) _refE.contestStartMs = contestRangeStartMs;
    // ライブログのcontestStartMsは「曜日+時刻」を現在週にマッピング（日付はそのまま使わない）
    const _liveE = _logStore.find(l => l.isLive && !l.isGroup);
    if (_liveE) {
      const firstQsoMs = _liveE.qsos.length ? _liveE.qsos[0].time.getTime() : Date.now();
      _liveE.contestStartMs = _mapContestStartToNow(contestRangeStartMs, firstQsoMs);
    }
  }
  _updateRangeApplyState();
  if (currentQsos.length) renderCharts(currentQsos);
  if (wsLiveMode) wsScheduleRender();
});

document.getElementById('range-clear-btn').addEventListener('click', () => {
  contestRangeStartMs = null;
  contestRangeEndMs   = null;
  _updateRangeApplyState();
  if (currentQsos.length) renderCharts(currentQsos);
  if (wsLiveMode) wsScheduleRender();
});

// === SkookumNet WebSocket Bridge ===

// ------- シミュレーションモード（ADIF/Cabrillo 仮想リアルタイム） -------
/** リアルタイム/シムモード共通の「現在時刻」を返す */
function getNowMs() { return simNowMs !== null ? simNowMs : Date.now(); }

/** ライブチャート描画用QSO列（シムモード時はsimNowMs以前のみ、静的ref+liveの場合はlive優先） */
function getLiveQsos() {
  if (simNowMs !== null) return simVisibleQsos;
  if (_wsLiveQsos !== null) return _wsLiveQsos;
  return currentQsos;
}

/** simNowMs が変わったとき simVisibleQsos を更新（二分探索） */
function _refreshSimQsos() {
  if (simNowMs === null) { simVisibleQsos = []; return; }
  let lo = 0, hi = currentQsos.length;
  while (lo < hi) {
    const mid = (lo + hi) >> 1;
    const q = currentQsos[mid];
    const t = q._liveTime !== undefined ? q._liveTime : q.time.getTime();
    if (t <= simNowMs) lo = mid + 1; else hi = mid;
  }
  simVisibleQsos = currentQsos.slice(0, lo);
}

/** スライダーUIと時刻ラベルを現在のsimNowMsに合わせて更新 */
function _simUpdateUI() {
  const slider = document.getElementById('sim-slider');
  const label  = document.getElementById('sim-time-label');
  const btn    = document.getElementById('sim-play-btn');
  if (!slider || simNowMs === null) return;
  slider.value = simNowMs;
  const d  = new Date(simNowMs);
  const hh = String(d.getUTCHours()).padStart(2,'0');
  const mm = String(d.getUTCMinutes()).padStart(2,'0');
  const ss = String(d.getUTCSeconds()).padStart(2,'0');
  if (label) label.textContent = hh + ':' + mm + ':' + ss + ' UTC';
  if (btn)   btn.textContent   = simPlaying ? '⏸' : '▶';
}

function _simStop() {
  simPlaying = false;
  const btn = document.getElementById('sim-play-btn');
  if (btn) btn.textContent = '▶';
}

/** ADIF/Cabrillo 読み込み後にシムモードを初期化してスライダーを表示 */
function initSimMode(qsos) {
  if (!qsos.length) return;
  // 表示範囲フィルタ適用後のQSOリストで最初/最後を取得
  let visQsos = qsos;
  if (contestRangeStartMs !== null || contestRangeEndMs !== null) {
    visQsos = qsos.filter(q => {
      const t = q.time.getTime();
      if (contestRangeStartMs !== null && t < contestRangeStartMs) return false;
      if (contestRangeEndMs   !== null && t > contestRangeEndMs)   return false;
      return true;
    });
    if (!visQsos.length) visQsos = qsos;
  }
  const firstLive = _qTime(visQsos[0]);
  const lastLive  = _qTime(visQsos[visQsos.length - 1]);
  // 範囲指定あり: 開始=range開始, 終了=range終了-1秒
  simLogStart = contestRangeStartMs !== null ? contestRangeStartMs : firstLive;
  simLogEnd   = contestRangeEndMs   !== null ? contestRangeEndMs - 1000 : lastLive;
  simNowMs    = simLogEnd;
  simPlaying  = false;

  // 「実時間」ボタンが選択中なら速度をログ長に合わせて更新
  const activeSpeedBtn = document.querySelector('.sim-speed-btn.active');
  if (activeSpeedBtn && activeSpeedBtn.dataset.wall === 'rt') {
    simWallDurationMs = simLogEnd - simLogStart;
  }

  _refreshSimQsos();

  const slider   = document.getElementById('sim-slider');
  const endLabel = document.getElementById('sim-end-label');
  if (slider) { slider.min = simLogStart; slider.max = simLogEnd; }
  if (endLabel) {
    const d = new Date(simLogEnd);
    endLabel.textContent = String(d.getUTCHours()).padStart(2,'0') + ':' +
                           String(d.getUTCMinutes()).padStart(2,'0') + ' UTC';
  }
  _simUpdateUI();
  document.getElementById('sim-bar').style.display = 'flex';
}

/** WebSocket接続時など、シムモードを解除してスライダーを非表示に */
function stopSimMode() {
  simNowMs   = null;
  simPlaying = false;
  simVisibleQsos = [];
  document.getElementById('sim-bar').style.display = 'none';
}

// ------- シムスライダー/再生ボタン/速度ボタン イベント（DOM完成後に直接登録） -------
{
  const slider  = document.getElementById('sim-slider');
  const playBtn = document.getElementById('sim-play-btn');

  // スライダー操作中は再生停止
  slider.addEventListener('mousedown',  () => { if (simPlaying) _simStop(); });
  slider.addEventListener('touchstart', () => { if (simPlaying) _simStop(); }, { passive: true });

  slider.addEventListener('input', () => {
    simNowMs = parseInt(slider.value);
    _refreshSimQsos();
    _simUpdateUI();
    _liveLastDataUpdate = 0;  // 次のtickで即チャート更新
  });

  // 再生/停止ボタン: クリック時は必ず simPlaying を false に
  playBtn.addEventListener('click', () => {
    if (simNowMs === null) return;
    if (simPlaying) {
      _simStop();
      return;
    }
    // 末尾なら先頭から再生
    if (simNowMs >= simLogEnd - 1000) simNowMs = simLogStart;
    simPlayStartWall = Date.now();
    simPlayStartSim  = simNowMs;
    simPlaying = true;
    playBtn.textContent = '⏸';
    _refreshSimQsos();
    _liveLastDataUpdate = 0;
  });

  // 速度ボタン
  document.querySelectorAll('.sim-speed-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sim-speed-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const wall = btn.dataset.wall;
      simWallDurationMs = wall === 'rt' ? (simLogEnd - simLogStart) : parseInt(wall);
      // 再生中なら現在位置からリセット（速度変更を即時反映）
      if (simPlaying) {
        simPlayStartWall = Date.now();
        simPlayStartSim  = simNowMs;
      }
    });
  });
}
// ------- シミュレーションモード ここまで -------

function wsScheduleRender() {
  if (wsRenderTimer) clearTimeout(wsRenderTimer);
  wsRenderTimer = setTimeout(() => {
    wsRenderTimer = null;
    if (!wsLiveMode) return;  // 削除/切断後に遅延発火してもスキップ
    // 静的参照ログがある場合: 静的ログをプライマリ、ライブデータをペイン用キャッシュに
    const _wsRef = _refLog();
    if (_wsRef && !_wsRef.isLive) {
      currentQsos = _getLogQsos(_wsRef);
      _wsLiveQsos = wsQsos.slice();
    } else {
      currentQsos = wsQsos.slice();
      _wsLiveQsos = null;
    }
    console.log('[wsScheduleRender] renderCharts qsos=' + currentQsos.length);
    renderCharts(currentQsos);
    // renderCharts がラベルを上書きするので SkookumNet 用に戻す
    if (wsLiveMode) {
      document.getElementById('format-label').textContent = 'SkookumNet';
      _updateContestTitle();
      // cumulChart が作成された後にライブチャートを確実に生成
      if (_livePanes.length === 0 && activeViews.has('live3h')) applyView();
      // 3hペインを即時更新（RAFの1秒待機を回避）
      updateLiveCharts();
    }
  }, 200);
}

function wsSetStatus(state, text) {
  wsDot.className = 'ws-dot' + (state ? ' ' + state : '');

  wsStatusText.style.color = state === 'connected' ? 'var(--accent)'

function _wsClearReconnectTimer() {
  if (_wsAutoReconnectTimer) { clearTimeout(_wsAutoReconnectTimer); _wsAutoReconnectTimer = null; }
}

function _wsOpenSocket(url) {
  wsSocket = new WebSocket(url);
  wsSocket.onopen = () => {
    wsSetStatus('connecting', i18n('wsWaiting'));
  };
  wsSocket.onclose = () => {
    const wasLive = wsLiveMode;
    wsLiveMode = false;
    wsSocket = null;
    if (wasLive && _wsConnectUrl) {
      // ライブセッション中の予期しない切断 → 自動再接続
      wsSetStatus('connecting', i18n('wsReconnecting'));
      _wsAutoReconnectTimer = setTimeout(_wsDoReconnect, 5000);
    } else {
      wsSetStatus('', i18n('wsDisconnected'));
    }
  };
  wsSocket.onerror = () => {
    wsSetStatus('error', i18n('wsError'));
  };
  wsSocket.onmessage = e => wsHandleMessage(JSON.parse(e.data));
}

function _wsDoReconnect() {
  _wsAutoReconnectTimer = null;
  if (!_wsConnectUrl) return;
  wsSetStatus('connecting', i18n('wsConnecting'));
  _wsOpenSocket(_wsConnectUrl);
}

function wsConnect() {
  const url = document.getElementById('ws-url').value.trim();
  if (!url) return;
  _wsConnectUrl = url;
  _wsClearReconnectTimer();
  // ファイルから読み込んだデータを破棄してから接続
  currentQsos = [];
  wsQsos = [];
  wsSetStatus('connecting', i18n('wsConnecting'));
  _wsOpenSocket(url);
}

function wsDisconnect() {
  _wsClearReconnectTimer();
  _wsConnectUrl = null;  // 自動再接続を無効化
  if (wsSocket) wsSocket.close();
  wsLiveMode = false;
  wsQsos = [];
  _wsLiveQsos = null;
  _wsStations.clear();
  wsSetStatus('', '—');
}

function wsHandleMessage(msg) {
  switch (msg.type) {
    case 'connected':
    case 'startup':
      wsLiveMode = true;
      stopSimMode();
      _resetContestRange();
      wsQsos = [];
      currentQsos = [];
      // SkookumNet接続時: ライブエントリのみ_logStoreから削除（ファイルログは保持）
      _logStore = _logStore.filter(l => !l.isLive);
      if (_logStore.length === 0) _multiLogMode = false;
      wsContestName = (msg.contest && msg.contest.toUpperCase() !== 'NONE') ? msg.contest : 'Real Time Analysis';
      contestName = '';
      contestYear = '';
      callsign = '';
      isAdif = true;
      wsSetStatus('connected', 'SkookumNet');
      wsUpdateCount();
      document.getElementById('format-label').textContent = 'SkookumNet';
      _updateContestTitle();
      activeViews.add('full');
      activeViews.add('live3h');
      _startLiveAnimation();
      applyView();
      // SkookumNet接続通知を5秒間表示
      break;
    case 'addQSO': {
      console.log('[addQSO] total=' + (wsQsos.length + 1) + ' call=' + (msg.qso && msg.qso.sent && msg.qso.sent.call));
      wsLiveMode = true;
      if (!callsign && msg.qso && msg.qso.sent && msg.qso.sent.call) callsign = msg.qso.sent.call;
      const _wsNewQso = wsQsoFromMsg(msg.qso);
      // stationName追跡（複数局対応）
      if (_wsNewQso.station && !_wsStations.has(_wsNewQso.station)) {
        _wsStations.set(_wsNewQso.station, { color: _WS_ST_COLORS[_wsStations.size % _WS_ST_COLORS.length] });
        if (_wsStations.size > 1) _updatePaneLogBtns();
      }
      wsQsos.push(_wsNewQso);
      wsQsos.sort((a, b) => a.time - b.time);
      currentQsos = wsQsos.slice();
      // _logStore にライブエントリがなければ作成(ファイルログがある場合も追加として登録)
      let _wsLiveEntry = _logStore.find(l => l.isLive && !l.isGroup);
      if (!_wsLiveEntry) {
        _addLogEntry(wsQsos, 'SkookumNet', { isLive: true, _isAdif: true });
        _wsLiveEntry = _logStore.find(l => l.isLive && !l.isGroup);
        _renderLogPanel();
      } else {
        // ライブエントリのqsos を wsQsos に同期
        _wsLiveEntry.qsos = wsQsos.slice();
      }
      // 全QSOが日曜のみかで判定し、contestStartMsを毎回再計算
      if (_wsLiveEntry && wsQsos.length > 0) {
        const _allSunday = wsQsos.every(q => q.time.getUTCDay() === 0);
        const _guessed = _guessContestStartMs(wsContestName || contestName, wsQsos[0].time.getTime(), _allSunday);
        if (_guessed !== null) _wsLiveEntry.contestStartMs = _guessed;
      }
      // TODO Phase2: station フィールドで複数エントリに自動分割
      wsUpdateCount();
      wsScheduleRender();
      break;
    }
    case 'updateQSO':
      wsReplaceQso(msg.qso);
      break;
    case 'deleteQSO':
      wsRemoveQso(msg.qso);
      break;
    case 'clearQSOs':
      wsQsos = [];
      currentQsos = [];
      _wsLiveQsos = null;
      _wsStations.clear();
      // ライブエントリのQSOをクリア
      _logStore.filter(l => l.isLive).forEach(l => { l.qsos = []; });
      wsUpdateCount();
      if (cumulChart) { cumulChart.destroy(); cumulChart = null; }
      if (bandChart)  { bandChart.destroy();  bandChart  = null; }
      document.getElementById('empty-msg').style.display = '';
      _renderLogPanel();
      break;
    case 'shutdown':
      wsLiveMode = false;
      if (_liveRafId) { cancelAnimationFrame(_liveRafId); _liveRafId = null; }
      if (!activeViews.has('full')) activeViews.add('full');
      applyView();
      wsSetStatus('connected', i18n('wsSessionEnd'));
      wsLiveBadge.classList.remove('visible');
      break;
  }
}

function wsQsoFromMsg(q) {
  return {
    time:    new Date(q.timeMs),
    band:    q.band,
    mode:    q.mode,
    freq:    q.freqKhz,
    _wsId:   q.id      || null,
    _call:   (q.received && q.received.call) || '',
    station: q.station || '',  // SkookumNet stationName (PC識別)
    _liveTime: q.timeMs,       // ms精度（ライブ用）
  };
}

function wsMatchIdx(q) {
  const callKey = (q.received && q.received.call) || '';
  return wsQsos.findIndex(x =>
    (x._wsId && q.id && x._wsId === q.id) ||
    (!x._wsId && x.time.getTime() === q.timeMs && x._call === callKey)
  );
}

function wsReplaceQso(q) {
  const i = wsMatchIdx(q);
  if (i === -1) return;
  wsQsos[i] = wsQsoFromMsg(q);
  wsQsos.sort((a, b) => a.time - b.time);
  currentQsos = wsQsos.slice();
  wsUpdateCount();
  wsScheduleRender();
}

function wsRemoveQso(q) {
  const i = wsMatchIdx(q);
  if (i === -1) return;
  wsQsos.splice(i, 1);
  currentQsos = wsQsos.slice();
  wsUpdateCount();
  wsScheduleRender();
}

// === 3h ローリングウィンドウチャート（バックアップアーキテクチャ移植） ===
// scroll モード = 固定ボタン: グラフが左にスクロール、赤線は画面上固定
