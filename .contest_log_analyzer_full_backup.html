</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f10;
  --bg2: #1a1a1c;
  --bg3: #232326;
  --border: rgba(255,255,255,0.1);
  --border2: rgba(255,255,255,0.18);
  --text: #e8e8e6;
  --text2: #8a8a88;
  --text3: #555553;
  --blue: #378ADD;
  --blue-dim: rgba(55,138,221,0.12);
  --accent: #5DCAA5;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 13px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  padding: 10px 20px;
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
  background: var(--bg);
}

.header-left {
  display: flex;
  align-items: baseline;
  gap: 10px;
}

.app-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.app-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.85);
}
@media (prefers-color-scheme: light) {
  .app-sub { color: rgba(0,0,0,0.7); }
  .stat-label { color: rgba(0,0,0,0.65); }
}

.header-right {
  display: flex;
  gap: 8px;
  align-items: center;
}

.btn {
  font-family: inherit;
  font-size: 11px;
  padding: 5px 12px;
  border: 0.5px solid var(--border2);
  border-radius: 5px;
  background: var(--bg3);
  color: var(--text2);
  cursor: pointer;
  transition: background 0.1s, color 0.1s, border-color 0.1s;
}
.btn:hover { background: var(--bg2); color: var(--text); border-color: var(--border2); }
.btn.active { background: var(--bg2); color: var(--text); border-color: rgba(255,255,255,0.3); }
.trend-toggle { opacity: 0.35; }
.trend-toggle.active { opacity: 1; }

.stats-bar {
  display: flex;
  gap: 1px;
  background: var(--border);
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
}

.stat-cell {
  flex: 1;
  padding: 8px 16px;
  background: var(--bg);
}

.stat-label {
  font-size: 10px;
  color: rgba(255,255,255,0.75);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 2px;
}

.stat-value {
  font-size: 18px;
  font-weight: 500;
  color: var(--text);
}

.stat-value.highlight { color: var(--accent); }

.controls {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 8px 20px;
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.ctrl-group {
  display: flex;
  align-items: center;
  gap: 6px;
}

.ctrl-label {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.charts-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 12px 20px;
  gap: 10px;
  overflow: hidden;
  min-height: 0;
}

.chart-wrap {
  position: relative;
  flex: 1;
  min-height: 0;
}

.chart-wrap.rate-wrap {
  flex: 1;
}

.chart-label {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.drop-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15,15,16,0.85);
  z-index: 100;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--blue);
  border: 2px dashed var(--blue);
}

.drop-overlay.visible { display: flex; }

.empty-msg {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 8px;
  color: var(--text3);
}

.empty-msg .big { font-size: 15px; color: var(--text2); }

.band-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  padding: 4px 0;
  font-size: 10px;
  color: var(--text2);
}

.band-dot {
  width: 8px; height: 8px;
  border-radius: 2px;
  display: inline-block;
  margin-right: 3px;
  vertical-align: middle;
}

/* === SkookumNet WebSocket Bridge UI === */
.ws-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--text3);
  flex-shrink: 0;
  transition: background 0.3s;
}
.ws-dot.connected { background: var(--accent); box-shadow: 0 0 5px var(--accent); }
.ws-dot.connecting { background: #D85A30; animation: ws-blink 0.7s infinite; }
.ws-dot.error { background: #E24B4A; }
@keyframes ws-blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
.ws-live-badge {
  display: none;
  font-size: 9px;
  color: var(--accent);
  border: 0.5px solid var(--accent);
  border-radius: 3px;
  padding: 1px 4px;
  letter-spacing: 0.07em;
  animation: ws-blink 1.6s infinite;
}
.ws-live-badge.visible { display: inline; }
.ws-panel {
  display: none;
  position: fixed;
  top: 44px; right: 16px;
  z-index: 300;
  background: var(--bg2);
  border: 0.5px solid var(--border2);
  border-radius: 8px;
  padding: 14px 16px;
  min-width: 270px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.65);
}
.ws-panel.open { display: block; }
.ws-panel-title {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.09em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.ws-url-row {
  display: flex;
  gap: 6px;
  align-items: center;
  margin-bottom: 10px;
}
.ws-url-input {
  flex: 1;
  font-family: inherit;
  font-size: 11px;
  padding: 5px 8px;
  border: 0.5px solid var(--border2);
  border-radius: 4px;
  background: var(--bg3);
  color: var(--text);
  outline: none;
}
.ws-url-input:focus { border-color: var(--accent); }
.ws-status-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
}
.ws-qso-count { color: var(--accent); font-weight: 500; }

/* === Contest range inputs === */
.range-input {
  font-family: inherit;
  font-size: 11px;
  padding: 4px 6px;
  border: 0.5px solid var(--border2);
  border-radius: 4px;
  background: var(--bg3);
  color: var(--text);
  outline: none;
  color-scheme: dark;
}
.range-input:focus { border-color: var(--accent); }
.range-input::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="app-sub" id="format-label">Cabrillo / ADIF</span>
  </div>
  <div style="position:absolute;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px;">
    <span class="app-title" id="contest-title">Contest Log Analyzer</span>
  </div>
  <div class="header-right">
    <button class="btn" id="ws-toggle-btn" style="display:flex;align-items:center;gap:6px;padding:5px 10px;">
      <span class="ws-dot" id="ws-dot"></span>
      <span>SkookumNet</span>
      <span class="ws-live-badge" id="ws-live-badge">LIVE</span>
    </button>
    <button class="btn" id="lang-btn" style="font-size:13px; padding:4px 8px;">🇺🇸</button>
    <label class="btn" style="cursor:pointer;">
      <span data-i18n="openFile">ファイルを開く</span>
      <input type="file" id="file-input" accept=".log,.cbr,.txt,.cabrillo,.adi,.adif" style="display:none;">
    </label>
    <button class="btn" id="sample-btn" data-i18n="sampleBtn">サンプルで試す</button>
  </div>
</header>

<div class="ws-panel" id="ws-panel">
  <div class="ws-panel-title">SkookumNet Live</div>

<script>

// グリッドロケーター -> 緯度経度
function gridToLatLon(grid) {
  if (!grid || grid.length < 4) return null;
  const g = grid.toUpperCase();
  const lon = (g.charCodeAt(0) - 65) * 20 - 180 + (parseInt(g[2]) * 2);
  const lat = (g.charCodeAt(1) - 65) * 10 - 90  + (parseInt(g[3]) * 1);
  // 6文字あればさらに精度向上
  const lonOff = grid.length >= 6 ? (g.charCodeAt(4) - 65) * 2 / 24 : 1.0;
  const latOff = grid.length >= 6 ? (g.charCodeAt(5) - 65) * 1 / 24 : 0.5;
  return { lat: lat + latOff, lon: lon + lonOff };
}

// 日の出・日没をUTC msで返す (NOAA式簡易計算)
// 戻り値: { sunrise: ms or null, sunset: ms or null }
function calcSunriseSunset(dateMs, lat, lon) {
  const D2R = Math.PI / 180;
  const date = new Date(dateMs);
  const year  = date.getUTCFullYear();
  const month = date.getUTCMonth() + 1;
  const day   = date.getUTCDate();

  // ユリウス通日(整数) - NOAA式はJDNを正午基準の整数で使う
  const A   = Math.floor((14 - month) / 12);
  const Y   = year + 4800 - A;
  const M   = month + 12 * A - 3;
  const JDN = day + Math.floor((153 * M + 2) / 5) + 365 * Y +
              Math.floor(Y / 4) - Math.floor(Y / 100) + Math.floor(Y / 400) - 32045;

  // J2000.0からの整数日
  const n = JDN - 2451545;

  const Jstar   = n - lon / 360.0;
  const M_sun   = ((357.5291 + 0.98560028 * Jstar) % 360 + 360) % 360;
  const C       = 1.9148 * Math.sin(M_sun * D2R)
                + 0.0200 * Math.sin(2 * M_sun * D2R)
                + 0.0003 * Math.sin(3 * M_sun * D2R);
  const lam     = (M_sun + C + 180 + 102.9372) % 360;
  const Jtransit = 2451545.0 + Jstar
                 + 0.0053 * Math.sin(M_sun * D2R)
                 - 0.0069 * Math.sin(2 * lam * D2R);

  const sinDec = Math.sin(lam * D2R) * Math.sin(23.4397 * D2R);
  const cosDec = Math.cos(Math.asin(sinDec));
  const cosH   = (Math.sin(-0.833 * D2R) - Math.sin(lat * D2R) * sinDec)
               / (Math.cos(lat * D2R) * cosDec);

  if (cosH < -1) return { sunrise: null, sunset: null }; // 極昼
  if (cosH >  1) return { sunrise: null, sunset: null }; // 極夜

  const H     = Math.acos(cosH) * (180 / Math.PI);
  const Jrise = Jtransit - H / 360.0;
  const Jset  = Jtransit + H / 360.0;

  const jdToMs = jd => (jd - 2440587.5) * 86400000;
  return { sunrise: jdToMs(Jrise), sunset: jdToMs(Jset) };
}

// コンテスト期間中の全日付の日の出・日没リストを生成
function buildSunEvents(qsos, lat, lon) {
  if (!qsos.length) return [];
  const startDay = Math.floor(qsos[0].time.getTime() / 86400000) * 86400000;
  const endDay   = Math.floor(qsos[qsos.length-1].time.getTime() / 86400000) * 86400000;
  const events = [];
  for (let d = startDay; d <= endDay + 86400000; d += 86400000) {
    const { sunrise, sunset } = calcSunriseSunset(d, lat, lon);
    if (sunrise) events.push({ ms: sunrise, type: 'rise' });
    if (sunset)  events.push({ ms: sunset,  type: 'set'  });
  }
  events.sort((a, b) => a.ms - b.ms);
  return events;
}

// 日照背景プラグイン
const daylightPlugin = {
  id: 'daylight',
  beforeDraw(chart) {
    try {
    if (!sunEvents || !sunEvents.length) return;
    const { ctx, chartArea, scales } = chart;
    if (!chartArea || !scales || !scales.x) return;
    const { left, right, top, bottom } = chartArea;
    const x = scales.x;

    const xMin = x.min;
    const xMax = x.max;
    const width = right - left;
    const height = bottom - top;

    // 全時間帯を夜として塗った後、昼を上書き
    ctx.save();
    ctx.rect(left, top, width, height);
    ctx.clip();

    // まず全体を夜色で塗る
    ctx.fillStyle = 'rgba(10, 20, 60, 0.45)';
    ctx.fillRect(left, top, width, height);

    // イベントリストから昼間帯を特定して描画
    // sunEventsは rise/set が交互に並ぶ想定
    let prevMs = xMin;
    let prevType = null;

    // xMin時点が昼か夜かを判定
    // 直前のイベントがriseなら昼、setまたはなければ夜
    let inDay = false;
    for (let i = 0; i < sunEvents.length; i++) {
      if (sunEvents[i].ms <= xMin) {
        inDay = (sunEvents[i].type === 'rise');
      }
    }

    let segStart = xMin;

    const allPts = [
      ...sunEvents.filter(e => e.ms > xMin && e.ms < xMax),
      { ms: xMax, type: 'end' }
    ];

    for (const ev of allPts) {
      const segEnd = Math.min(ev.ms, xMax);
      const px1 = left + (segStart - xMin) / (xMax - xMin) * width;
      const px2 = left + (segEnd   - xMin) / (xMax - xMin) * width;

      if (inDay) {
        // 昼間帯: 夜色の上から昼色で上書き
        ctx.fillStyle = 'rgba(255, 200, 80, 0.10)';
        ctx.fillRect(px1, top, px2 - px1, height);
      }

      // 薄明帯グラデーション (日の出・日没前後30分)
      if (ev.type === 'rise' || ev.type === 'set') {
        const twilightMs = 30 * 60000;
        const t1 = Math.max(xMin, ev.ms - twilightMs);
        const t2 = Math.min(xMax, ev.ms + twilightMs);
        const gx1 = left + (t1 - xMin) / (xMax - xMin) * width;
        const gx2 = left + (t2 - xMin) / (xMax - xMin) * width;
        if (gx2 > gx1) {
          const grad = ctx.createLinearGradient(gx1, 0, gx2, 0);
          if (ev.type === 'rise') {
            // 夜明け: 夜(暗) -> オレンジ -> 昼
            grad.addColorStop(0,   'rgba(0,0,0,0)');
            grad.addColorStop(0.5, 'rgba(220,100,20,0.35)');
            grad.addColorStop(1,   'rgba(0,0,0,0)');
          } else {
            // 夕暮れ: 昼 -> オレンジ -> 夜(暗)
            grad.addColorStop(0,   'rgba(0,0,0,0)');
            grad.addColorStop(0.5, 'rgba(200,80,20,0.35)');
            grad.addColorStop(1,   'rgba(0,0,0,0)');
          }
          ctx.fillStyle = grad;
          ctx.fillRect(gx1, top, gx2 - gx1, height);
        }
      }

      segStart = ev.ms;
      if (ev.type === 'rise') inDay = true;
      if (ev.type === 'set')  inDay = false;
    }

    ctx.restore();
    } catch(e) { console.warn('daylightPlugin error:', e.message); }
  }
};

// ドラッグ選択ズームプラグイン（横方向のみ）
// 両グラフに適用し、ズーム範囲を同期する
let dragZoomState = { active: false, startX: null, startMs: null };

// ツールチップをマウスカーソル位置に表示するカスタムpositioner
Chart.Tooltip.positioners.cursor = function(elements, eventPosition) {

    x: eventPosition.x,

};

const dragZoomPlugin = {
  id: 'dragZoom',
  afterInit(chart) {
    const canvas = chart.canvas;

    canvas.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const ca = chart.chartArea;
      if (!ca || x < ca.left || x > ca.right) return;
      if (y > ca.bottom) return;  // 目盛りエリアはパン担当
      // startMsをdrawXMin/drawXMaxから計算（ライブチャートの視覚位置に合わせる）
      let startMs;
      if (chart._isLiveChart && chart._drawXMin !== undefined) {
        startMs = chart._drawXMin + (x - ca.left) / (ca.right - ca.left) * (chart._drawXMax - chart._drawXMin);
      } else {
        startMs = chart.scales.x.getValueForPixel(x);
      }
      dragZoomState = { active: true, chart, startX: x, startMs };
      canvas.style.cursor = 'col-resize';
      e.preventDefault();
    });

    canvas.addEventListener('mousemove', e => {
      if (!dragZoomState.active || dragZoomState.chart !== chart) return;
      chart._dragX = e.clientX - canvas.getBoundingClientRect().left;
      if (!chart._isLiveChart) chart.draw();
    });

    canvas.addEventListener('mouseup', e => {
      if (!dragZoomState.active || dragZoomState.chart !== chart) return;
      canvas.style.cursor = '';
      const rect = canvas.getBoundingClientRect();
      const ca = chart.chartArea;
      const endX = e.clientX - rect.left;
      // endMsもdrawXMin/drawXMaxから計算
      let endMs;
      if (chart._isLiveChart && chart._drawXMin !== undefined && ca) {
        endMs = chart._drawXMin + (endX - ca.left) / (ca.right - ca.left) * (chart._drawXMax - chart._drawXMin);
      } else {
        endMs = chart.scales.x.getValueForPixel(endX);
      }
      const rawMs1 = Math.min(dragZoomState.startMs, endMs);
      const rawMs2 = Math.max(dragZoomState.startMs, endMs);
      chart._dragX = null;
      dragZoomState = { active: false };

      // ライブチャート: 60秒以上の範囲ならzoom
      if (chart._isLiveChart) {
        if (rawMs2 - rawMs1 >= 60000) {
          _setLiveZoom(chart._liveKey, { min: rawMs1, max: rawMs2 });
        }
        chart.draw();
        return;
      }

      // 非ライブチャート: 既存のズーム処理
      const ms1 = Math.max(rawMs1, globalStartMs);
      const ms2 = Math.min(rawMs2, globalEndMs);
      if (Math.abs(ms2 - ms1) < 60000) { chart.draw(); return; }
      applyZoom(ms1, ms2);
    });

    canvas.addEventListener('mouseleave', () => {
      if (dragZoomState.active && dragZoomState.chart === chart) {
        chart._dragX = null;
        dragZoomState = { active: false };
        canvas.style.cursor = '';
        chart.draw();
      }
    });
  },

  afterDraw(chart) {
    if (!chart._dragX || !dragZoomState.active || dragZoomState.chart !== chart) return;
    const { ctx, chartArea: { top, bottom } } = chart;
    const x1 = dragZoomState.startX;
    const x2 = chart._dragX;
    ctx.save();
    ctx.fillStyle = 'rgba(55,138,221,0.15)';
    ctx.fillRect(Math.min(x1,x2), top, Math.abs(x2-x1), bottom-top);
    ctx.strokeStyle = 'rgba(55,138,221,0.6)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x1, top); ctx.lineTo(x1, bottom);
    ctx.moveTo(x2, top); ctx.lineTo(x2, bottom);
    ctx.stroke();
    ctx.restore();
  }
};
Chart.register(dragZoomPlugin);

let sharedCrosshairMs = null; // 両グラフ共有の時刻(ms)

const crosshairPlugin = {
  id: 'crosshair',
  afterDraw(chart) {
    try {
      if (sharedCrosshairMs === null) return;
      const { ctx, chartArea, scales } = chart;
      if (!chartArea || !scales.x) return;
      const { top, bottom, left, right } = chartArea;
      const x = left + (sharedCrosshairMs - scales.x.min) / (scales.x.max - scales.x.min) * (right - left);
      if (x < left || x > right) return;
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(x, top);
      ctx.lineTo(x, bottom);
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 3]);
      ctx.stroke();
      ctx.restore();
      // cumulChartの場合、最近傍の積算ポイントをハイライト
      if (typeof cumulChart !== 'undefined' && chart === cumulChart) {
        const cd = chart.data.datasets[0] ? chart.data.datasets[0].data : null;
        if (cd && cd.length && chart.scales.y) {
          let lo = 0, hi = cd.length - 1, best = 0;
          while (lo <= hi) { const mid = (lo + hi) >> 1; if (cd[mid].x <= sharedCrosshairMs) { best = mid; lo = mid + 1; } else hi = mid - 1; }
          const pt = cd[best];
          const px = left + (pt.x - scales.x.min) / (scales.x.max - scales.x.min) * (right - left);
          const py = chart.scales.y.getPixelForValue(pt.y);
          if (px >= left && px <= right && py >= top && py <= bottom) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(px, py, 5, 0, Math.PI * 2);
            ctx.strokeStyle = '#E24B4A';
            ctx.lineWidth = 2;
            ctx.setLineDash([]);
            ctx.stroke();
            ctx.fillStyle = 'rgba(226,75,74,0.25)';
            ctx.fill();
            ctx.restore();
          }
        }
      }
    } catch(e) {}
  },
  afterEvent(chart, args) {
    const e = args.event;
    if (e.type === 'mousemove') {
      if (chart.scales && chart.scales.x) {
        sharedCrosshairMs = chart.scales.x.getValueForPixel(e.x);
      }
      // 両グラフを再描画
      if (cumulChart && cumulChart !== chart) cumulChart.draw();
      if (rateChart && rateChart !== chart) rateChart.draw();
      chart.draw();
    } else if (e.type === 'mouseout') {
      sharedCrosshairMs = null;
      if (cumulChart && cumulChart !== chart) cumulChart.draw();
      if (rateChart && rateChart !== chart) rateChart.draw();
      chart.draw();
    }
  }
};
Chart.register(crosshairPlugin);

// バンド名を波長(m)に変換してソート順を決める
function bandToMeters(b) {
  const n = parseFloat(b);
  if (!isNaN(n)) return n; // 160, 80, 40... → そのまま
  // cm表記 (70cm, 23cm...)
  const cm = b.match(/^(\d+(?:\.\d+)?)cm$/);
  if (cm) return parseFloat(cm[1]) / 100;
  return 0;
}

// バンド表示名: 430MHz以上はcm表記
function bandLabel(b) {
  const cm = b.match(/^(\d+(?:\.\d+)?)cm$/);
  if (cm) return b; // すでにcm表記
  const n = parseFloat(b);
  if (isNaN(n)) return b;
  if (n < 1) return Math.round(n * 100) + 'cm'; // 0.7 → 70cm
  return b + 'm';
}

  if (khz >= 24890 && khz <= 24990) return '12';

}

function parseCabrillo(text) {
  const qsos = [];
  callsign = '';
  isAdif = false;
  const lines = text.split('\n');
  for (const line of lines) {
    const t = line.trim();
    if (t.startsWith('CALLSIGN:')) {
      callsign = t.replace('CALLSIGN:', '').trim();
    }
    if (t.startsWith('CONTEST:')) {
      contestName = t.replace('CONTEST:', '').trim();
    }
    if (t.startsWith('GRID-LOCATOR:')) {
      gridLocator = t.replace('GRID-LOCATOR:', '').trim().toUpperCase();
    }
    if (!t.startsWith('QSO:')) continue;
    const parts = t.split(/\s+/);
    if (parts.length < 5) continue;
    const freqKhz = parseInt(parts[1]);
    const mode = parts[2];
    const dateStr = parts[3];
    const timeStr = parts[4].padStart(4, '0');
    const band = freqToBand(freqKhz);
    const hh = parseInt(timeStr.slice(0, 2));
    const mm = parseInt(timeStr.slice(2, 4));
    let dateObj;
    if (dateStr.includes('-')) {
      const [y, mo, d] = dateStr.split('-').map(Number);
      dateObj = new Date(Date.UTC(y, mo - 1, d, hh, mm, 0));
    } else {
      dateObj = new Date(Date.UTC(2000, 0, 1, hh, mm, 0));
    }
    qsos.push({ time: dateObj, band, mode, freq: freqKhz });
  }
  qsos.sort((a, b) => a.time - b.time);
  return qsos;
}

function parseAdif(text) {
  const qsos = [];
  callsign = '';
  isAdif = true;

  // フィールド抽出ヘルパー: <FIELD:len>value または <FIELD:len:type>value
  function getField(record, name) {
    const re = new RegExp('<' + name + ':\\d+(?::[^>]*)?>([^<]*)', 'i');
    const m = record.match(re);
    return m ? m[1].trim() : null;
  }

  // ADIF: ヘッダー(<EOH>まで)をスキップしてQSOレコードを処理
  const body = text.includes('<EOH>') || text.includes('<eoh>')
    ? text.replace(/[\s\S]*?<eoh>/i, '')
    : text;

  // <EOR>でレコード分割
  const records = body.split(/<eor>/i);
  for (const rec of records) {
    if (!rec.trim()) continue;

    const dateStr = getField(rec, 'QSO_DATE');
    const timeStr = getField(rec, 'TIME_ON');
    const bandStr = getField(rec, 'BAND');
    const freqStr = getField(rec, 'FREQ');
    const contestStr = getField(rec, 'CONTEST_ID');
    const mode    = getField(rec, 'MODE') || '';
    const station = getField(rec, 'STATION_CALLSIGN') || getField(rec, 'OPERATOR') || '';

    if (!dateStr || !timeStr) continue;
    if (!callsign && station) callsign = station;
    if (!contestName && contestStr) contestName = contestStr;

    // DATE: YYYYMMDD, TIME_ON: HHMMSS or HHMM
    const y  = parseInt(dateStr.slice(0, 4));
    const mo = parseInt(dateStr.slice(4, 6));
    const d  = parseInt(dateStr.slice(6, 8));
    const hh = parseInt(timeStr.slice(0, 2));
    const mm = parseInt(timeStr.slice(2, 4));
    const ss = timeStr.length >= 6 ? parseInt(timeStr.slice(4, 6)) : 0;

    const dateObj = new Date(Date.UTC(y, mo - 1, d, hh, mm, ss));

    // バンド文字列を正規化: "15M"->"15", "20m"->"20", "1.8M"->"160"等
    // ADIFのBANDフィールドは "10M","15M","20M"等、整数メートル帯をそのまま使用
    let band = 'other';
    if (bandStr) {
      const bm = bandStr.trim().match(/^(\d+(?:\.\d+)?)\s*m$/i);
      if (bm) {
        const val = parseFloat(bm[1]);
        if (val >= 6) {
          band = String(Math.round(val)); // 6m, 10m, 15m... → そのまま
        } else if (val >= 0.5 && val < 6) {
          // 0.7m=70cm, 0.23m=23cm, 0.13m=13cm等 → cm表記に変換
          band = Math.round(val * 100) + 'cm';
        } else if (val < 0.5 && val >= 0.01) {
          band = Math.round(val * 100) + 'cm';
        } else if (val < 2.5) band = '160';
        else if (val < 4.5) band = '80';
        else if (val < 5.5) band = '60';
      }
    }

    const freqMhz = freqStr ? parseFloat(freqStr) : 0;
    qsos.push({ time: dateObj, band, mode, freq: freqMhz });
  }

  // グリッドロケーターを取得(最初のQSOから)
  if (!gridLocator) {
    const firstRec = records.find(r => r.trim());
    if (firstRec) {
      const gl = getField(firstRec, 'MY_GRIDSQUARE');
      if (gl) gridLocator = gl.toUpperCase().slice(0, 6);
    }
  }

  qsos.sort((a, b) => a.time - b.time);
  return qsos;
}

function detectAndParse(text) {
  gridLocator = '';
  sunEvents = null;
  // ログ解析後にフォールバックするため先に手動入力値を更新
  manualGridLocator = (document.getElementById('grid-input')?.value || '').trim().toUpperCase();
  contestName = '';
  contestYear = '';
  // ADIFの判別: <EOH>/<EOR>タグが存在するか、または.adi/.adif拡張子
  if (/<eoh>/i.test(text) || /<eor>/i.test(text)) {
    isAdif = true;
    return parseAdif(text);
  } else {
    isAdif = false;
    return parseCabrillo(text);
  }
}

function buildTimeline(qsos, intervalMins) {
  if (!qsos.length) return { labels: [], cumul: [], rates: [], bandData: {}, allBands: [] };
  const start = new Date(Math.floor(qsos[0].time.getTime() / (intervalMins * 60000)) * intervalMins * 60000);
  const end = qsos[qsos.length - 1].time;
  const slots = [];
  for (let t = new Date(start); t <= end; t = new Date(t.getTime() + intervalMins * 60000)) {
    slots.push(new Date(t));
  }
  const labels = slots.map(t => {
    const hh = String(t.getUTCHours()).padStart(2, '0');
    const mm = String(t.getUTCMinutes()).padStart(2, '0');
    return `${hh}:${mm}`;
  });
  const slotMs = slots.map(t => t.getTime());
  const allBands = [...new Set(qsos.map(q => q.band))];
  const bandCounts = {};
  allBands.forEach(b => { bandCounts[b] = new Array(slots.length).fill(0); });
  const rates = new Array(slots.length).fill(0);
  qsos.forEach(q => {
    const idx = Math.min(Math.floor((q.time - start) / (intervalMins * 60000)), slots.length - 1);
    rates[idx]++;
    if (bandCounts[q.band]) bandCounts[q.band][idx]++;
  });
  const cumul = [];
  let sum = 0;
  rates.forEach(r => { sum += r; cumul.push(sum); });
  return { labels, cumul, rates, bandData: bandCounts, allBands, slotMs };
}

function updateStats(qsos, rates, intervalMins) {
  document.getElementById('stat-total').textContent = qsos.length.toLocaleString();
  const peakPerSlot = Math.max(...rates);
  const peakPerHour = Math.round(peakPerSlot * (60 / intervalMins));
  document.getElementById('stat-peak').textContent = `${peakPerHour} q/h`;
  const dur = (qsos[qsos.length - 1].time - qsos[0].time) / 3600000;
  document.getElementById('stat-hours').textContent = dur.toFixed(1) + 'h';
  document.getElementById('stat-avg').textContent = `${Math.round(qsos.length / Math.max(dur, 0.01))} q/h`;
  document.getElementById('stat-call').textContent = callsign || '—';
  document.getElementById('stats-bar').style.display = 'flex';
}

function updateLegend(allBands) {
  const leg = document.getElementById('band-legend');
  // 波長の大きい順（周波数の低い順）にソート
  const sorted = [...allBands].sort((a, b) => bandToMeters(b) - bandToMeters(a));
  leg.innerHTML = sorted.map(b => `
    <span>
      <span class="band-dot" style="background:${BAND_COLORS[b] || BAND_COLORS.other}"></span>${bandLabel(b)}
    </span>`).join('');
}

function fmtUtc(ms) {
  const d = new Date(ms);
  const hh = String(d.getUTCHours()).padStart(2, '0');
  const mm = String(d.getUTCMinutes()).padStart(2, '0');
  const ss = String(d.getUTCSeconds()).padStart(2, '0');
  return `${hh}:${mm}:${ss}`;
}


// ---- Run/S&P 判定 ----
// 戻り値: qsos配列と同じ長さの状態配列 'run'|'sp'|'unknown'
function calcRateData(qsos, windowMins, offTimeSegs) {
  if (!qsos.length) return [];
  const windowMs = windowMins * 60000;
  const _offSegs = offTimeSegs && offTimeSegs.length ? offTimeSegs : null;

  // rate(x) = count(過去t分間のQSO数) / t * 60  [QSO/h]
  // 各QSOの時刻xを基準に過去windowMs内のQSO数を二分探索で取得

  // Off Timeスキップ時: 各QSOの調整済み時刻を事前計算
  // Off Time区間(duration D)を「1分の間隔」に圧縮: shift += max(D - 60000, 0)
  // これによりOff Time前後のQSO間の実効時間差が1分となり、ウィンドウ計算が自然に機能する
  let adjTimes = null;
  if (_offSegs) {
    const sortedSegs = _offSegs.slice().sort((a, b) => a.startMs - b.startMs);
    adjTimes = new Array(qsos.length);
    let shift = 0;
    let si = 0;
    for (let i = 0; i < qsos.length; i++) {
      const t = qsos[i].time.getTime();
      while (si < sortedSegs.length && sortedSegs[si].endMs <= t) {
        shift += Math.max(sortedSegs[si].endMs - sortedSegs[si].startMs - 60000, 0);
        si++;
      }
      adjTimes[i] = t - shift;
    }
  }

  function getAdj(i) {
    return adjTimes ? adjTimes[i] : qsos[i].time.getTime();
  }

  function lowerBoundAdj(targetMs, hi) {
    let lo = 0;
    while (lo < hi) {
      const mid = (lo + hi) >> 1;
      if (getAdj(mid) < targetMs) lo = mid + 1;
      else hi = mid;
    }
    return lo;
  }

  const result = [];
  let prevMinKey = -1;
  let prevXMs    = null;
  let prevAdjMs  = null;
  let afterGap   = false; // 空白区間直後フラグ

  for (let i = 0; i < qsos.length; i++) {
    const xMs   = qsos[i].time.getTime();
    const adjMs = getAdj(i);

    // Cabrillo: 同一分(原時刻)は最後のQSOのみ代表点とする
    if (!isAdif) {
      const minKey = Math.floor(xMs / 60000) * 60000;
      if (minKey === prevMinKey) {
        prevMinKey = minKey;
        continue;
      }
      prevMinKey = minKey;
    }

    // 調整済み時刻でギャップ判定
    // Off Timeは圧縮済みのため adjGap はOff Timeを含まない実活動ギャップ
    if (prevAdjMs !== null) {
      const adjGap = adjMs - prevAdjMs;
      if (adjGap > windowMs) {
        result.push({ x: prevXMs + 1,                           y: 0 });
        result.push({ x: Math.max(prevXMs + 2, xMs - windowMs), y: 0 });
        afterGap = true;
      }
    }
    prevXMs   = xMs;
    prevAdjMs = adjMs;

    // 調整済み時刻でウィンドウ内QSO数を取得
    const windowStart   = lowerBoundAdj(adjMs - windowMs, i + 1);
    const countInWindow = (i + 1) - windowStart;

    let ratePerHour;
    if (isAdif && countInWindow > 0) {
      // ADIFは秒精度: ウィンドウ内の最古QSOから現在まで（調整済み時刻）の実時間で割る
      // ただし以下の場合は固定windowMsで割る（異常値防止）:
      // 1. count=1（前後関係が不明）
      // 2. ウィンドウ内に空白区間（windowMs以上のギャップ）がある
      const oldestAdj = getAdj(windowStart);
      const spanMs    = adjMs - oldestAdj; // ウィンドウ内の調整済み時間幅
      // ウィンドウ内で最大のQSO間ギャップを検出（調整済み時刻）
      let maxGapMs = 0;
      for (let j = windowStart; j < i; j++) {
        const gap = getAdj(j + 1) - getAdj(j);
        if (gap > maxGapMs) maxGapMs = gap;
      }
      // ウィンドウ開始直前のギャップも確認
      // （直前に大きな切れ目がある場合はウィンドウ内QSOが一端に偏り spanMs が小さくなるため）
      if (windowStart > 0) {
        const gapBeforeWindow = oldestAdj - getAdj(windowStart - 1);
        if (gapBeforeWindow > maxGapMs) maxGapMs = gapBeforeWindow;
      }
      // 空白区間（windowMs以上のギャップ）がウィンドウ内に含まれる場合はwindowMsで割る
      const hasGapInWindow = maxGapMs >= windowMs;
      // spanMsがwindowMsの10%未満（QSOが短時間に集中）でもwindowMsで割る
      const isConcentrated = spanMs < windowMs * 0.1 && countInWindow >= 2;
      // count=1のときは時間幅が不明なので固定windowMsで割る
      const baseWindowMs = (countInWindow === 1 || hasGapInWindow || isConcentrated)
        ? windowMs
        : Math.max(spanMs, 1000);
      ratePerHour = countInWindow / baseWindowMs * 3600000;
    } else {
      // Cabrillo: 調整済みウィンドウ幅 = windowMs（圧縮後なのでOff Time除外済み）
      ratePerHour = Math.round(countInWindow / windowMs * 3600000);
    }

    // 空白区間の直後の1点のみ表示を0に（フラグはすぐリセット）
    const displayY = afterGap ? 0 : ratePerHour;
    afterGap = false;
    result.push({ x: xMs, y: displayY });
  }
  // Off Timeスキップ時: 区間内を視覚的に0にする境界点を挿入
  // seg.startMsは直前QSO時刻なので+1msで即0落ち、seg.endMs-1で直前まで0を維持
  if (_offSegs) {
    for (const seg of _offSegs) {
      result.push({ x: seg.startMs + 1, y: 0 });
      result.push({ x: seg.endMs   - 1, y: 0 });
    }
  }
  // x値が時系列順になっていることを保証
  result.sort((a, b) => a.x - b.x);
  return result;
}

// === Rate Trend 計算関数 (EMA / LOESS / ACCEL) ===
// x は Unixタイムスタンプ(ms)、y は QSO/h

let showEMA   = true;
let showLOESS = true;
let showACCEL = true;

function computeEMA(points, windowMins) {
  if (!points.length) return [];
  const alpha = 2 / (windowMins + 1);
  const result = [{ x: points[0].x, y: points[0].y }];
  for (let i = 1; i < points.length; i++)
    result.push({ x: points[i].x, y: alpha * points[i].y + (1 - alpha) * result[i - 1].y });
  return result;
}

function computeLOESS(rawPts, bwFraction) {
  if (rawPts.length < 2) return rawPts.slice();
  const step    = Math.max(1, Math.floor(rawPts.length / 500));
  const sampled = rawPts.filter((_, i) => i % step === 0);
  const xRange  = rawPts[rawPts.length - 1].x - rawPts[0].x;
  if (xRange <= 0) return sampled.map(p => ({ x: p.x, y: p.y }));
  const bw = bwFraction * xRange;
  return sampled.map(pt => {
    let sw = 0, swx = 0, swy = 0, swxx = 0, swxy = 0;
    for (const p of rawPts) {
      if (p.x > pt.x) break;   // 因果的: 未来参照なし
      const d = pt.x - p.x;
      if (d > bw) continue;
      const u = d / bw;
      const w = Math.pow(1 - u * u * u, 3);
      sw += w; swx += w * p.x; swy += w * p.y; swxx += w * p.x * p.x; swxy += w * p.x * p.y;
    }
    if (sw < 1e-10) return { x: pt.x, y: pt.y };
    const det = sw * swxx - swx * swx;
    if (Math.abs(det) < 1e-10) return { x: pt.x, y: Math.max(0, swy / sw) };
    const b0 = (swxx * swy - swx * swxy) / det;
    const b1 = (sw * swxy - swx * swy) / det;
    return { x: pt.x, y: Math.max(0, b0 + b1 * pt.x) };
  });
}

function _smoothN(pts, n) {
  return pts.map((p, i) => {
    let s = 0, c = 0;
    for (let j = Math.max(0, i - n * 2); j <= i; j++) { s += pts[j].y; c++; }
    return { x: p.x, y: s / c };
  });
}

function computeAccel(emaPts) {
  if (emaPts.length < 2) return [];
  const raw = [];
  for (let i = 1; i < emaPts.length; i++) {
    const dx = emaPts[i].x - emaPts[i - 1].x;
    const dy = emaPts[i].y - emaPts[i - 1].y;
    // dx は ms単位 → /ms*60000 で QSO/h の変化率(/min換算)
    raw.push({ x: emaPts[i].x, y: dx > 0 ? dy / dx * 60000 : 0 });
  }
  return _smoothN(raw, 12);
}

// RAWレートからEMA/LOESS/ACCELを計算して返す
function _computeTrendSeries(rawRate, windowMins) {
  const ema   = showEMA || showACCEL ? computeEMA(rawRate, windowMins) : [];
  const loess = showLOESS ? computeLOESS(rawRate, 0.07) : [];
  const accel = showACCEL ? computeAccel(ema) : [];
  return { ema: showEMA ? ema : [], loess, accel };
}

function classifyRunSP(qsos) {
  const FREQ_THRESH = 0.5; // kHz
  const result = new Array(qsos.length).fill('unknown');

  // バンドごとに系列を分離
  const bandMap = new Map();
  qsos.forEach((q, i) => {
    if (!bandMap.has(q.band)) bandMap.set(q.band, []);
    bandMap.get(q.band).push(i);
  });

  bandMap.forEach(indices => {
    const n = indices.length;
    if (n === 0) return;
    if (n === 1) { result[indices[0]] = 'run'; return; }

    // 各隣接ペアの周波数差 (MHz単位なのでkHz変換)
    const diff = [];
    for (let i = 0; i < n - 1; i++) {
      const qi = qsos[indices[i]];
      const qj = qsos[indices[i + 1]];
      const fi = qi.freq || 0;
      const fj = qj.freq || 0;
      const fiKhz = fi > 1000 ? fi : fi * 1000;
      const fjKhz = fj > 1000 ? fj : fj * 1000;
      diff.push(Math.abs(fjKhz - fiKhz));
    }
    // large[i] = diff[i] >= FREQ_THRESH
    const large = diff.map(d => d >= FREQ_THRESH);

    // 時間的に離れた隣接QSO間（30分以上）はS&P伝播の境界とする
    const GAP_MS = 30 * 60000;
    const isGap = [];
    for (let i = 0; i < n - 1; i++) {
      const dt = qsos[indices[i + 1]].time.getTime() - qsos[indices[i]].time.getTime();
      isGap.push(dt >= GAP_MS);
    }

    const stateArr = new Array(n).fill('?');

    // S&P確定: 連続2回Large（Gapをまたがない）
    for (let i = 1; i < n - 1; i++) {
      if (large[i - 1] && large[i] && !isGap[i - 1] && !isGap[i]) {
        stateArr[i] = 'sp';
      }
    }

    // 確定S&PからLargeを前後に伝播（Gapを超えない）
    for (let i = n - 1; i >= 1; i--) {
      if (stateArr[i] === 'sp' && large[i - 1] && !isGap[i - 1]) stateArr[i - 1] = 'sp';
    }
    for (let i = 0; i < n - 1; i++) {
      if (stateArr[i] === 'sp' && large[i] && !isGap[i]) stateArr[i + 1] = 'sp';
    }

    // 残り'?'はRun
    for (let i = 0; i < n; i++) {
      if (stateArr[i] === '?') stateArr[i] = 'run';
    }

    // 結果をresultに書き戻し
    indices.forEach((qIdx, i) => { result[qIdx] = stateArr[i]; });
  });

  return result;
}

function isOffTimeContest() {
  const n = contestName.toLowerCase();
  return n.includes('wpx') || n.includes('worked all europe');
}

// SO2R状態推定 + 帯セグメント生成
// 戻り値: [{startMs, endMs, state}]
// state: 'rr'=両Run, 'rs'=Run+S&P, 'ss'=両S&P, 'r1'=単独Run, 's1'=単独S&P
function buildOpSegments(qsos, runSP) {
  if (!qsos.length) return [];

  const bandMap = new Map();
  qsos.forEach((q, i) => {
    if (!bandMap.has(q.band)) bandMap.set(q.band, []);
    bandMap.get(q.band).push(i);
  });

  // 各QSOについて「他バンドQSOを挟まない同一バンド連続区間の長さ(分)」を事前計算
  // qsosは時系列ソート済みを前提
  // 隣接するQSOが同一バンドかどうかで連続区間を判定
  const streakMins = new Array(qsos.length).fill(0);
  (() => {
    // 時系列上で連続する同一バンドのブロックを検出
    // 「ブロック」= 間に他バンドQSOが1つも挟まれない同一バンドの連続
    let blockStart = 0;
    for (let i = 0; i <= qsos.length; i++) {
      const isBreak = i === qsos.length || qsos[i].band !== qsos[blockStart].band;
      if (!isBreak) continue;
      // blockStart..i-1 が同一バンド連続ブロック
      const tStart = qsos[blockStart].time.getTime();
      const tEnd = qsos[i - 1].time.getTime();
      const dur = (tEnd - tStart) / 60000;
      for (let j = blockStart; j < i; j++) streakMins[j] = dur;
      blockStart = i;
    }
  })();

  // 時刻tiに他バンドがアクティブかどうか判定
  // アクティブ = 以下のいずれか:
  //   1. 他バンドの直前QSOと直後QSOが両方存在する（区間の中間）
  //   2. 直前QSOから10分以内（Runで次を待っている）
  //   3. 直後QSOが10分以内（系列の最初でまだ直前がない）
  // ただし自バンドが20分以上単独連続している場合はシングルリグとみなす
  // No QSOギャップ（10分以上）のリストを事前計算
  const NO_QSO_THRESH = 10 * 60000;
  const noQsoGapList = [];
  for (let i = 1; i < qsos.length; i++) {
    const gap = qsos[i].time.getTime() - qsos[i-1].time.getTime();
    if (gap >= NO_QSO_THRESH) {
      noQsoGapList.push({ start: qsos[i-1].time.getTime(), end: qsos[i].time.getTime() });
    }
  }

  function isOtherBandActive(i) {
    const ti = qsos[i].time.getTime();
    const myBand = qsos[i].band;

    // 自バンドが20分以上連続していればシングルリグ
    if (streakMins[i] >= 20) return false;

    // tiの前後にNo QSOギャップがあれば、そのギャップを挟んだ他バンドはアクティブでない
    const prevGap = noQsoGapList.find(g => g.end > ti - NO_QSO_THRESH && g.end <= ti);
    const nextGap = noQsoGapList.find(g => g.start >= ti && g.start < ti + NO_QSO_THRESH);

    for (const [band, indices] of bandMap) {
      if (band === myBand) continue;
      let prevT = -1, nextT = -1;
      for (const idx of indices) {
        const t = qsos[idx].time.getTime();
        if (t <= ti) prevT = t;
        else if (nextT === -1) { nextT = t; break; }
      }
      // ギャップをまたぐ他バンドQSOは除外
      if (prevT !== -1 && prevGap && prevT < prevGap.start) prevT = -1;
      if (nextT !== -1 && nextGap && nextT > nextGap.end) nextT = -1;

      if (prevT !== -1 && nextT !== -1) return true;
      if (prevT !== -1 && ti - prevT <= 600000) return true;
      if (nextT !== -1 && nextT - ti <= 600000) return true;
    }
    return false;
  }

  // 各QSOについて「同時アクティブな」他バンドのRun/SP状態を取得
  // アクティブでないバンド（例：既に終了した80m）は除外する
  function getOtherState(i) {
    const ti = qsos[i].time.getTime();
    const myBand = qsos[i].band;
    let otherRun = 0, otherSP = 0;
    for (const [band, indices] of bandMap) {
      if (band === myBand) continue;
      // このバンドがtiの時点でアクティブかチェック
      let prevT = -1, nextT = -1;
      let closestIdx = -1, closestDiff = Infinity;
      for (const idx of indices) {
        const t = qsos[idx].time.getTime();
        if (t <= ti) prevT = t;
        else if (nextT === -1) nextT = t;
        const diff = Math.abs(t - ti);
        if (diff < closestDiff) { closestDiff = diff; closestIdx = idx; }
      }
      // アクティブ判定: 前後両方ある、または10分以内に隣接QSO
      const active = (prevT !== -1 && nextT !== -1) ||
                     (prevT !== -1 && ti - prevT <= 600000) ||
                     (nextT !== -1 && nextT - ti <= 600000);
      if (!active) continue;
      if (closestIdx !== -1) {
        if (runSP[closestIdx] === 'run') otherRun++; else otherSP++;
      }
    }
    return otherRun >= otherSP ? 'run' : 'sp';
  }

  function getState(i) {
    const myRun = runSP[i] === 'run';
    if (!isOtherBandActive(i)) return myRun ? 'r1' : 's1';
    const otherRun = getOtherState(i) === 'run';
    if (myRun && otherRun)  return 'rr';
    if (myRun && !otherRun) return 'rs';
    if (!myRun && otherRun) return 'rs';
    return 'ss';
  }

  const stateArr = qsos.map((_, i) => getState(i));
  const segments = [];
  let segState = stateArr[0];
  let segStart = qsos[0].time.getTime();

  for (let i = 1; i < qsos.length; i++) {
    const st = stateArr[i];
    const ms = qsos[i].time.getTime();
    if (st !== segState) {
      segments.push({ startMs: segStart, endMs: ms, state: segState });
      segState = st;
      segStart = ms;
    }
  }
  segments.push({
    startMs: segStart,
    endMs: qsos[qsos.length - 1].time.getTime(),
    state: segState
  });

  // No QSO区間（10分以上のギャップ）をQSO時刻の生データから直接検出
  const NO_QSO_MS = 10 * 60000;
  const sortedTimes = qsos.map(q => q.time.getTime()).sort((a,b) => a-b);
  const noQsoSegs = [];
  const offTimeContest = isOffTimeContest();
  for (let i = 1; i < sortedTimes.length; i++) {
    const gap = sortedTimes[i] - sortedTimes[i-1];
    if (gap >= NO_QSO_MS) {
      // WPX/WAE: 両端を分単位に切り捨てた差が60分以上ならOff Time
      let state = 'noqso';
      if (offTimeContest) {
        const floorStart = Math.floor(sortedTimes[i-1] / 60000);
        const floorEnd   = Math.floor(sortedTimes[i]   / 60000);
        if (floorEnd - floorStart >= 60) state = 'offtime';
      }
      noQsoSegs.push({ startMs: sortedTimes[i-1], endMs: sortedTimes[i], state });
    }
  }

  // WPX/WAE: 表示範囲の境界でもOff Timeを検出（開始前・終了後）
  // Apply状態に関わらず入力フィールドの値を使用（autoFillRangeInputsが自動設定した値も含む）
  if (offTimeContest && sortedTimes.length) {
    const firstQsoMs = sortedTimes[0];
    const lastQsoMs  = sortedTimes[sortedTimes.length - 1];
    const inputStart = parseRangeInput(document.getElementById('contest-start')?.value || '');
    const inputEnd   = parseRangeInput(document.getElementById('contest-end')?.value || '');
    const dispStart  = inputStart !== null ? inputStart : firstQsoMs;
    const dispEnd    = inputEnd   !== null ? inputEnd   : lastQsoMs;
    if (Math.floor(firstQsoMs / 60000) - Math.floor(dispStart / 60000) >= 60) {
      noQsoSegs.push({ startMs: dispStart, endMs: firstQsoMs, state: 'offtime' });
    }
    if (Math.floor(dispEnd / 60000) - Math.floor(lastQsoMs / 60000) >= 60) {
      noQsoSegs.push({ startMs: lastQsoMs, endMs: dispEnd, state: 'offtime' });
    }
  }

  // セグメントとNo QSOをまとめてstartMsでソートして返す
  // No QSOと重複するセグメントはNo QSOを優先して除外
  const allSegs = [...segments, ...noQsoSegs];
  allSegs.sort((a,b) => a.startMs - b.startMs);

  // No QSOと重複するセグメントを除外（No QSOの区間に完全に含まれるセグメントを除く）
  const withNoQso = allSegs.filter(seg => {
    if (seg.state === 'noqso' || seg.state === 'offtime') return true;
    // このセグメントがNo QSOの区間と重複しないか確認
    return !noQsoSegs.some(g => seg.startMs >= g.startMs && seg.endMs <= g.endMs);
  });

  return withNoQso;
}

const OP_COLORS = {
  rr: '#1D9E75', // 2BSIQ: 緑
  rs: '#9B59B6', // SO2R(Run+S&P): 紫
  ss: '#E24B4A', // SO2R(S&P+S&P): 赤
  r1: '#F1C40F', // Run(1R): 黄
  s1: '#E67E22', // S&P(1R): オレンジ
  noqso: '#555553', // No QSO: グレー
  offtime: '#ffffff', // Off Time: 白
};
const OP_LABELS = {
  rr: '2BSIQ',
  rs: 'SO2R(Run+S&P)',
  ss: 'SO2R(S&P+S&P)',
  r1: 'Run(1R)',
  s1: 'S&P(1R)',
  noqso: 'No QSO',
  offtime: 'Off Time',
};

function renderOpLegend(segments) {
  const seen = new Set(segments.map(s => s.state));
  const ORDER = ['rr', 'rs', 'ss', 'r1', 's1', 'noqso', 'offtime'];

  // Off Time累計を計算 (HH:MM形式)
  const totalOffMs = segments.filter(s => s.state === 'offtime')
                              .reduce((a, s) => a + (s.endMs - s.startMs), 0);
  const offHH = Math.floor(totalOffMs / 3600000);
  const offMM = Math.floor((totalOffMs % 3600000) / 60000);
  const offTimeLabel = `Off Time (${String(offHH).padStart(2,'0')}:${String(offMM).padStart(2,'0')})`;

  const ids = ['op-legend', 'op-legend-10m', 'op-legend-1h', 'op-legend-3h'];
  ids.forEach(id => {
    const legend = document.getElementById(id);
    if (!legend) return;
    legend.innerHTML = '';
    ORDER.filter(st => seen.has(st)).forEach(st => {
      const el = document.createElement('span');
      el.style.cssText = 'display:flex;align-items:center;gap:4px;';
      const label = st === 'offtime' ? offTimeLabel : OP_LABELS[st];
      const borderStyle = st === 'offtime' ? 'border:1px solid #888;' : '';
      el.innerHTML = `<span style="width:10px;height:10px;border-radius:2px;background:${OP_COLORS[st]};display:inline-block;${borderStyle}"></span>${label}`;
      legend.appendChild(el);
    });
  });
}

// Chart.jsプラグイン: 帯をチャートエリア底部に描画（ズーム連動）

// グラフ内左上にラベルを描画するプラグイン
const chartLabelPlugin = {
  id: 'chartLabel',
  afterDraw(chart) {
    if (!chart.options._label) return;
    const { ctx, chartArea: { left, top } } = chart;
    ctx.save();
    ctx.font = '10px SF Mono, Fira Code, monospace';
    ctx.fillStyle = chart.options._labelColor || '#E24B4A';
    ctx.textAlign = 'left';
    ctx.fillText(chart.options._label, left + 6, top + 14);
    ctx.restore();
  }
};
Chart.register(chartLabelPlugin);

// シミュレーションモード: 全体グラフにシム時刻の赤破線を描画
const simLinePlugin = {
  id: 'simLine',
  afterDraw(chart) {
    if (typeof simNowMs === 'undefined' || simNowMs === null) return;
    if (chart._isLiveChart) return;  // ライブチャートはRAF側で描画
    const { ctx, chartArea, scales } = chart;
    if (!chartArea || !scales.x) return;
    if (simNowMs < scales.x.min || simNowMs > scales.x.max) return;
    const px = scales.x.getPixelForValue(simNowMs);
    ctx.save();
    ctx.strokeStyle = 'rgba(255,80,80,0.8)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 3]);
    ctx.beginPath();
    ctx.moveTo(px, chartArea.top);
    ctx.lineTo(px, chartArea.bottom);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
};
Chart.register(simLinePlugin);

const opStripPlugin = {
  id: 'opStrip',
  afterDraw(chart) {
    try {
      if (!opSegments || !opSegments.length) return;
      if (!chart.canvas || chart.canvas.id !== 'chart-cumul') return;
      const { ctx, chartArea, scales } = chart;
      if (!chartArea || !scales || !scales.x) return;
      const { left, right, bottom } = chartArea;
      const x = scales.x;
      const xMin = x.min;
      const xMax = x.max;
      if (!xMin || !xMax || xMax <= xMin) return;
      const stripH = 6;
      // chartAreaのbottom直下（目盛り文字の上）に帯を配置
      const y0 = bottom + 2;
      ctx.save();
      opSegments.forEach(seg => {
        if (seg.endMs < xMin || seg.startMs > xMax) return;
        const x1 = left + (Math.max(seg.startMs, xMin) - xMin) / (xMax - xMin) * (right - left);
        const x2 = left + (Math.min(seg.endMs,   xMax) - xMin) / (xMax - xMin) * (right - left);
        if (x2 <= x1) return;
        ctx.fillStyle = OP_COLORS[seg.state] || '#888';
        ctx.fillRect(x1, y0, x2 - x1, stripH);
      });
      ctx.restore();
    } catch(e) {}
  }
};
Chart.register(opStripPlugin);


function renderCharts(qsos) {
  const { labels, cumul, rates, bandData, allBands, slotMs } = buildTimeline(qsos, rateMins);
  document.getElementById('empty-msg').style.display = 'none';
  document.getElementById('format-label').textContent = isAdif ? 'ADIF' : 'Cabrillo v3';

  // コンテスト名と年をタイトルに反映
  if (qsos.length) {
    contestYear = String(qsos[0].time.getUTCFullYear());
  }
  const titleEl = document.getElementById('contest-title');
  if (titleEl) {
    const parts = [];
    if (contestName) parts.push(contestName);
    if (contestYear) parts.push(contestYear);
    titleEl.textContent = parts.length ? parts.join(' ') : i18n('noContest');
  }

  // 日照情報を計算（ログになければ手動入力値を使用）
  if (!gridLocator && manualGridLocator) gridLocator = manualGridLocator;
  const gridEl = document.getElementById('grid-input');
  if (gridEl && gridLocator && !gridEl.value) gridEl.value = gridLocator;
  const ll = gridToLatLon(gridLocator);
  if (ll && qsos.length) {
    sunEvents = buildSunEvents(qsos, ll.lat, ll.lon);
  } else {
    sunEvents = null;
  }
  // Run/S&P判定と帯描画
  const runSP = classifyRunSP(qsos);
  opSegments = buildOpSegments(qsos, runSP);
  const firstMs = qsos[0].time.getTime();
  const lastMs  = qsos[qsos.length - 1].time.getTime();
  renderOpLegend(opSegments);
  _updateOffTimeToggle();

  updateStats(qsos, rates, rateMins);
  updateLegend(allBands);

  // ADIFは秒単位で実時刻をそのまま使用、Cabrilloは分内展開
  let scatterData, minuteGroups;
  if (isAdif) {
    scatterData = qsos.map((q, i) => ({ x: q.time.getTime(), y: i + 1 }));
    minuteGroups = new Map(); // tooltip用(空でよい)
    // ライブチャート用: 秒精度そのまま
    qsos.forEach(q => { q._liveTime = q.time.getTime(); });
  } else {
    minuteGroups = new Map();
    qsos.forEach((q, i) => {
      const minKey = Math.floor(q.time.getTime() / 60000) * 60000;
      if (!minuteGroups.has(minKey)) minuteGroups.set(minKey, []);
      minuteGroups.get(minKey).push(i);
    });
    const adjustedTimes = new Array(qsos.length);
    minuteGroups.forEach((indices, minMs) => {
      const n = indices.length;
      indices.forEach((qIdx, k) => {
        adjustedTimes[qIdx] = minMs + Math.round(60000 * (k + 1) / (n + 1));
      });
    });
    scatterData = qsos.map((q, i) => ({ x: adjustedTimes[i], y: i + 1 }));
    // ライブチャート用: k/n 均等分割（0, 30; 0, 12, 24, 36, 48 ...）
    minuteGroups.forEach((indices, minMs) => {
      const n = indices.length;
      indices.forEach((qIdx, k) => {
        qsos[qIdx]._liveTime = minMs + Math.round(60000 * k / n);
      });
    });
  }
  const _offTimeSegs = skipOffTimeRate ? opSegments.filter(s => s.state === 'offtime') : [];
  const rateLineData = calcRateData(qsos, rateWindowSecs / 60, _offTimeSegs);
  const maxRate = Math.max(...rateLineData.map(d => d.y), 1);
  const _initTrend = _computeTrendSeries(rateLineData, rateWindowSecs / 60);
  const ptRadius = qsos.length > 5000 ? 1 : qsos.length > 1000 ? 1.5 : 2.5;

  const cCtx = document.getElementById('chart-cumul').getContext('2d');
  if (cumulChart) cumulChart.destroy();

  // 両グラフのx軸をスロット境界で統一
  const slotWidthMs = rateMins * 60000;
  currentSlotWidthMs = slotWidthMs;
  const startMs = slotMs[0];
  globalStartMs = startMs;
  const endMs = slotMs[slotMs.length - 1] + slotWidthMs; // 最後のスロット終端
  globalEndMs = endMs;
  const spanMs = endMs - startMs;
  const tickStepMs = spanMs <= 2 * 3600000 ? 15 * 60000
                   : spanMs <= 6 * 3600000 ? 30 * 60000
                   : spanMs <= 12 * 3600000 ? 60 * 60000
                   : 2 * 3600000;

  cumulChart = new Chart(cCtx, {
    type: 'scatter',
    data: {
      datasets: [
        {
          label: i18n('cumulDataset'),
          data: scatterData,
          backgroundColor: '#E24B4A',
          pointRadius: ptRadius,
          pointHoverRadius: ptRadius + 2,
          pointStyle: 'circle',
          yAxisID: 'y'
        },
        {
          label: i18n('rateDataset'),
          data: rateLineData,
          type: 'line',
          borderColor: 'rgba(79,195,247,0.3)',
          backgroundColor: 'transparent',
          borderWidth: 1.5,
          pointRadius: 0,
          pointHoverRadius: 3,
          tension: 0,
          spanGaps: false,
          normalized: true,
          parsing: false,
          yAxisID: 'yRate'
        },
        {
          label: 'EMA',
          data: _initTrend.ema,
          type: 'line',
          borderColor: '#00e5ff',
          backgroundColor: 'transparent',
          borderWidth: 2,
          pointRadius: 0,
          tension: 0,
          spanGaps: false,
          normalized: true,
          parsing: false,
          yAxisID: 'yRate'
        },
        {
          label: 'LOESS',
          data: _initTrend.loess,
          type: 'line',
          borderColor: '#69f0ae',
          backgroundColor: 'transparent',
          borderWidth: 2.5,
          pointRadius: 0,
          tension: 0,
          spanGaps: false,
          normalized: true,
          parsing: false,
          yAxisID: 'yRate'
        },
        {
          label: 'ACCEL',
          data: _initTrend.accel,
          type: 'line',
          borderColor: '#ff6b6b',
          backgroundColor: 'rgba(255,107,107,0.08)',
          fill: 'origin',
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0,
          spanGaps: false,
          normalized: true,
          parsing: false,
          yAxisID: 'yAccel'
        }
      ]
    },
    options: {
      _label: i18n('cumulLabel'),
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          mode: 'index',
          intersect: false,
          position: 'cursor',
          backgroundColor: '#1a1a1c',
          borderColor: 'rgba(255,255,255,0.15)',
          borderWidth: 0.5,
          titleColor: '#8a8a88',
          bodyColor: '#e8e8e6',
          displayColors: false,
          // rate/EMA/LOESS/ACCELデータセットはfilterで除外し、cumul callbackで両値をまとめて表示する
          // (Cabrillo: rateData.length < scatterData.lengthのためmode:'index'でrate itemが欠落する)
          filter: item => item.dataset.yAxisID === 'y',
          callbacks: {
            title: items => {
              if (!items.length) return '';
              const timeMs = sharedCrosshairMs !== null ? sharedCrosshairMs : items[0].parsed.x;
              const cd = items[0].chart.data.datasets[0].data;
              if (!cd || !cd.length) return '';
              let lo = 0, hi = cd.length - 1, best = 0;
              while (lo <= hi) { const mid = (lo + hi) >> 1; if (cd[mid].x <= timeMs) { best = mid; lo = mid + 1; } else hi = mid - 1; }
              const idx = cd[best].y - 1;
              const q = qsos[idx];
              if (!q) return '';
              if (isAdif) {
                const d = q.time;
                const hh = String(d.getUTCHours()).padStart(2,'0');
                const mm = String(d.getUTCMinutes()).padStart(2,'0');
                const ss = String(d.getUTCSeconds()).padStart(2,'0');
                return `${hh}:${mm}:${ss} UTC`;
              }
              const origMs = Math.floor(q.time.getTime() / 60000) * 60000;
              const grp = minuteGroups.get(origMs);
              const posInMin = grp ? grp.indexOf(idx) + 1 : 1;
              const total = grp ? grp.length : 1;
              const timeStr = fmtUtc(origMs) + ' UTC';
              return total > 1 ? `${timeStr} (${posInMin}/${total})` : timeStr;
            },
            label: ctx => {
              // filterによりrate itemは除外済み: ここはcumulデータセットのみ呼ばれる
              const timeMs = sharedCrosshairMs !== null ? sharedCrosshairMs : ctx.parsed.x;
              // 累積QSO数をバイナリサーチで取得
              const cd = ctx.chart.data.datasets[0].data;
              if (!cd || !cd.length) return i18n('cumulTooltip', 0);
              let lo = 0, hi = cd.length - 1, best = 0;
              while (lo <= hi) { const mid = (lo + hi) >> 1; if (cd[mid].x <= timeMs) { best = mid; lo = mid + 1; } else hi = mid - 1; }
              const cumulStr = i18n('cumulTooltip', cd[best].y);
              // レートをバイナリサーチで取得
              const rd = ctx.chart.data.datasets[1] ? ctx.chart.data.datasets[1].data : null;
              if (rd && rd.length) {
                let lo2 = 0, hi2 = rd.length - 1, best2 = 0;
                while (lo2 <= hi2) { const mid = (lo2 + hi2) >> 1; if (rd[mid].x <= timeMs) { best2 = mid; lo2 = mid + 1; } else hi2 = mid - 1; }
                return [cumulStr, i18n('rateTooltip', rd[best2].y.toFixed(1))];
              }
              return cumulStr;
            }
          }
        }
      },
      scales: {
        x: {
          type: 'linear',
          min: startMs,
          max: endMs,
          ticks: {
            stepSize: tickStepMs,
            font: { size: 10, family: 'SF Mono, Fira Code, monospace' },
            color: _isDark() ? 'rgba(255,255,255,0.65)' : 'rgba(0,0,0,0.65)',
            callback: v => { const d = new Date(v); return String(d.getUTCHours()).padStart(2,'0') + ':' + String(d.getUTCMinutes()).padStart(2,'0'); }
          },
          grid: { color: 'rgba(255,255,255,0.05)' },
          border: { color: 'rgba(255,255,255,0.1)' }
        },
        y: {
          min: 0,
          max: qsos.length,
          beginAtZero: true,
          grace: 0,
          afterFit(scale) { scale.width = 52; },
          afterBuildTicks(scale) {
            // ズーム時は表示範囲(min〜max)に合わせてキリ番tickを生成
            const minVal = scale.min || 0;
            const maxVal = scale.max;
            const range  = Math.max(maxVal - minVal, 1);
            const steps  = [1,2,5,10,20,25,50,100,200,250,500,1000,2000,2500,5000,10000];
            const step   = steps.find(s => range / s <= 6) || 10000;
            const firstTick = minVal === 0 ? 0 : Math.ceil(minVal / step) * step;
            const ticks = [];
            for (let v = firstTick; v <= maxVal; v += step) ticks.push({ value: v });
            // 非ズーム時(min=0)のみ最後にqsos.length合計を追加
            if (minVal === 0 && ticks.length && ticks[ticks.length - 1].value !== maxVal) {
              ticks.push({ value: maxVal });
            }
            if (!ticks.length) ticks.push({ value: maxVal });
            scale.ticks = ticks;
          },
          ticks: { font: { size: 10 }, color: '#E24B4A' },
          grid: { color: 'rgba(255,255,255,0.05)' },
          border: { color: 'rgba(255,255,255,0.1)' }
        },
        yRate: {
          position: 'right',
          min: 0,
          max: maxRate,
          beginAtZero: true,
          grace: 0,
          afterFit(scale) { scale.width = 52; },
          ticks: { font: { size: 10 }, color: '#5DCAA5', maxTicksLimit: 8 },
          grid: { drawOnChartArea: false },
          border: { color: 'rgba(93,202,165,0.3)' },
          title: { display: true, text: 'QSO/h', font: { size: 10 }, color: '#5DCAA5' }
        },
        yAccel: {
          position: 'right',
          min: null,
          max: null,
          beginAtZero: false,
          afterFit(scale) { scale.width = 52; },
          ticks: { font: { size: 9 }, color: '#ff6b6b', maxTicksLimit: 6 },
          grid: { drawOnChartArea: false },
          border: { color: 'rgba(255,107,107,0.3)' },
          title: { display: true, text: 'Δ/h', font: { size: 9 }, color: '#ff6b6b' }
        }
      }
    }
  });

  // バンド別積み上げデータを構築 (スロットごと)
  // 左軸: QSO数(生), 右軸: QSO/h
  const slotMaxQso = (() => {
    const totals = slotMs.map((_, si) =>
      allBands.reduce((s, b) => s + (bandData[b][si] || 0), 0)
    );
    return Math.max(...totals, 1);
  })();
  const slotMaxRate = (() => {
    const totals = slotMs.map((_, si) =>
      allBands.reduce((s, b) => s + Math.round((bandData[b][si] || 0) * (60 / rateMins)), 0)
    );
    return Math.max(...totals, 1);
  })();

  // 棒グラフ用データ: [{ms, stacks:[{band,val}]}]
  // バンドを波長の大きい順（160m最下部→10m→6m...上へ積み上げ）にソート
  const sortedBands = [...allBands].sort((a, b) => bandToMeters(b) - bandToMeters(a));
  rateSlots = slotMs.map((ms, si) => ({
    ms,
    stacks: sortedBands
      .map(b => ({
        band: b,
        qso: bandData[b][si] || 0,
        rate: Math.round((bandData[b][si] || 0) * (60 / rateMins))
      }))
      .filter(s => s.qso > 0)
  }));

  // カスタム棒描画プラグイン
  // 棒グラフのツールチップ
  const barTooltipEl = document.getElementById('bar-tooltip');
  const rateCanvas = document.getElementById('chart-rate');
  rateCanvas.addEventListener('mousemove', e => {
    if (!rateChart || !rateChart.scales || !rateChart.scales.x) return;
    const rect = rateCanvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const x = rateChart.scales.x;
    const ca = rateChart.chartArea;
    if (mouseX < ca.left || mouseX > ca.right) { barTooltipEl.style.display = 'none'; return; }
    const ms = x.getValueForPixel(mouseX);
    // 対応するスロットを探す
    const slot = rateSlots.find(s => ms >= s.ms && ms < s.ms + currentSlotWidthMs);
    if (!slot || !slot.stacks.length) { barTooltipEl.style.display = 'none'; return; }
    const timeStr = fmtUtc(slot.ms) + '〜' + fmtUtc(slot.ms + currentSlotWidthMs);
    const totalQso = slot.stacks.reduce((s, x) => s + x.qso, 0);
    const totalRate = slot.stacks.reduce((s, x) => s + x.rate, 0);
    // ツールチップは棒グラフと同じ順（波長大→小、160m上から）
    const rows = [...slot.stacks].reverse().map(({band, qso, rate}) =>
      `<span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${BAND_COLORS[band]||BAND_COLORS.other};margin-right:4px;"></span>${i18n('bandTooltip', bandLabel(band), qso, rate)}`
    ).join('<br>');
    barTooltipEl.innerHTML = `<div style="color:#8a8a88;margin-bottom:2px;">${timeStr} UTC</div>${rows}<div style="border-top:0.5px solid rgba(255,255,255,0.1);margin-top:4px;padding-top:4px;">${i18n('totalTooltip', totalQso, totalRate)}</div>`;
    barTooltipEl.style.display = 'block';
    barTooltipEl.style.left = (e.clientX + 12) + 'px';
    barTooltipEl.style.top = (e.clientY - 20) + 'px';
  });
  rateCanvas.addEventListener('mouseleave', () => {
    barTooltipEl.style.display = 'none';
  });

  const rateBarsPlugin = {
    id: 'rateBars',
    afterDraw(chart) {
      try {
        const { ctx, chartArea: { left, right, top, bottom }, scales: { x, y } } = chart;
        if (!x || !y) return;
        const xMin = x.min, xMax = x.max;
        const yMin = y.min, yMax = y.max;
        const W = right - left, H = bottom - top;
        const slotPx = W * slotWidthMs / (xMax - xMin);
        const barW = Math.max(1, slotPx - 2);
        ctx.save();
        ctx.beginPath();
        ctx.rect(left, top, W, H);
        ctx.clip();
        rateSlots.forEach(slot => {
          if (slot.ms + slotWidthMs < xMin || slot.ms >= xMax) return;
          const px = left + (slot.ms - xMin) / (xMax - xMin) * W;
          const pxEnd = left + (Math.min(slot.ms + slotWidthMs, xMax) - xMin) / (xMax - xMin) * W;
          let yBase = bottom;
          slot.stacks.forEach(({ band, qso }) => {
            const barH = qso / (yMax - yMin) * H;
            const color = BAND_COLORS[band] || BAND_COLORS.other;
            ctx.fillStyle = color + 'cc';
            ctx.fillRect(px, yBase - barH, Math.max(1, pxEnd - px - 1), barH);
            yBase -= barH;
          });
        });
        ctx.restore();
      } catch(e) {}
    }
  };

  const rCtx = document.getElementById('chart-rate').getContext('2d');
  if (rateChart) rateChart.destroy();
  rateChart = new Chart(rCtx, {
    type: 'scatter',
    data: { datasets: [] },
    plugins: [rateBarsPlugin],
    options: {
      _label: i18n('rateLabel'),
      _labelColor: '#ffffff',
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      layout: { padding: { top: 0, bottom: 0 } },
      plugins: {
        legend: { display: false },
        tooltip: { enabled: false }
      },
      scales: {
        x: {
          type: 'linear',
          min: startMs,
          max: endMs,
          ticks: {
            stepSize: tickStepMs,
            font: { size: 10, family: 'SF Mono, Fira Code, monospace' },
            color: _isDark() ? 'rgba(255,255,255,0.65)' : 'rgba(0,0,0,0.65)',
            callback: v => { const d = new Date(v); return String(d.getUTCHours()).padStart(2,'0') + ':' + String(d.getUTCMinutes()).padStart(2,'0'); }
          },
          grid: { display: false },
          border: { color: 'rgba(255,255,255,0.1)' }
        },
        y: {
          min: 0,
          max: slotMaxQso,
          beginAtZero: true,
          grace: 0,
          bounds: 'ticks',
          afterFit(scale) { scale.width = 52; scale.paddingBottom = 0; scale.paddingTop = 0; },
          ticks: { font: { size: 10 }, color: _isDark() ? 'rgba(255,255,255,0.65)' : 'rgba(0,0,0,0.65)', maxTicksLimit: 6 },
          grid: { color: 'rgba(255,255,255,0.05)' },
          border: { color: 'rgba(255,255,255,0.1)' },
          title: { display: true, text: 'QSO数', font: { size: 10 }, color: _isDark() ? 'rgba(255,255,255,0.65)' : 'rgba(0,0,0,0.65)' }
        },
        yRight: {
          position: 'right',
          display: true,
          min: 0,
          max: slotMaxRate,
          afterFit(scale) { scale.width = 52; },
          ticks: { font: { size: 10 }, color: '#888780', maxTicksLimit: 5,
            callback: v => v + '/h' },
          grid: { drawOnChartArea: false },
          border: { color: 'rgba(255,255,255,0.1)' },
          title: { display: true, text: 'QSO/h', font: { size: 10 }, color: '#888780' }
        }
      }
    }
  });

  applyView();
}

function applyZoom(xMin, xMax) {
  if (!cumulChart || !rateChart) return;

  // 累積グラフ: xMin-xMax内のQSOのy値(累積数)のmin/max
  const cumulData = cumulChart.data.datasets[0].data;
  let cumulMin = Infinity, cumulMax = 1;
  cumulData.forEach(pt => {
    if (pt.x >= xMin && pt.x <= xMax) {
      cumulMin = Math.min(cumulMin, pt.y);
      cumulMax = Math.max(cumulMax, pt.y);
    }
  });
  if (cumulMin === Infinity) cumulMin = 0;
  // 下側だけ少し余白を持たせる（上限は実データの最大値をそのまま使用）
  const cumulPad = Math.max(1, Math.round((cumulMax - cumulMin) * 0.05));
  const cumulYMin = Math.max(0, cumulMin - cumulPad);
  const cumulYMax = cumulMax;

  // レート: xMin-xMax内のレートデータのmax
  const rateData = cumulChart.data.datasets[1] ? cumulChart.data.datasets[1].data : [];
  let rateMax = 1;
  rateData.forEach(pt => {
    if (pt.x >= xMin && pt.x <= xMax) rateMax = Math.max(rateMax, pt.y);
  });

  // 棒グラフ: xMin-xMax内のスロットのmax
  let barMax = 1;
  if (typeof rateSlots !== 'undefined') {
    const slotW = currentSlotWidthMs;
    rateSlots.forEach(slot => {
      if (slot.ms + slotW >= xMin && slot.ms <= xMax) {
        const total = slot.stacks.reduce((s, x) => s + x.qso, 0);
        barMax = Math.max(barMax, total);
      }
    });
  }

  // 累積グラフのy軸更新
  cumulChart.options.scales.x.min = xMin;
  cumulChart.options.scales.x.max = xMax;
  cumulChart.options.scales.y.min = cumulYMin;
  cumulChart.options.scales.y.max = cumulYMax;
  cumulChart.options.scales.yRate.max = Math.max(rateMax, 1);

  // yAccel スケール更新
  const accelData = cumulChart.data.datasets[4] ? cumulChart.data.datasets[4].data : [];
  const accelValsZ = accelData.filter(p => p.x >= xMin && p.x <= xMax).map(p => p.y);
  if (accelValsZ.length > 0) {
    const absMaxZ = Math.max(...accelValsZ.map(Math.abs), 1);
    cumulChart.options.scales.yAccel.min = -absMaxZ;
    cumulChart.options.scales.yAccel.max =  absMaxZ;
  }

  cumulChart.update('none');

  // 棒グラフのy軸更新
  rateChart.options.scales.x.min = xMin;
  rateChart.options.scales.x.max = xMax;
  rateChart.options.scales.y.max = Math.max(barMax, 1);
  rateChart.update('none');
}

function applyView() {
  const show     = id => { const el = document.getElementById(id); if (el) { el.style.display = 'flex'; el.style.flex = '1'; } };
  const showBand = id => { const el = document.getElementById(id); if (el) { el.style.display = 'flex'; el.style.flex = '0.5'; } };
  const hide     = id => { const el = document.getElementById(id); if (el) el.style.display = 'none'; };

  // ライブ表示ボタン（10m/1h/3h）はライブモードまたはシムモード時に表示
  document.querySelectorAll('.view-btn[data-view^="live"], .view-btn[data-view="krate"], .view-btn[data-view="custom"]').forEach(b => {
    b.style.display = (wsLiveMode || simNowMs !== null) ? '' : 'none';
  });

  ['krate-section','custom-section','live10m-section','live10m-band-section','live1h-section','live1h-band-section',
   'live3h-section','live3h-band-section','cumul-section','rate-section'].forEach(hide);

  if (activeViews.has('krate')) {
    const ks = document.getElementById('krate-section');
    if (ks) { ks.style.display = 'flex'; ks.style.flex = '0.7'; }
  }
  if (activeViews.has('custom')) {
    const cs = document.getElementById('custom-section');
    if (cs) { cs.style.display = 'flex'; cs.style.flex = '0.7'; }
  }

  if (activeViews.has('live10m')) {
    show('live10m-section');
    if (showBandActivity) showBand('live10m-band-section');
  }
  if (activeViews.has('live1h')) {
    show('live1h-section');
    if (showBandActivity) showBand('live1h-band-section');
  }
  if (activeViews.has('live3h')) {
    show('live3h-section');
    if (showBandActivity) showBand('live3h-band-section');
  }
  if (activeViews.has('full')) {
    show('cumul-section');
    if (showBandActivity) showBand('rate-section');
  }

  document.querySelectorAll('.view-btn').forEach(b =>
    b.classList.toggle('active', activeViews.has(b.dataset.view)));
  const bt = document.getElementById('band-toggle-btn');
  if (bt) bt.classList.toggle('active', showBandActivity);

  // LAZY_LIVE_COMPUTE 有効時: 新たに表示されたチャートのデータを即時更新
  // （次のループ周期まで待たずに最新データを反映させる）
  if (LAZY_LIVE_COMPUTE) updateLiveCharts();

  requestAnimationFrame(() => {
    [cumulChart, rateChart, liveChart1h, liveChart3h, liveBandChart1h, liveBandChart3h]
      .forEach(c => c && c.resize());
  });
}

function loadText(text) {
  try {
    currentQsos = detectAndParse(text);
    if (currentQsos.length === 0) {
      alert('QSOデータが見つかりませんでした。CabrilloまたはADIF形式のファイルか確認してください。');
      return;
    }
    // 新しいログ読み込み時はコンテスト範囲指定を解除
    _resetContestRange();
    // ファイル読み込み時はWSライブモードを終了、シムモードを設定
    wsLiveMode = false;
    // シムモード初期化（applyView で live ボタンを表示させるため renderCharts 前に設定）
    simLogStart = currentQsos[0].time.getTime();
    simLogEnd   = currentQsos[currentQsos.length - 1].time.getTime();
    simNowMs    = simLogEnd;
    _refreshSimQsos();
    if (activeViews.size === 0 || (activeViews.size === 1 && !activeViews.has('full') &&
        !activeViews.has('live10m') && !activeViews.has('live1h') && !activeViews.has('live3h'))) {
      activeViews.add('full');
    }
    renderCharts(currentQsos);
    // ライブチャート初期化（未作成の場合のみ）
    if (!liveChart1h) initLiveCharts();
    _startLiveAnimation();
    // スライダーUI初期化
    initSimMode(currentQsos);
  } catch(e) {
    alert('描画エラー: ' + e.message + '\n' + e.stack.split('\n').slice(0,4).join('\n'));
  }
}

// チャートごとのモードトグルボタン
['10m', '1h', '3h'].forEach(key => {
  const btn = document.getElementById('live-mode-btn-' + key);
  if (!btn) return;
  btn.addEventListener('click', function() {
    const st = _liveState[key];
    const nowMs = getNowMs();
    if (st.mode === 'scroll') {
      // scroll→fixed: 赤線フラクションを保持
      if (st.customWin) {
        // customWin内の赤線位置をnowMsに合わせてcustomWinをシフト
        const cwWidth = st.customWin.max - st.customWin.min;
        const redLineFrac = (st.leftMs - st.panOffset) / st.winMs;
        const newMin = nowMs - redLineFrac * cwWidth;
        st.customWin = { min: newMin, max: newMin + cwWidth };
      } else {
        st.fixedRefNow = nowMs + st.panOffset;
      }
      st.mode = 'fixed';
      this.textContent = i18n('liveModeFixed');
      this.classList.add('active');
    } else {
      // fixed→scroll: 赤線フラクションをpanOffsetに変換
      if (st.customWin) {
        const cwWidth = st.customWin.max - st.customWin.min;
        const nowFrac = (nowMs - st.customWin.min) / cwWidth;
        st.panOffset = st.leftMs - nowFrac * st.winMs;
      } else {
        st.panOffset = st.fixedRefNow !== null ? (st.fixedRefNow - nowMs) : 0;
      }
      st.fixedRefNow = null;
      st.mode = 'scroll';
      this.textContent = i18n('liveModeScroll');
      this.classList.remove('active');
    }
  });
});

['10m', '1h', '3h'].forEach(key => {

});

// 目盛りエリアドラッグ: 両モードでパン
window.addEventListener('mousemove', e => {
  const dragging = [liveChart10m, liveBandChart10m, liveChart1h, liveBandChart1h, liveChart3h, liveBandChart3h]
    .find(c => c && c._isDragging);
  if (!dragging) return;
  const key = dragging._liveKey;
  const st = _liveState[key];
  const dx = e.clientX - dragging._dragStartX;
  dragging._dragStartX = e.clientX;
  const cw = dragging.chartArea ? dragging.chartArea.right - dragging.chartArea.left : 600;
  const nowMs = getNowMs();
  const curWinMs = st.customWin ? (st.customWin.max - st.customWin.min) : st.winMs;
  const dt = -dx * curWinMs / cw;
  if (st.customWin && st.mode === 'fixed') {
    // fixedモード+zoom: customWinをシフト
    st.customWin = { min: st.customWin.min + dt, max: st.customWin.max + dt };
  } else if (st.customWin && st.mode === 'scroll') {
    // scrollモード+zoom: panOffsetをwinMsスケールで更新（_liveWinはpanOffsetを使う）
    st.panOffset -= dx * st.winMs / cw;
  } else if (st.mode === 'fixed') {
    st.fixedRefNow = (st.fixedRefNow || nowMs) + dt;
  } else {
    st.panOffset += dt;
  }
  _clampLiveWin(key, nowMs);
});
window.addEventListener('mouseup', () => {
  [liveChart10m, liveBandChart10m, liveChart1h, liveBandChart1h, liveChart3h, liveBandChart3h]
    .forEach(c => { if (c) c._isDragging = false; });
});

// MM:SS フォーマット
function _fmtRateWin(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

// 全スライダーに値を反映してライブチャートを更新するヘルパー（秒単位）
function _setAllRateWindows(secs) {
  document.getElementById('rate-window-label').textContent = _fmtRateWin(secs);
  ['10m','1h','3h'].forEach(key => {
    const el = document.getElementById('rate-window-' + key);
    if (el) { el.value = secs; document.getElementById('rate-window-label-' + key).textContent = _fmtRateWin(secs); }
    _liveState[key].rateWindowSecs = secs;
  });
  const fullEl = document.getElementById('rate-window-full');
  if (fullEl) { fullEl.value = secs; document.getElementById('rate-window-label-full').textContent = _fmtRateWin(secs); }
  [liveChart10m, liveChart1h, liveChart3h].forEach(c => {
    if (c) { c._yMaxCache = undefined; c._yRateMaxCache = undefined; }
  });
  if (currentQsos.length) updateLiveCharts();
}

// 個別ライブチャートスライダー
['10m','1h','3h'].forEach(key => {
  const el = document.getElementById('rate-window-' + key);
  if (!el) return;
  el.addEventListener('input', () => {
    const secs = parseInt(el.value);
    _liveState[key].rateWindowSecs = secs;
    document.getElementById('rate-window-label-' + key).textContent = _fmtRateWin(secs);
    [liveChart10m, liveChart1h, liveChart3h].filter(c => c && c._liveKey === key)
      .forEach(c => { c._yMaxCache = undefined; c._yRateMaxCache = undefined; });
    if (currentQsos.length) updateLiveCharts();
  });
});

// レートラインデータセットだけをインプレース更新（ズーム状態を保持）
function _updateCumulRateOnly(windowMins) {
  if (!cumulChart || !currentQsos.length) return;
  const newRate = calcRateData(currentQsos, windowMins, skipOffTimeRate ? opSegments.filter(s => s.state === 'offtime') : []);
  cumulChart.data.datasets[1].data = newRate;

  // EMA / LOESS / ACCEL 更新
  const trend = _computeTrendSeries(newRate, windowMins);
  cumulChart.data.datasets[2].data = trend.ema;
  cumulChart.data.datasets[3].data = trend.loess;
  cumulChart.data.datasets[4].data = trend.accel;

  const xMin = cumulChart.scales.x.min;
  const xMax = cumulChart.scales.x.max;
  let rateMax = 1;
  newRate.forEach(pt => { if (pt.x >= xMin && pt.x <= xMax) rateMax = Math.max(rateMax, pt.y); });
  cumulChart.options.scales.yRate.max = Math.max(rateMax, 1);

  // yAccel スケール: 表示範囲内の正負対称スケール
  if (trend.accel.length > 0) {
    const accelVals = trend.accel.filter(p => p.x >= xMin && p.x <= xMax).map(p => p.y);
    if (accelVals.length > 0) {
      const absMax = Math.max(...accelVals.map(Math.abs), 1);
      cumulChart.options.scales.yAccel.min = -absMax;
      cumulChart.options.scales.yAccel.max =  absMax;
    }
  }

  cumulChart.update('none');
}

function parseRangeInput(val) {
  // "YYYY-MM-DD HH:MM" または "YYYY-MM-DDTHH:MM" を UTC として解釈
  if (!val || !val.trim()) return null;
  const s = val.trim().replace(' ', 'T');  // スペース区切りを T 区切りに統一
  const normalized = /T\d{2}:\d{2}:\d{2}$/.test(s) ? s + 'Z'
                   : /T\d{2}:\d{2}$/.test(s)        ? s + ':00Z'
                   : s + 'T00:00:00Z';
  const ms = new Date(normalized).getTime();
  return isNaN(ms) ? null : ms;
}

function applyContestRange() {
  if (contestRangeStartMs === null && contestRangeEndMs === null) return;
  const s = contestRangeStartMs !== null ? contestRangeStartMs : globalStartMs;
  const e = contestRangeEndMs   !== null ? contestRangeEndMs   : globalEndMs;
  if (isNaN(s) || isNaN(e) || s >= e) return;
  globalStartMs = s;
  globalEndMs   = e;
  // コンテスト範囲のスパンに合わせて目盛り間隔を再計算
  const span = e - s;
  const step = span <= 2 * 3600000  ? 15 * 60000
             : span <= 6 * 3600000  ? 30 * 60000
             : span <= 12 * 3600000 ? 60 * 60000
             : span <= 24 * 3600000 ? 2  * 3600000
             : span <= 48 * 3600000 ? 3  * 3600000
             :                        6  * 3600000;
  if (cumulChart) cumulChart.options.scales.x.ticks.stepSize = step;
  if (rateChart)  rateChart.options.scales.x.ticks.stepSize  = step;
  applyZoom(s, e);
}

function utcInputStr(ms) {
  const d = new Date(ms);
  const y  = d.getUTCFullYear();
  const mo = String(d.getUTCMonth() + 1).padStart(2, '0');
  const dy = String(d.getUTCDate()).padStart(2, '0');
  const hh = String(d.getUTCHours()).padStart(2, '0');
  const mm = String(d.getUTCMinutes()).padStart(2, '0');
  return `${y}-${mo}-${dy} ${hh}:${mm}`;
}

function autoFillRangeInputs(qsos) {
  if (!qsos.length) return;
  // 範囲が適用済みの場合は上書きしない（それ以外は新しいファイルの情報で常に更新）
  if (contestRangeStartMs !== null || contestRangeEndMs !== null) return;
  const startEl = document.getElementById('contest-start');
  const endEl   = document.getElementById('contest-end');
  // 最初のQSOの日の 00:00 UTC
  const dayStart = Math.floor(qsos[0].time.getTime() / 86400000) * 86400000;
  startEl.value = utcInputStr(dayStart);
  // 最後のQSOの翌日の 00:00 UTC
  const dayEnd = (Math.floor(qsos[qsos.length - 1].time.getTime() / 86400000) + 1) * 86400000;
  endEl.value = utcInputStr(dayEnd);
}

// renderCharts を上書き: 指定範囲でフィルタリングしてから描画
const _origRenderCharts = renderCharts;
renderCharts = function(qsos) {
  autoFillRangeInputs(qsos);
  let vis = qsos;
  if (contestRangeStartMs !== null || contestRangeEndMs !== null) {
    vis = qsos.filter(q => {
      const t = q.time.getTime();
      if (contestRangeStartMs !== null && t < contestRangeStartMs) return false;
      if (contestRangeEndMs   !== null && t > contestRangeEndMs)   return false;
      return true;
    });
    if (!vis.length) return;
  }
  _origRenderCharts(vis);
  if (contestRangeStartMs !== null || contestRangeEndMs !== null) {
    setTimeout(applyContestRange, 0);
  }
  // レンジ変更時にシムモードの時間範囲を更新（_liveTime が renderCharts 後に確定する）
  if (typeof currentQsos !== 'undefined' && currentQsos.length && typeof simNowMs !== 'undefined' && simNowMs !== null) {
    initSimMode(currentQsos);
  }
};
