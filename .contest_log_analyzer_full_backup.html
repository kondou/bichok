function _buildLiveBandData(qsos, startMs, endMs, bucketMs) {
  const alignedStart = Math.floor(startMs / bucketMs) * bucketMs;
  const slots = [];
  for (let t = alignedStart; t < endMs; t += bucketMs) slots.push(t);
  const count = slots.length;
  const bandCounts = {};
  for (const q of qsos) {
    const t = q.time.getTime();
    if (t < alignedStart || t >= endMs) continue;
    const idx = Math.floor((t - alignedStart) / bucketMs);
    if (idx < 0 || idx >= count) continue;
    const band = q.band || 'other';
    if (!bandCounts[band]) bandCounts[band] = new Array(count).fill(0);
    bandCounts[band][idx]++;
  }
  const bh = bucketMs / 3600000;
  const bandRates = {};
  let maxRate = 0;
  for (const [band, arr] of Object.entries(bandCounts)) {
    bandRates[band] = arr.map(c => Math.round(c / bh));
    maxRate = Math.max(maxRate, ...bandRates[band]);
  }
  return { slots, bandRates, maxRate };
}

function _updateLiveBandChart(chart, qsos, winStart, winEnd, bucketMs, stepMs, nowMs) {
  const { slots, bandRates, maxRate } = _buildLiveBandData(qsos, winStart, winEnd, bucketMs);
  chart._liveBandData = { slots, bandRates, bucketMs, nowMs };
  chart._nowMs    = nowMs;
  chart._drawXMin = winStart;
  chart._drawXMax = winEnd;
  chart.options.scales.x.min = winStart;
  chart.options.scales.x.max = winEnd;
  chart.options.scales.x.ticks.stepSize = stepMs;
  const newYMax = Math.max(maxRate, 10);
  chart.options.scales.y.max = newYMax;
  // y軸maxが変わった時 or 背景未取得時のみ update（combined と同様）
  if (chart._yMaxCache !== newYMax || !chart._bgReady) {
    chart._yMaxCache = newYMax;
    chart.update('none');
  }
}

function _buildLiveCumulPoints(qsos, startMs, endMs) {
  // コンテスト開始からの累積局数（全体グラフと同一の y スケール）
  // Cabrillo は _liveTime（分内均等分割）を使用して同一分内QSOを縦並びにしない
  const pts = [];
  let count = 0;
  for (const q of qsos) {
    const t = q._liveTime !== undefined ? q._liveTime : q.time.getTime();
    if (t > endMs) break;  // qsos は時刻順ソート済み
    count++;
    if (t >= startMs) pts.push({x: t, y: count});
  }
  return { pts, maxY: count };  // maxY = 窓終端までの累積局数
}

function _buildLiveRateData(qsos, startMs, endMs, bucketMs) {
  const alignedStart = Math.floor(startMs / bucketMs) * bucketMs;
  const slots = [];
  for (let t = alignedStart; t < endMs; t += bucketMs) slots.push(t);
  const count = slots.length;
  const counts = new Array(count).fill(0);
  for (const q of qsos) {
    const t = q.time.getTime();
    if (t < alignedStart || t >= endMs) continue;
    const idx = Math.floor((t - alignedStart) / bucketMs);
    if (idx >= 0 && idx < count) counts[idx]++;
  }
  const bh = bucketMs / 3600000;
  return { slots, rates: counts.map(c => Math.round(c / bh)) };
}

// 表示中の累積QSO範囲に合わせたy軸の最小値・最大値を端数なしで返す
function _niceYRange(minVal, maxVal) {
  if (maxVal <= minVal) {
    const v = Math.max(minVal, 0);
    const mag = v >= 5 ? Math.pow(10, Math.floor(Math.log10(v))) : 5;
    return { min: Math.max(0, Math.floor(v / mag) * mag - mag), max: Math.floor(v / mag) * mag + mag };
  }
  const pad = Math.max((maxVal - minVal) * 0.05, 0.5);
  const lo = Math.max(0, minVal - pad);
  const hi = maxVal + pad;
  const rawStep = (hi - lo) / 4;
  const mag = Math.pow(10, Math.floor(Math.log10(Math.max(rawStep, 1))));
  const step = rawStep >= 5 * mag ? 5 * mag : rawStep >= 2 * mag ? 2 * mag : mag;
  return { min: Math.floor(lo / step) * step, max: Math.ceil(hi / step) * step };
}

function _updateLiveChart(chart, qsos, winStart, winEnd, windowMins, stepMs, nowMs) {
  const cumul = _buildLiveCumulPoints(qsos, winStart, winEnd);
  // 全体グラフと同じ calcRateData を使いウィンドウ内の点だけ抽出
  const allRate = calcRateData(qsos, windowMins, skipOffTimeRate ? opSegments.filter(s => s.state === 'offtime') : []);
  const ratePts = allRate.filter(pt => pt.x >= winStart && pt.x <= winEnd);
  chart._liveData = {
    pts:     cumul.pts,
    ratePts: ratePts,
    nowMs,
  };
  chart._nowMs    = nowMs;
  chart._drawXMin = winStart;
  chart._drawXMax = winEnd;
  chart.options.scales.x.min = winStart;
  chart.options.scales.x.max = winEnd;
  chart.options.scales.x.ticks.stepSize = stepMs;
  const minCumul    = cumul.pts.length > 0 ? cumul.pts[0].y : 0;
  const { min: newYMin, max: newYMax } = _niceYRange(minCumul, Math.max(cumul.maxY, minCumul));
  const newYRateMax = Math.max(...ratePts.map(p => p.y), 10);
  chart.options.scales.y.min     = newYMin;
  chart.options.scales.y.max     = newYMax;
  chart.options.scales.yRate.max = newYRateMax;
  if (chart._yMinCache !== newYMin || chart._yMaxCache !== newYMax || chart._yRateMaxCache !== newYRateMax) {
    chart._yMinCache     = newYMin;
    chart._yMaxCache     = newYMax;
    chart._yRateMaxCache = newYRateMax;
    chart.update('none');
  }
}

function initLiveCharts() {
  // Chart.js が正確な幅を取得できるよう、作成前にセクションを一時表示
  const tmpIds = ['krate-section','custom-section','live10m-section','live10m-band-section','live1h-section','live3h-section','live1h-band-section','live3h-band-section'];
  tmpIds.forEach(id => { const el = document.getElementById(id); if (el) { el.style.display = 'flex'; el.style.flex = '1'; } });

  if (!krateChart)      krateChart      = _createKrateChart();
  if (!customChart)     customChart     = _createCustomChart();
  if (!liveChart10m)    liveChart10m    = _createLiveCombinedChart('chart-live-10m',      90000);
  if (!liveChart1h)     liveChart1h     = _createLiveCombinedChart('chart-live-1h',      7 * 60000);
  if (!liveChart3h)     liveChart3h     = _createLiveCombinedChart('chart-live-3h',      30 * 60000);
  if (!liveBandChart10m) liveBandChart10m = _createLiveBandChart   ('chart-live-10m-band', 90000);
  if (!liveBandChart1h) liveBandChart1h = _createLiveBandChart    ('chart-live-1h-band', 7 * 60000);
  if (!liveBandChart3h) liveBandChart3h = _createLiveBandChart    ('chart-live-3h-band', 30 * 60000);

  // 不要なセクションを非表示に戻してからビューを適用
  tmpIds.forEach(id => { const el = document.getElementById(id); if (el) el.style.display = 'none'; });

  // fixedモード用ドラッグハンドラを設定
  [[liveChart10m,    '10m'],
   [liveBandChart10m, '10m'],
   [liveChart1h,    '1h'],
   [liveBandChart1h, '1h'],
   [liveChart3h,    '3h'],
   [liveBandChart3h, '3h']].forEach(([chart, key]) => {
    if (!chart) return;
    chart._liveKey = key;
    chart.canvas.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      const rect = chart.canvas.getBoundingClientRect();
      const y = e.clientY - rect.top;
      const ca = chart.chartArea;
      if (ca && y <= ca.bottom) return;  // グラフエリアはdragZoomが担当
      // 目盛りエリア: 両モードでパン開始
      chart._dragStartX = e.clientX;
      chart._isDragging = true;
      e.preventDefault();
    });
    // カーソル縦線: events:[]でChart.jsのイベント処理を無効にしているためDOMで直接追跡
    chart.canvas.addEventListener('mousemove', e => {
      const rect = chart.canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const ca = chart.chartArea;
      if (!ca || x < ca.left || x > ca.right) { _liveState[key].cursorFrac = null; return; }
      _liveState[key].cursorFrac = (x - ca.left) / (ca.right - ca.left);
    });
    chart.canvas.addEventListener('mouseleave', () => {
      _liveState[key].cursorFrac = null;
    });
  });

  // バンドチャート用ツールチップ（全体グラフと同様の表示）
  const _liveBandTooltipEl = document.getElementById('bar-tooltip');
  [[liveBandChart10m, '10m'],
   [liveBandChart1h,  '1h'],
   [liveBandChart3h,  '3h']].forEach(([chart]) => {
    if (!chart) return;
    chart.canvas.addEventListener('mousemove', e => {
      const ld = chart._liveBandData;
      if (!ld || !ld.slots || !ld.slots.length) { _liveBandTooltipEl.style.display = 'none'; return; }
      const rect = chart.canvas.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const ca = chart.chartArea;
      if (!ca || mouseX < ca.left || mouseX > ca.right) { _liveBandTooltipEl.style.display = 'none'; return; }
      const dMin = chart._drawXMin, dMax = chart._drawXMax;
      if (!dMin || !dMax || dMax <= dMin) { _liveBandTooltipEl.style.display = 'none'; return; }
      // ピクセル→時刻に変換してスロットを特定
      const ms = dMin + (mouseX - ca.left) / (ca.right - ca.left) * (dMax - dMin);
      const slotIdx = ld.slots.findIndex((s, i) => ms >= s && ms < (ld.slots[i + 1] !== undefined ? ld.slots[i + 1] : s + ld.bucketMs));
      if (slotIdx < 0) { _liveBandTooltipEl.style.display = 'none'; return; }
      const slotMs = ld.slots[slotIdx];
      const bh = ld.bucketMs / 3600000;
      const stacks = Object.entries(ld.bandRates)
        .map(([band, rates]) => {
          const rate = rates[slotIdx] || 0;
          if (rate <= 0) return null;
          return { band, rate, qso: Math.max(1, Math.round(rate * bh)) };
        })
        .filter(Boolean);
      if (!stacks.length) { _liveBandTooltipEl.style.display = 'none'; return; }
      // 波長大→小 (160m→10m→cm帯) の順にソート
      stacks.sort((a, b) => {
        const key = s => s.band.endsWith('cm') ? parseFloat(s.band) / 100 : (parseFloat(s.band) || Infinity);
        return key(b) - key(a);
      });
      const timeStr = fmtUtc(slotMs) + '〜' + fmtUtc(slotMs + ld.bucketMs);
      const totalQso  = stacks.reduce((s, x) => s + x.qso,  0);
      const totalRate = stacks.reduce((s, x) => s + x.rate, 0);
      const rows = stacks.map(({band, qso, rate}) =>
        `<span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${BAND_COLORS[band]||BAND_COLORS.other};margin-right:4px;"></span>${i18n('bandTooltip', bandLabel(band), qso, rate)}`
      ).join('<br>');
      _liveBandTooltipEl.innerHTML = `<div style="color:#8a8a88;margin-bottom:2px;">${timeStr} UTC</div>${rows}<div style="border-top:0.5px solid rgba(255,255,255,0.1);margin-top:4px;padding-top:4px;">${i18n('totalTooltip', totalQso, totalRate)}</div>`;
      _liveBandTooltipEl.style.display = 'block';
      _liveBandTooltipEl.style.left = (e.clientX + 12) + 'px';
      _liveBandTooltipEl.style.top  = (e.clientY - 20) + 'px';
    });
    chart.canvas.addEventListener('mouseleave', () => {
      _liveBandTooltipEl.style.display = 'none';
    });
  });

  _startLiveAnimation();
}

function destroyLiveCharts() {
  if (_liveRafId) { cancelAnimationFrame(_liveRafId); _liveRafId = null; }
  [liveChart10m, liveChart1h, liveChart3h, liveBandChart10m, liveBandChart1h, liveBandChart3h, krateChart, customChart].forEach(c => c && c.destroy());
  liveChart10m = liveChart1h = liveChart3h = liveBandChart10m = liveBandChart1h = liveBandChart3h = null;
  krateChart = customChart = null;
}

// ウィンドウ幅に適したtick間隔を返す
function _stepMsForWindow(winMs) {
  const m = winMs / 60000;
  if (m <=  3) return 30000;
  if (m <=  8) return 60000;
  if (m <= 15) return 90000;
  if (m <= 30) return 3*60000;
  if (m <= 75) return 7*60000;
  if (m <= 150) return 15*60000;
  return 30*60000;
}

// ライブチャートのカスタムズームを設定 / 解除してリセットボタンの表示を更新
function _setLiveZoom(key, win) {
  const st = _liveState[key];
  // ズームリセット時は赤線の現在位置を保持してから解除
  if (!win && st.customWin) {
    if (st.mode === 'fixed') {
      // fixedモード: customWin内の赤線フラクションをfixedRefNowに反映
      const nowMs = getNowMs();
      const cw = st.customWin;
      const cwWidth = cw.max - cw.min;
      const nowFrac = (nowMs - cw.min) / cwWidth;
      st.fixedRefNow = nowMs - nowFrac * st.winMs + st.leftMs;
      _clampLiveWin(key, nowMs);
    }
    // scrollモード: panOffsetはそのまま（赤線フラクション自動保持）
  }
  st.customWin = win;
  const stepMs = win ? _stepMsForWindow(win.max - win.min) : st.defaultStepMs;
  [liveChart10m, liveChart1h, liveChart3h, liveBandChart10m, liveBandChart1h, liveBandChart3h]
    .filter(c => c && c._liveKey === key)
    .forEach(c => { c._stepMs = stepMs; });
  const btn = document.getElementById('zoom-reset-btn-' + key);
  if (btn) btn.style.display = win ? '' : 'none';
}

// now線をできるだけ右寄りに置きつつパネルが右側に収まる leftMs を動的計算
function _effectiveLeftMs(key) {
  const st = _liveState[key];
  const chartMap = { '10m': liveChart10m, '1h': liveChart1h, '3h': liveChart3h };
  const chart = chartMap[key];
  if (chart && chart.chartArea) {
    const chartPx = chart.chartArea.right - chart.chartArea.left;
    const reservePx = (st._panelW > 0 ? st._panelW : 320) + 5;
    if (chartPx > reservePx + 50) {
      return st.winMs * (chartPx - reservePx) / chartPx;
    }
  }
  return st.leftMs;
}

// チャートの現在ウィンドウ [ws, we] を計算（自動送り込み）
function _liveWin(key, nowMs) {
  const st = _liveState[key];
  // カスタムズーム優先
  if (st.customWin) {
    const cwWidth = st.customWin.max - st.customWin.min;
    if (st.mode === 'scroll') {
      // scrollモード: ズーム幅を使いつつ時刻に追従（赤線フラクション維持）
      const redLineFrac = (st.leftMs - st.panOffset) / st.winMs;
      const ws = nowMs - redLineFrac * cwWidth;
      return [ws, ws + cwWidth];
    }
    // fixedモード: 絶対位置 + auto-advance
    const { min, max } = st.customWin;
    const frac = (nowMs - min) / cwWidth;
    if (frac >= 0.95) { const shift = (frac - 2/3)*cwWidth; st.customWin = { min: min+shift, max: max+shift }; }
    return [st.customWin.min, st.customWin.max];
  }
  if (st.mode === 'fixed') {
    if (st.fixedRefNow === null) st.fixedRefNow = nowMs;
    const frac = (nowMs - st.fixedRefNow + st.leftMs) / st.winMs;
    if (frac >= 0.95) st.fixedRefNow = nowMs + st.leftMs - (2/3)*st.winMs;
    return [st.fixedRefNow - st.leftMs, st.fixedRefNow - st.leftMs + st.winMs];
  }
  // scrollモード: now線をできるだけ右寄りに（パネルが右側に収まる位置）
  const base = nowMs - _effectiveLeftMs(key);
  return [base + st.panOffset, base + st.panOffset + st.winMs];
}

// ドラッグ後にnow線が5%～95%内に収まるよう panOffset / fixedRefNow をクランプ
function _clampLiveWin(key, nowMs) {
  const st = _liveState[key];
  const [ws, we] = _liveWin(key, nowMs);
  const wMs = we - ws;
  const frac = (nowMs - ws) / wMs;
  if (frac >= 0.05 && frac <= 0.95) return;
  const tgt = Math.max(0.05, Math.min(0.95, frac));
  const newWs = nowMs - tgt * wMs;
  if (st.customWin) {
    if (st.mode === 'scroll') {
      // scrollモード: panOffsetで赤線位置をクランプ
      st.panOffset = st.leftMs - tgt * st.winMs;
    } else {
      st.customWin = { min: newWs, max: newWs + wMs };
    }
  } else if (st.mode === 'fixed') {
    st.fixedRefNow = newWs + st.leftMs;
  } else {
    st.panOffset = newWs - (nowMs - _effectiveLeftMs(key));
  }
}

// チャートペア（複合+バンド）を1フレーム描画するヘルパー
function _rafLiveDraw(key, combined, band, nowMs) {
  if (!combined) return;
  const [ws, we] = _liveWin(key, nowMs);
  [combined, band].forEach(c => {
    if (!c) return;
    c._drawXMin = ws; c._drawXMax = we; c._nowMs = nowMs;
    if (c._liveData)     c._liveData.nowMs = nowMs;
    if (c._liveBandData) c._liveBandData.nowMs = nowMs;
    if (c._bgReady) {
      // オフスクリーンキャンバスから背景復元（GPU高速）→オーバーレイ手描き
      const ctx = c.ctx, cw = c.canvas.width, ch = c.canvas.height;
      ctx.globalCompositeOperation = 'copy';
      ctx.drawImage(c._bgCanvas, 0, 0, cw, ch);
      ctx.globalCompositeOperation = 'source-over';
      const ca = c.chartArea;
      if (ca) {
        if (c._liveData)     _renderCombinedOverlay(c, ctx, ca, ws, we);
        if (c._liveBandData) _renderBandOverlay(c, ctx, ca, ws, we);
        // ドラッグズーム選択範囲を青色で描画
        if (c._dragX !== undefined && dragZoomState.active && dragZoomState.chart === c) {
          const x1 = dragZoomState.startX;
          const x2 = Math.min(Math.max(c._dragX, ca.left), ca.right);
          ctx.save();
          ctx.fillStyle = 'rgba(55,138,221,0.15)';
          ctx.fillRect(Math.min(x1, x2), ca.top, Math.abs(x2 - x1), ca.bottom - ca.top);
          ctx.strokeStyle = 'rgba(55,138,221,0.6)';
          ctx.lineWidth = 1;
          ctx.setLineDash([]);
          ctx.beginPath();
          ctx.moveTo(x1, ca.top); ctx.lineTo(x1, ca.bottom);
          ctx.moveTo(x2, ca.top); ctx.lineTo(x2, ca.bottom);
          ctx.stroke();
          ctx.restore();
        }
      }
    } else {
      c.draw();   // 背景未取得時のフォールバック
    }
  });
}

function _startLiveAnimation() {
  if (_liveRafId) return;
  _liveLastDataUpdate = 0;
  let _lastWall = 0;
  function tick() {
    const wallNow = Date.now();

    // シム再生: simNowMsを経過時間に比例して進める
    if (simPlaying && simNowMs !== null) {
      const logRange = simLogEnd - simLogStart;
      const speed = simWallDurationMs > 0 ? logRange / simWallDurationMs : 1;
      const newSim = Math.min(
        simPlayStartSim + (wallNow - simPlayStartWall) * speed,
        simLogEnd
      );
      simNowMs = newSim;
      if (newSim >= simLogEnd) _simStop();
      _refreshSimQsos();
    }
    // ボタン状態を常に同期（停止ボタンの確実な反映）
    if (simNowMs !== null) _simUpdateUI();

    const nowMs = getNowMs();
    // シムモード時は50ms毎、リアルタイムは1000ms毎にチャートデータ更新
    const updateInterval = simNowMs !== null ? 50 : 1000;
    if (wallNow - _lastWall >= updateInterval) {
      _lastWall = wallNow;
      _liveLastDataUpdate = wallNow;
      updateLiveCharts();
    }
    _rafLiveDraw('10m', liveChart10m, liveBandChart10m, nowMs);
    _rafLiveDraw('1h',  liveChart1h,  liveBandChart1h,  nowMs);
    _rafLiveDraw('3h',  liveChart3h,  liveBandChart3h,  nowMs);
    _rafKrateDraw(nowMs);
    _rafCustomDraw(nowMs);
    _liveRafId = requestAnimationFrame(tick);
  }
  _liveRafId = requestAnimationFrame(tick);
}

function updateLiveCharts() {
  if (!liveChart1h || !liveChart3h) return;
  const nowMs = getNowMs();
  const qsos  = getLiveQsos();

  const [w10s, w10e] = _liveWin('10m', nowMs);
  const [w1s,  w1e ] = _liveWin('1h',  nowMs);
  const [w3s,  w3e ] = _liveWin('3h',  nowMs);

  const rws10m = _liveState['10m'].rateWindowSecs;
  const rws1h  = _liveState['1h'].rateWindowSecs;
  const rws3h  = _liveState['3h'].rateWindowSecs;
  const bMs10m = rws10m * 1000;
  const bMs1h  = rws1h  * 1000;
  const bMs3h  = rws3h  * 1000;

  // LAZY_LIVE_COMPUTE が有効な場合、activeViews に含まれていないビューの計算をスキップ
  const vis10m = !LAZY_LIVE_COMPUTE || activeViews.has('live10m');
  const vis1h  = !LAZY_LIVE_COMPUTE || activeViews.has('live1h');
  const vis3h  = !LAZY_LIVE_COMPUTE || activeViews.has('live3h');

  if (vis10m)               _updateLiveChart(liveChart10m, qsos, w10s, w10e, rws10m / 60, 90000,    nowMs);
  if (vis1h)                _updateLiveChart(liveChart1h,  qsos, w1s,  w1e,  rws1h  / 60, 7*60000,  nowMs);
  if (vis3h)                _updateLiveChart(liveChart3h,  qsos, w3s,  w3e,  rws3h  / 60, 30*60000, nowMs);
  if (liveBandChart10m && vis10m) _updateLiveBandChart(liveBandChart10m, qsos, w10s, w10e, bMs10m, 90000,    nowMs);
  if (liveBandChart1h  && vis1h)  _updateLiveBandChart(liveBandChart1h,  qsos, w1s,  w1e,  bMs1h,  7*60000,  nowMs);
  if (liveBandChart3h  && vis3h)  _updateLiveBandChart(liveBandChart3h,  qsos, w3s,  w3e,  bMs3h,  30*60000, nowMs);

  // x軸グリッド/ラベルを現在のウィンドウ位置で背景に焼き込む（秒1回）
  // ラベルは毎フレーム描画しないことでfillTextの整数ピクセルスナップによるカクつきを回避
  if (liveChart10m     && vis10m) _saveLabeledBg(liveChart10m,    w10s, w10e);
  if (liveChart1h      && vis1h)  _saveLabeledBg(liveChart1h,     w1s,  w1e);
  if (liveChart3h      && vis3h)  _saveLabeledBg(liveChart3h,     w3s,  w3e);
  if (liveBandChart10m && vis10m) _saveLabeledBg(liveBandChart10m, w10s, w10e);
  if (liveBandChart1h  && vis1h)  _saveLabeledBg(liveBandChart1h,  w1s,  w1e);
  if (liveBandChart3h  && vis3h)  _saveLabeledBg(liveBandChart3h,  w3s,  w3e);

  // Kステップレートチャートの更新（過去Qビュー表示中の場合のみ）
  const visKrate  = !LAZY_LIVE_COMPUTE || activeViews.has('krate');
  const visCustom = !LAZY_LIVE_COMPUTE || activeViews.has('custom');
  if (krateChart  && visKrate)  _updateKrateChart(qsos, nowMs);
  if (customChart && visCustom) _updateCustomChart(qsos, nowMs);

  // 全体グラフのトレンド系列をライブQSO追加時に更新
  if (cumulChart && qsos.length) _updateCumulRateOnly(rateWindowSecs / 60);

  // シムモード: 全体グラフにシム時刻線を再描画
  if (simNowMs !== null) {
    if (typeof cumulChart !== 'undefined' && cumulChart) cumulChart.draw();
    if (typeof rateChart  !== 'undefined' && rateChart)  rateChart.draw();
  }
}


// ファイルロード時はライブモードを解除
const _wsOrigLoadText = loadText;
loadText = function(text) {
  if (wsLiveMode) {
    wsLiveMode = false;
    wsQsos = [];
    wsLiveBadge.classList.remove('visible');
    wsQsoCountEl.style.display = 'none';
    document.getElementById('format-label').textContent = 'Cabrillo / ADIF';
    wsSetStatus('connected', i18n('wsFileView'));
    destroyLiveCharts();
  }
  _wsOrigLoadText(text);
};
</script>
